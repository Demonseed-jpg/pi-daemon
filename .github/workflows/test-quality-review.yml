name: 🧪 Test Quality Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test-review:
    name: 🧪 Test Quality Review
    runs-on: ubuntu-latest
    # Don't run on PRs from bots (e.g., dependabot)
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff

      - name: Classify files for test quality review
        id: classify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get all changed files
          gh pr diff ${{ github.event.pull_request.number }} --name-only > /tmp/all_changed_files.txt 2>/dev/null || \
            git diff origin/${{ github.base_ref }}...HEAD --name-only > /tmp/all_changed_files.txt

          TOTAL_FILES=$(wc -l < /tmp/all_changed_files.txt)
          
          # Early termination check: empty PR
          if [ $TOTAL_FILES -eq 0 ]; then
            echo "Empty PR detected"
            echo "need_test_review=false" >> $GITHUB_OUTPUT
            echo "early_termination=empty" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "=== File Classification for Test Quality Review ==="
          
          # Test files (focus of this review)
          grep -E 'test\.|spec\.|tests/|_test\.|\.test\.|test_.*\.rs' /tmp/all_changed_files.txt > /tmp/test_files.txt || touch /tmp/test_files.txt
          
          # Source code files (context for test review)
          grep -E '\.(rs|ts|js)$' /tmp/all_changed_files.txt | grep -v -E 'test\.|spec\.|\.test\.|node_modules/|target/' > /tmp/source_files.txt || touch /tmp/source_files.txt
          
          TEST_COUNT=$(wc -l < /tmp/test_files.txt)
          SOURCE_COUNT=$(wc -l < /tmp/source_files.txt)
          
          echo "Test files for review: $TEST_COUNT"
          cat /tmp/test_files.txt | sed 's/^/  - /' || echo "  (none)"
          echo "Source files (context): $SOURCE_COUNT"
          
          # Early termination check: no test files to review
          if [ $TEST_COUNT -eq 0 ]; then
            echo "No test files detected for test quality review"
            echo "need_test_review=false" >> $GITHUB_OUTPUT
            echo "early_termination=no_tests" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "need_test_review=true" >> $GITHUB_OUTPUT
          echo "early_termination=none" >> $GITHUB_OUTPUT
          echo "test_count=$TEST_COUNT" >> $GITHUB_OUTPUT
          echo "source_count=$SOURCE_COUNT" >> $GITHUB_OUTPUT

      - name: Handle early termination cases  
        id: early_exit
        if: steps.classify.outputs.early_termination != 'none'
        run: |
          TERMINATION_TYPE="${{ steps.classify.outputs.early_termination }}"
          
          case "$TERMINATION_TYPE" in
            "empty")
              MESSAGE="Empty PR - no files to review"
              DETAIL="No files changed in this PR"
              ;;
            "no_tests")
              MESSAGE="No test files to review"
              DETAIL="This PR contains no test files - test quality review focuses on testing patterns and coverage"
              ;;
          esac
          
          # Create auto-pass result using jq
          jq -n \
            --arg message "$MESSAGE" \
            --arg detail "$DETAIL" \
            '{
              "verdict": "PASS",
              "summary": $message,
              "checks": [
                {"name": "File Classification", "status": "pass", "detail": $detail}
              ],
              "issues": [],
              "notes": "Test quality review focuses on test files, testing patterns, and test architecture. No test files detected in this PR.",
              "checklist_verdict": "PASS",
              "expert_verdict": "PASS"
            }' > /tmp/review_result.json
          
          echo "Auto-passed: $MESSAGE"
          echo "verdict=PASS" >> $GITHUB_OUTPUT

      - name: Create Test Quality Check Run
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let review;
            try {
              const raw = fs.readFileSync('/tmp/review_result.json', 'utf8');
              review = JSON.parse(raw);
            } catch (e) {
              console.log('Failed to parse review JSON:', e.message);
              review = {
                verdict: 'PASS',
                summary: 'Review JSON parse failed — defaulting to PASS',
                checklist_verdict: 'PASS',
                expert_verdict: 'PASS',
                checks: [],
                issues: [],
                notes: 'Raw output could not be parsed as JSON.'
              };
            }

            // Use the dual-layer verdict logic
            const verdict = review.verdict || 'PASS';
            const conclusion = verdict === 'PASS' ? 'success' : 'failure';

            // Build enhanced summary 
            const checksTable = (review.checks || [])
              .map(c => {
                const icon = c.status === 'pass' ? '✅' : c.status === 'fail' ? '❌' : '⏭️';
                return `| ${icon} | ${c.name} | ${c.detail || ''} |`;
              })
              .join('\n');

            const testCount = '${{ steps.classify.outputs.test_count }}';
            const sourceCount = '${{ steps.classify.outputs.source_count }}';

            let summary = `## ${verdict === 'PASS' ? '✅' : '❌'} 🧪 Test Quality Review: ${verdict}\n\n`;
            summary += `**${review.summary || 'No summary'}**\n\n`;
            
            // File classification summary
            summary += `### 📁 File Classification (Test Focus)\n`;
            summary += `**Test Files:** ${testCount} test files reviewed\n`;
            summary += `**Source Context:** ${sourceCount} source files (for understanding test purpose)\n\n`;

            // Layer results
            const checklistIcon = review.checklist_verdict === 'PASS' ? '✅' : '❌';
            const expertIcon = review.expert_verdict === 'PASS' ? '✅' : '❌';
            
            summary += `### ${checklistIcon} Testing Compliance - ${review.checklist_verdict || 'PASS'}\n\n`;
            
            if (checksTable) {
              summary += `| Status | Check | Detail |\n|--------|-------|--------|\n${checksTable}\n\n`;
            }
            
            summary += `### ${expertIcon} Test Architecture Analysis - ${review.expert_verdict || 'PASS'}\n\n`;
            
            if (review.test_analysis) {
              summary += `${review.test_analysis}\n\n`;
            }

            if (review.notes) {
              summary += `### 📝 Notes\n\n${review.notes}\n\n`;
            }

            // Create the check run (native GitHub check)
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: '🧪 Test Quality Review',
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion: conclusion,
              output: {
                title: `🧪 Test Quality: ${verdict}`,
                summary: summary,
              },
            });

            // Post PR comment
            const commentBody = summary + `\n---\n*🧪 Test quality review: Focused testing expertise (basic implementation)*`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes('🧪 Test Quality Review:'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
              });
            }

            // Fail the job if verdict is FAIL
            if (verdict === 'FAIL') {
              core.setFailed(`🧪 Test quality review failed: ${review.summary}`);
            }