name: Sandbox Test

# Reusable sandbox integration test workflow — called by pr-pipeline.yml.
# Builds the release binary and runs it as a real daemon process, testing
# health checks, agent CRUD, WebSocket, concurrency, crash recovery, and
# graceful shutdown.
#
# Phase 3 of CI Orchestrator (#127). Sandbox runs after build passes
# (enforced via needs: [build] in the orchestrator).

on:
  workflow_call:
    inputs:
      has_rust:
        description: "PR contains Rust source changes"
        type: boolean
        default: true
      has_deps:
        description: "PR contains Cargo.toml/Cargo.lock changes"
        type: boolean
        default: true

# Concurrency is primarily managed by the orchestrator (pr-pipeline.yml),
# but we include a group here for the config review check and as a safety net.
concurrency:
  group: sandbox-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sandbox:
    name: Sandbox Integration
    runs-on: ubuntu-latest
    if: inputs.has_rust || inputs.has_deps
    timeout-minutes: 10
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: sandbox

      - name: Install dependencies
        run: |
          # Install jq for JSON parsing and bc for decimal arithmetic
          sudo apt-get update && sudo apt-get install -y jq bc
          
          # Install websocat for WebSocket testing
          curl -L https://github.com/vi/websocat/releases/download/v1.13.0/websocat.x86_64-unknown-linux-musl \
            -o websocat && chmod +x websocat && sudo mv websocat /usr/local/bin/

      - name: Build release binary
        run: |
          echo "Building pi-daemon in release mode..."
          cargo build --release
          ls -la target/release/pi-daemon

      # ─── Phase 1: Smoke Test ─────────────────────────────

      - name: "Smoke: Start daemon in foreground"
        run: |
          echo "Starting pi-daemon in foreground..."
          ./target/release/pi-daemon start --foreground &
          DAEMON_PID=$!
          echo "DAEMON_PID=$DAEMON_PID" >> $GITHUB_ENV
          echo "Daemon PID: $DAEMON_PID"

          # Wait for daemon to be ready (poll health endpoint)
          echo "Waiting for daemon to be ready..."
          for i in $(seq 1 30); do
            if curl -sf --max-time 5 http://127.0.0.1:4200/api/health >/dev/null 2>&1; then
              echo "✅ Daemon ready after ${i}s"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Daemon failed to start within 30s"
              exit 1
            fi
            sleep 1
          done

      - name: "Smoke: Health check"
        run: |
          echo "Testing health check endpoint..."
          RESP=$(curl -sf --max-time 5 http://127.0.0.1:4200/api/health)
          echo "Health response: $RESP"
          echo "$RESP" | jq -e '.status == "ok"' || { 
            echo "❌ Health check failed: $RESP"; exit 1; 
          }
          echo "✅ Health check passed"

      - name: "Smoke: Status endpoint"
        run: |
          echo "Testing status endpoint..."
          RESP=$(curl -sf --max-time 5 http://127.0.0.1:4200/api/status)
          echo "Status response: $RESP"
          
          echo "$RESP" | jq -e '.version' || { 
            echo "❌ Status missing version: $RESP"; exit 1; 
          }
          echo "$RESP" | jq -e '.uptime_secs >= 0' || { 
            echo "❌ Status missing uptime: $RESP"; exit 1; 
          }
          echo "$RESP" | jq -e '.agent_count >= 0' || { 
            echo "❌ Status missing agent_count: $RESP"; exit 1; 
          }
          echo "✅ Status endpoint passed"

      - name: "Smoke: Agent CRUD lifecycle"
        run: |
          echo "Testing agent CRUD operations..."
          
          # Register agent
          echo "Registering test agent..."
          RESP=$(curl -sf -X POST http://127.0.0.1:4200/api/agents \
            -H "Content-Type: application/json" \
            -d '{"name":"sandbox-test-agent","kind":"api_client"}')
          echo "Register response: $RESP"
          AGENT_ID=$(echo "$RESP" | jq -r '.agent_id' 2>/dev/null || echo "null")
          echo "Agent ID: $AGENT_ID"
          [ "$AGENT_ID" != "null" ] && [ -n "$AGENT_ID" ] || { 
            echo "❌ Agent registration failed"; exit 1; 
          }

          # List agents
          echo "Listing agents..."
          AGENTS=$(curl -sf --max-time 5 http://127.0.0.1:4200/api/agents)
          AGENT_COUNT=$(echo "$AGENTS" | jq 'length' 2>/dev/null || echo "0")
          echo "Found $AGENT_COUNT agents"
          [ "$AGENT_COUNT" -gt 0 ] || { 
            echo "❌ Agent list empty"; exit 1; 
          }

          # Get specific agent
          echo "Getting agent details..."
          AGENT_DETAIL=$(curl -sf "http://127.0.0.1:4200/api/agents/$AGENT_ID")
          AGENT_NAME=$(echo "$AGENT_DETAIL" | jq -r '.name' 2>/dev/null || echo "")
          [ "$AGENT_NAME" = "sandbox-test-agent" ] || { 
            echo "❌ Agent get failed, expected 'sandbox-test-agent', got '$AGENT_NAME'"; exit 1; 
          }

          # Heartbeat
          echo "Sending heartbeat..."
          curl -sf -X POST "http://127.0.0.1:4200/api/agents/$AGENT_ID/heartbeat" >/dev/null

          # Delete agent
          echo "Deleting agent..."
          curl -sf -X DELETE "http://127.0.0.1:4200/api/agents/$AGENT_ID"

          # Verify deletion
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:4200/api/agents/$AGENT_ID")
          [ "$HTTP_CODE" = "404" ] || { 
            echo "❌ Agent not deleted (got $HTTP_CODE)"; exit 1; 
          }
          echo "✅ Agent CRUD lifecycle passed"

      - name: "Smoke: Webchat page loads"
        run: |
          echo "Testing webchat page..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4200/)
          [ "$HTTP_CODE" = "200" ] || { 
            echo "❌ Webchat returned $HTTP_CODE"; exit 1; 
          }

          # Verify HTML content
          CONTENT=$(curl -sf --max-time 5 http://127.0.0.1:4200/)
          if ! grep -q "PI-DAEMON\|pi-daemon" <<< "$CONTENT"; then
            echo "❌ Webchat missing expected content"; exit 1; 
          fi
          
          # Check it's substantial (not just placeholder)
          CONTENT_SIZE=$(wc -c <<< "$CONTENT")
          echo "Webchat content size: ${CONTENT_SIZE} bytes"
          [ "$CONTENT_SIZE" -gt 50000 ] || { 
            echo "❌ Webchat content too small (${CONTENT_SIZE} bytes)"; exit 1; 
          }
          echo "✅ Webchat page passed"

      - name: "Smoke: OpenAI-compatible endpoint"
        run: |
          echo "Testing OpenAI-compatible endpoint..."
          
          # Non-streaming request
          RESP=$(curl -sf -X POST http://127.0.0.1:4200/v1/chat/completions \
            -H "Content-Type: application/json" \
            -d '{"model":"sandbox-test","messages":[{"role":"user","content":"hello world"}],"stream":false}')
          echo "OpenAI response: $RESP"
          
          # Validate response structure  
          COMPLETION_ID=$(echo "$RESP" | jq -r '.id' 2>/dev/null || echo "")
          [ -n "$COMPLETION_ID" ] || { echo "❌ Missing completion ID"; exit 1; }
          
          OBJECT_TYPE=$(echo "$RESP" | jq -r '.object' 2>/dev/null || echo "")
          [ "$OBJECT_TYPE" = "chat.completion" ] || { echo "❌ Wrong object type: $OBJECT_TYPE"; exit 1; }
          
          CONTENT=$(echo "$RESP" | jq -r '.choices[0].message.content' 2>/dev/null || echo "")
          [ -n "$CONTENT" ] || { echo "❌ Missing response content"; exit 1; }
          
          TOTAL_TOKENS=$(echo "$RESP" | jq -r '.usage.total_tokens' 2>/dev/null || echo "0")
          [ "$TOTAL_TOKENS" -gt 0 ] || { echo "❌ Missing or zero usage tokens"; exit 1; }
          
          # Streaming request
          echo "Testing streaming mode..."
          STREAM_RESP=$(curl -sf -X POST http://127.0.0.1:4200/v1/chat/completions \
            -H "Content-Type: application/json" \
            -d '{"model":"sandbox-test","messages":[{"role":"user","content":"test"}],"stream":true}')
          
          if ! echo "$STREAM_RESP" | grep -q "data: {"; then
            echo "❌ Streaming format invalid"; exit 1; 
          fi
          if ! echo "$STREAM_RESP" | grep -q "data: \[DONE\]"; then
            echo "❌ Missing [DONE] terminator"; exit 1; 
          fi
          echo "✅ OpenAI-compatible endpoint passed"

      - name: "Smoke: PID file management"
        run: |
          echo "Testing PID file management..."
          [ -f ~/.pi-daemon/daemon.json ] || { 
            echo "❌ daemon.json not found"; exit 1; 
          }
          
          DAEMON_JSON=$(cat ~/.pi-daemon/daemon.json)
          echo "Daemon JSON: $DAEMON_JSON"
          
          DAEMON_PID_JSON=$(echo "$DAEMON_JSON" | jq -r '.pid' 2>/dev/null || echo "")
          DAEMON_ADDR=$(echo "$DAEMON_JSON" | jq -r '.listen_addr' 2>/dev/null || echo "")
          DAEMON_VERSION=$(echo "$DAEMON_JSON" | jq -r '.version' 2>/dev/null || echo "")
          
          [ -n "$DAEMON_PID_JSON" ] || { echo "❌ PID not in daemon.json"; exit 1; }
          [ -n "$DAEMON_ADDR" ] || { echo "❌ Address not in daemon.json"; exit 1; }
          [ -n "$DAEMON_VERSION" ] || { echo "❌ Version not in daemon.json"; exit 1; }
          echo "✅ PID file management passed"
          echo "PHASE_SMOKE=passed" >> $GITHUB_ENV

      # ─── Phase 2: Concurrency & Load Testing ─────────────

      - name: "Load: Concurrent HTTP requests"
        run: |
          echo "Testing concurrent HTTP load..."
          
          # 50 parallel requests to /api/status  
          echo "Sending 50 concurrent HTTP requests..."
          for i in $(seq 1 50); do
            curl -sf --max-time 5 http://127.0.0.1:4200/api/status -o /dev/null &
          done
          wait
          echo "✅ 50 concurrent HTTP requests completed"

      - name: "Load: Concurrent agent registrations"
        run: |
          echo "Testing concurrent agent registrations..."
          
          # Get baseline agent count
          BASELINE_COUNT=$(curl -sf --max-time 5 http://127.0.0.1:4200/api/agents | jq 'length')
          echo "Baseline agent count: $BASELINE_COUNT"
          
          # Register 20 agents concurrently
          echo "Registering 20 agents concurrently..."
          for i in $(seq 1 20); do
            curl -sf -X POST http://127.0.0.1:4200/api/agents \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"load-test-agent-$i\",\"kind\":\"api_client\"}" -o /dev/null &
          done
          wait

          # Verify registrations succeeded
          AGENTS_RESPONSE=$(curl -sf --max-time 5 http://127.0.0.1:4200/api/agents)
          FINAL_COUNT=$(echo "$AGENTS_RESPONSE" | jq 'length' 2>/dev/null || echo "0")
          EXPECTED_COUNT=$((BASELINE_COUNT + 20))
          echo "Final agent count: $FINAL_COUNT (expected: $EXPECTED_COUNT)"
          
          [ "$FINAL_COUNT" -ge "$EXPECTED_COUNT" ] || { 
            echo "❌ Expected >=$EXPECTED_COUNT agents, got $FINAL_COUNT"; exit 1; 
          }
          echo "✅ Concurrent agent registrations passed"

      - name: "Load: WebSocket connections"
        run: |
          echo "Testing WebSocket connection load..."
          
          # Test 5 concurrent WebSocket connections (within per-IP limit)
          echo "Opening 5 concurrent WebSocket connections..."
          for i in $(seq 1 5); do
            (
              echo '{"type":"ping"}' | timeout 10 websocat -1 ws://127.0.0.1:4200/ws/sandbox-test-$i >/dev/null 2>&1
              echo "WebSocket $i completed"
            ) &
          done
          wait
          echo "✅ 5 concurrent WebSocket connections passed"

      - name: "Load: Memory usage check"
        run: |
          echo "Checking memory usage..."
          
          # Validate PID first
          echo "Validating daemon PID: $DAEMON_PID"
          if [ -z "$DAEMON_PID" ]; then
            echo "❌ DAEMON_PID not set"
            exit 1
          fi
          
          # Check if process exists
          if ! kill -0 $DAEMON_PID 2>/dev/null; then
            echo "❌ Process $DAEMON_PID not found or not accessible"
            echo "Checking for pi-daemon processes:"
            ps aux | grep pi-daemon | grep -v grep || echo "No pi-daemon processes found"
            exit 1
          fi
          echo "✅ Process $DAEMON_PID is alive"
          
          # Method 1: RSS via ps (most portable)
          echo "Method 1: Using ps -o rss"
          RSS_RAW=$(ps -o rss= -p $DAEMON_PID 2>/dev/null)
          echo "Raw ps output: '$RSS_RAW'"
          if [ -n "$RSS_RAW" ]; then
            RSS_KB=$(echo "$RSS_RAW" | tr -d ' ')
            RSS_MB=$(echo "scale=1; $RSS_KB / 1024" | bc -l 2>/dev/null || echo "$((RSS_KB / 1024))")
            echo "RSS method: ${RSS_MB}MB (${RSS_KB}KB)"
          else
            echo "⚠️ RSS method failed"
            RSS_MB="0"
          fi
          
          # Method 2: /proc/PID/status (Linux-specific, more reliable)
          echo "Method 2: Using /proc/$DAEMON_PID/status"
          if [ -f "/proc/$DAEMON_PID/status" ]; then
            VMRSS_LINE=$(grep "^VmRSS:" /proc/$DAEMON_PID/status 2>/dev/null || echo "")
            if [ -n "$VMRSS_LINE" ]; then
              VMRSS_KB=$(echo "$VMRSS_LINE" | awk '{print $2}')
              VMRSS_MB=$(echo "scale=1; $VMRSS_KB / 1024" | bc -l 2>/dev/null || echo "$((VMRSS_KB / 1024))")
              echo "VmRSS method: ${VMRSS_MB}MB (${VMRSS_KB}KB)"
            else
              echo "⚠️ VmRSS line not found in /proc/$DAEMON_PID/status"
              VMRSS_MB="0"
            fi
          else
            echo "⚠️ /proc/$DAEMON_PID/status not found"
            VMRSS_MB="0"
          fi
          
          # Method 3: Combined process tree memory (in case of child processes)
          echo "Method 3: Process tree memory"
          TREE_RSS=$(ps -o rss= --ppid $DAEMON_PID 2>/dev/null | awk '{sum+=$1} END {print sum+0}')
          TOTAL_RSS=$((RSS_KB + TREE_RSS))
          TOTAL_MB=$(echo "scale=1; $TOTAL_RSS / 1024" | bc -l 2>/dev/null || echo "$((TOTAL_RSS / 1024))")
          echo "Process tree total: ${TOTAL_MB}MB (${TOTAL_RSS}KB)"
          
          # Choose most reliable measurement
          if [ "$VMRSS_MB" != "0" ] && [ -n "$VMRSS_MB" ]; then
            FINAL_MB="$VMRSS_MB"
            FINAL_KB="$VMRSS_KB"
            METHOD="VmRSS"
          elif [ "$RSS_MB" != "0" ] && [ -n "$RSS_MB" ]; then
            FINAL_MB="$RSS_MB"
            FINAL_KB="$RSS_KB"
            METHOD="RSS"
          else
            echo "❌ All memory measurement methods failed"
            echo "Debug: RSS_MB='$RSS_MB', VMRSS_MB='$VMRSS_MB'"
            exit 1
          fi
          
          echo "Final measurement ($METHOD): ${FINAL_MB}MB (${FINAL_KB}KB)"
          
          # Validate measurement is realistic
          FINAL_MB_INT=$(echo "$FINAL_MB" | cut -d. -f1)
          if [ "$FINAL_MB_INT" -lt 5 ]; then
            echo "❌ Memory usage ${FINAL_MB}MB is unrealistically low for a Rust daemon"
            echo "Expected: 20-50MB minimum (Rust binary + Axum + tokio + assets)"
            echo "This indicates a measurement error, not actual low usage"
            exit 1
          fi
          
          # Check thresholds
          if [ "$FINAL_MB_INT" -gt 200 ]; then
            echo "⚠️ Daemon using ${FINAL_MB}MB — exceeds 200MB threshold"
            echo "::warning::High memory usage: ${FINAL_MB}MB"
          elif [ "$FINAL_MB_INT" -gt 100 ]; then
            echo "⚠️ Daemon using ${FINAL_MB}MB — higher than expected (20-50MB)"
            echo "::warning::Above expected range: ${FINAL_MB}MB"
          else
            echo "✅ Memory usage within expected range: ${FINAL_MB}MB"
          fi
          echo "PHASE_LOAD=passed" >> $GITHUB_ENV

      # ─── Phase 3: Stress Testing ─────────────

      - name: "Stress: Sustained load test"
        run: |
          echo "Running sustained load test (10 seconds)..."
          
          # Record baseline memory (using reliable method)
          RSS_BEFORE=$(ps -o rss= -p $DAEMON_PID 2>/dev/null | tr -d ' ' || echo "0")
          if [ -f "/proc/$DAEMON_PID/status" ]; then
            VMRSS_BEFORE=$(grep "^VmRSS:" /proc/$DAEMON_PID/status 2>/dev/null | awk '{print $2}' || echo "$RSS_BEFORE")
            MEMORY_BEFORE="${VMRSS_BEFORE:-$RSS_BEFORE}"
          else
            MEMORY_BEFORE="$RSS_BEFORE"
          fi
          MEMORY_BEFORE_MB=$(echo "scale=1; $MEMORY_BEFORE / 1024" | bc -l 2>/dev/null || echo "$((MEMORY_BEFORE / 1024))")
          echo "Memory before load: ${MEMORY_BEFORE_MB}MB (${MEMORY_BEFORE}KB)"
          
          # Send requests continuously for 10 seconds
          timeout 10 bash -c '
            while true; do
              for endpoint in health status agents; do
                curl -sf --max-time 3 http://127.0.0.1:4200/api/$endpoint >/dev/null 2>&1 &
              done
              sleep 0.1
            done
          ' || true
          
          # Wait for background requests to complete
          sleep 2
          
          # Verify daemon is still alive after load
          curl -sf --max-time 5 http://127.0.0.1:4200/api/health >/dev/null || {
            echo "❌ Daemon not responding after sustained load test"
            kill -0 $DAEMON_PID 2>/dev/null && echo "Process alive but HTTP dead" || echo "Process dead"
            exit 1
          }
          
          # Check memory after load
          RSS_AFTER=$(ps -o rss= -p $DAEMON_PID 2>/dev/null | tr -d ' ' || echo "0")
          if [ -f "/proc/$DAEMON_PID/status" ]; then
            VMRSS_AFTER=$(grep "^VmRSS:" /proc/$DAEMON_PID/status 2>/dev/null | awk '{print $2}' || echo "$RSS_AFTER")
            MEMORY_AFTER="${VMRSS_AFTER:-$RSS_AFTER}"
          else
            MEMORY_AFTER="$RSS_AFTER"
          fi
          
          if [ -n "$MEMORY_AFTER" ] && [ "$MEMORY_AFTER" != "0" ] && [ -n "$MEMORY_BEFORE" ] && [ "$MEMORY_BEFORE" != "0" ]; then
            MEMORY_AFTER_MB=$(echo "scale=1; $MEMORY_AFTER / 1024" | bc -l 2>/dev/null || echo "$((MEMORY_AFTER / 1024))")
            GROWTH_KB=$((MEMORY_AFTER - MEMORY_BEFORE))
            GROWTH_MB=$(echo "scale=1; $GROWTH_KB / 1024" | bc -l 2>/dev/null || echo "$((GROWTH_KB / 1024))")
            echo "Memory after load: ${MEMORY_AFTER_MB}MB (growth: ${GROWTH_MB}MB)"
            
            # Convert to integer for comparison (remove decimal part)
            GROWTH_MB_INT=$(echo "$GROWTH_MB" | cut -d. -f1)
            if [ "$GROWTH_MB_INT" -gt 50 ]; then
              echo "⚠️ Memory grew by ${GROWTH_MB}MB during load test"
              echo "::warning::Potential memory leak: ${GROWTH_MB}MB growth"
            else
              echo "✅ Memory growth acceptable (${GROWTH_MB}MB)"
            fi
          else
            echo "⚠️ Unable to measure memory growth (before: ${MEMORY_BEFORE}KB, after: ${MEMORY_AFTER}KB)"
          fi
          echo "✅ Daemon healthy after sustained load"
          echo "PHASE_STRESS=passed" >> $GITHUB_ENV

      - name: "Recovery: Kill -9 and restart test"
        timeout-minutes: 3
        run: |
          echo "Testing crash recovery..."
          
          # Verify daemon is responding (with timeout to prevent hanging)
          curl -sf --max-time 5 http://127.0.0.1:4200/api/health >/dev/null || { 
            echo "❌ Daemon not responding before kill test"; exit 1; 
          }
          
          echo "Killing daemon (PID $DAEMON_PID) with SIGKILL..."
          # Kill the process and any children in its process group
          kill -9 $DAEMON_PID 2>/dev/null || true
          # Also kill by name as a safety measure
          pkill -9 -f "pi-daemon start" 2>/dev/null || true
          
          # Wait for process to actually exit
          echo "Waiting for process to exit..."
          for i in $(seq 1 10); do
            if ! kill -0 $DAEMON_PID 2>/dev/null; then
              echo "✅ Process $DAEMON_PID exited after ${i}s"
              break
            fi
            sleep 1
          done
          
          # Force cleanup stale state that kill -9 doesn't handle
          echo "Cleaning up stale state..."
          rm -f ~/.pi-daemon/daemon.json 2>/dev/null || true
          
          # Wait for port to be truly free using ss
          echo "Waiting for port 4200 to be free..."
          for i in $(seq 1 20); do
            if ! ss -tlnp 2>/dev/null | grep -q ":4200 "; then
              echo "✅ Port 4200 free after ${i}s"
              break
            fi
            if [ $i -eq 20 ]; then
              echo "⚠️ Port 4200 still bound after 20s:"
              ss -tlnp 2>/dev/null | grep ":4200 " || true
              echo "Attempting to kill lingering process..."
              fuser -k 4200/tcp 2>/dev/null || true
              sleep 2
            fi
            sleep 1
          done

          # Wait longer for port to be completely free (handle TIME_WAIT properly)
          echo "Waiting for port 4200 to be completely free..."
          for i in $(seq 1 30); do
            # Check if port is actually bound (not just responsive)
            if ! ss -tlnp 2>/dev/null | grep -q ":4200 " && ! netstat -tlnp 2>/dev/null | grep -q ":4200 "; then
              echo "✅ Port 4200 confirmed free after ${i}s"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "⚠️ Port 4200 still in use after 30s - checking what's using it:"
              ss -tlnp 2>/dev/null | grep ":4200 " || true
              netstat -tlnp 2>/dev/null | grep ":4200 " || true
              echo "Will proceed anyway and see if restart works..."
            fi
            sleep 1
          done

          # Restart daemon on same port (4200) - this is how it works in production
          echo "Restarting daemon on original port 4200..."
          ./target/release/pi-daemon start --foreground &
          NEW_PID=$!
          echo "DAEMON_PID=$NEW_PID" >> $GITHUB_ENV
          echo "New daemon PID: $NEW_PID"
          
          # Give the daemon a moment to start before checking
          sleep 3

          # Wait for daemon to be ready with detailed debugging
          echo "Waiting for daemon to be ready..."
          for i in $(seq 1 60); do
            # Check if process is still alive
            if ! kill -0 $NEW_PID 2>/dev/null; then
              echo "❌ Daemon process ($NEW_PID) died during startup!"
              echo "Checking for crash info:"
              cat ~/.pi-daemon/daemon.json 2>/dev/null || echo "No daemon.json"
              echo "Exit here since process crashed"
              exit 1
            fi
            
            # Check if health endpoint responds
            if curl -sf --max-time 5 http://127.0.0.1:4200/api/health >/dev/null 2>&1; then
              echo "✅ Daemon restarted after ${i}s"
              break
            fi
            
            # Print debug info every 10 seconds
            if [ $((i % 10)) -eq 0 ]; then
              echo "Debug at ${i}s: process alive, checking port..."
              ss -tlnp 2>/dev/null | grep ":4200 " || echo "Port 4200 not bound yet"
            fi
            
            if [ $i -eq 60 ]; then
              echo "❌ Daemon failed to restart on port 4200 within 60s"
              echo "Final debugging info:"
              echo "Process status:"
              ps aux | grep -E "pi-daemon|$NEW_PID" || echo "No pi-daemon processes"
              echo "Port status:"
              ss -tlnp 2>/dev/null | grep ":4200 " || echo "Port 4200 not bound"
              netstat -tlnp 2>/dev/null | grep ":4200 " || echo "Port 4200 not in netstat"
              echo "daemon.json:"
              cat ~/.pi-daemon/daemon.json 2>/dev/null || echo "No daemon.json file"
              exit 1
            fi
            sleep 1
          done

          # Health check after recovery (back on port 4200)
          HEALTH_RESP=$(curl -sf --max-time 5 http://127.0.0.1:4200/api/health)
          echo "Health response: $HEALTH_RESP"
          HEALTH_STATUS=$(echo "$HEALTH_RESP" | jq -r '.status' 2>/dev/null || echo "")
          [ "$HEALTH_STATUS" = "ok" ] || { 
            echo "❌ Health check failed after recovery, got status: '$HEALTH_STATUS'"; exit 1; 
          }
          echo "✅ Crash recovery test passed - daemon restarted on same port"

      # ─── Phase 4: Graceful Shutdown Testing ─────────────

      - name: "Shutdown: API shutdown endpoint"
        run: |
          echo "Testing API shutdown endpoint..."
          
          # Test shutdown via API
          RESP=$(curl -sf -X POST http://127.0.0.1:4200/api/shutdown)
          echo "Shutdown response: $RESP"
          echo "$RESP" | jq -e '.message' || { 
            echo "❌ Shutdown response invalid"; exit 1; 
          }

          # Wait for process to exit gracefully
          echo "Waiting for graceful shutdown..."
          for i in $(seq 1 15); do
            if ! kill -0 $DAEMON_PID 2>/dev/null; then
              echo "✅ Daemon stopped gracefully after ${i}s"
              break
            fi
            if [ $i -eq 15 ]; then
              echo "⚠️ Daemon didn't stop gracefully within 15s, force killing"
              kill -9 $DAEMON_PID 2>/dev/null || true
              pkill -9 -f "pi-daemon start" 2>/dev/null || true
            fi
            sleep 1
          done

          # Verify PID file cleanup
          sleep 1
          if [ -f ~/.pi-daemon/daemon.json ]; then
            echo "⚠️ daemon.json not cleaned up after API shutdown"
            echo "::warning::PID file not cleaned up"
          else
            echo "✅ PID file cleaned up properly"
          fi

          # Verify port is free
          sleep 2
          if curl -sf --max-time 5 http://127.0.0.1:4200/api/health >/dev/null 2>&1; then
            echo "❌ Port still in use after shutdown"
            exit 1
          fi
          echo "✅ Port freed after shutdown"
          echo "PHASE_SHUTDOWN=passed" >> $GITHUB_ENV

      - name: "Test: CLI commands (if daemon stopped)"
        run: |
          echo "Testing CLI commands when daemon is not running..."
          
          # These should all report daemon not running
          ./target/release/pi-daemon status | grep -q "not running" || {
            echo "❌ Status should report not running"
            exit 1
          }
          echo "✅ Status command reports not running"
          
          # Stop should fail gracefully  
          if ./target/release/pi-daemon stop 2>/dev/null; then
            echo "❌ Stop should fail when daemon not running"
            exit 1
          fi
          echo "✅ Stop command fails appropriately"

          # Version should always work
          VERSION_OUT=$(./target/release/pi-daemon version)
          echo "Version output: $VERSION_OUT"
          echo "$VERSION_OUT" | grep -q "pi-daemon v" || {
            echo "❌ Version output invalid"
            exit 1
          }
          echo "✅ Version command works"

          # Config should always work
          CONFIG_OUT=$(./target/release/pi-daemon config)
          echo "$CONFIG_OUT" | grep -q "pi-daemon configuration" || {
            echo "❌ Config output invalid" 
            exit 1
          }
          echo "✅ Config command works"
          echo "PHASE_CLI=passed" >> $GITHUB_ENV

      # ─── Final Summary ─────────────────────────────────────

      - name: "Summary: Integration test results"
        if: always()
        run: |
          # Determine status icon for each phase
          smoke_icon=$( [ "$PHASE_SMOKE" = "passed" ] && echo "✅" || echo "❌" )
          load_icon=$( [ "$PHASE_LOAD" = "passed" ] && echo "✅" || echo "❌" )
          stress_icon=$( [ "$PHASE_STRESS" = "passed" ] && echo "✅" || echo "❌" )
          shutdown_icon=$( [ "$PHASE_SHUTDOWN" = "passed" ] && echo "✅" || echo "❌" )
          cli_icon=$( [ "$PHASE_CLI" = "passed" ] && echo "✅" || echo "❌" )

          # Build summary table
          SUMMARY="## Sandbox Integration Summary

          | Phase | Status |
          |-------|--------|
          | Smoke tests (health, status, CRUD, webchat, OpenAI, PID) | ${smoke_icon} ${PHASE_SMOKE:-failed} |
          | Load tests (concurrent HTTP, agents, WebSocket, memory) | ${load_icon} ${PHASE_LOAD:-failed} |
          | Stress tests (sustained load, crash recovery) | ${stress_icon} ${PHASE_STRESS:-failed} |
          | Shutdown tests (API shutdown, port cleanup) | ${shutdown_icon} ${PHASE_SHUTDOWN:-failed} |
          | CLI tests (status, stop, version, config) | ${cli_icon} ${PHASE_CLI:-failed} |"

          # Print to stdout and write to step summary
          echo "$SUMMARY"
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY
          
          # Ensure daemon is stopped (cleanup)
          pkill -f "pi-daemon start" 2>/dev/null || true
          rm -f ~/.pi-daemon/daemon.json 2>/dev/null || true
          echo "🧹 Cleanup completed"