name: PR Pipeline

# Orchestrator workflow — calls reusable workflows in dependency order.
# Scope gate runs first; all other stages depend on it (directly or
# transitively). If scope gate blocks, downstream jobs are skipped.
#
# Dependency graph:
#   scope-gate
#       │
#       ├──→ lint-format ──┬──→ test ──────────→ code-review
#       │                  │
#       │                  └──→ build ─────────→ sandbox
#       │
#       ├──→ security (parallel with lint)
#       │
#       └──→ hygiene (parallel with lint)
#
# All PR checks live under this single workflow. Post-merge CI on main
# is handled by ci-main.yml. Auto-approve watches only "PR Pipeline".
#
# Phase 4 (#128) — final form.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  scope-gate:
    if: github.actor != 'dependabot[bot]'
    uses: ./.github/workflows/_scope-gate.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      pr_body: ${{ github.event.pull_request.body }}
    permissions:
      contents: read
      pull-requests: write
    secrets: inherit

  lint-format:
    needs: [scope-gate]
    uses: ./.github/workflows/_lint-format.yml
    permissions:
      contents: read
    secrets: inherit

  test:
    needs: [lint-format]
    uses: ./.github/workflows/_test.yml
    permissions:
      contents: read
      pull-requests: write
    secrets: inherit

  security:
    needs: [scope-gate]
    uses: ./.github/workflows/_security.yml
    permissions:
      contents: read
      pull-requests: write
    secrets: inherit

  hygiene:
    needs: [scope-gate]
    uses: ./.github/workflows/_hygiene.yml
    permissions:
      contents: read
      pull-requests: write
    secrets: inherit

  build:
    needs: [lint-format]
    uses: ./.github/workflows/_build.yml
    permissions:
      contents: read
      pull-requests: write
    secrets: inherit

  code-review:
    needs: [lint-format, test]
    uses: ./.github/workflows/_code-review.yml
    permissions:
      contents: read
      pull-requests: write
      checks: write
    secrets:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

  sandbox:
    needs: [build]
    uses: ./.github/workflows/_sandbox.yml
    permissions:
      contents: read
      checks: write
    secrets: inherit
