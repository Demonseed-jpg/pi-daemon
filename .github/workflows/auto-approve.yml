name: Auto-Approve on All Checks Passed

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  auto-approve:
    name: Auto-Approve
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Get PR number
        id: get-pr
        uses: actions/github-script@v7
        with:
          script: |
            // Get the PR number from the workflow run
            const { data: pullRequests } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`,
              state: 'open'
            });
            
            if (pullRequests.length === 0) {
              console.log('No open PR found for this branch');
              return;
            }
            
            const pr = pullRequests[0];
            core.setOutput('pr-number', pr.number);
            core.setOutput('pr-head-sha', pr.head.sha);
            
            return pr.number;

      - name: Wait for CI completion and check status
        id: check-status
        if: steps.get-pr.outputs.pr-number
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.get-pr.outputs.pr-number }};
            const headSha = '${{ steps.get-pr.outputs.pr-head-sha }}';
            
            // Wait a bit to ensure all checks have registered
            await new Promise(resolve => setTimeout(resolve, 10000));
            
            // Get all check runs for this commit
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: headSha
            });
            
            // Required check patterns (these must ALL pass)
            const requiredChecks = [
              /^Lint$/,
              /^Unit Tests \(.+\)$/,
              /^Integration Tests$/,
              /^Code Coverage$/,
              /^Security Audit$/,
              /^Build \(.+\)$/,
              /^Minimum Supported Rust Version$/,
              /^PR Report$/
            ];
            
            // Check if all required checks exist and passed
            let allPassed = true;
            const results = [];
            let totalChecks = 0;
            let passedChecks = 0;
            
            for (const pattern of requiredChecks) {
              const matching = checkRuns.check_runs.filter(run => pattern.test(run.name));
              totalChecks += matching.length;
              
              if (matching.length === 0) {
                console.log(`❌ Missing required check: ${pattern}`);
                allPassed = false;
                results.push(`❌ Missing: ${pattern}`);
              } else {
                const allMatchingPassed = matching.every(run => 
                  run.conclusion === 'success' && run.status === 'completed'
                );
                if (!allMatchingPassed) {
                  console.log(`❌ Failed or incomplete check: ${pattern}`);
                  allPassed = false;
                  results.push(`❌ Failed: ${pattern}`);
                  // Log details of failed checks
                  matching.forEach(run => {
                    if (run.conclusion !== 'success' || run.status !== 'completed') {
                      console.log(`  - ${run.name}: ${run.status}/${run.conclusion}`);
                    }
                  });
                } else {
                  results.push(`✅ Passed: ${pattern}`);
                  passedChecks += matching.length;
                }
              }
            }
            
            console.log(`Check Summary: ${passedChecks}/${totalChecks} required checks passed`);
            console.log('Detailed results:', results.join('\n'));
            
            // Only approve if ALL checks passed AND we have the expected number
            const hasMinimumChecks = totalChecks >= 7; // At least the core checks
            core.setOutput('all-passed', allPassed && hasMinimumChecks);
            core.setOutput('check-count', totalChecks);
            
            return allPassed && hasMinimumChecks;

      - name: Auto-approve PR
        if: >
          steps.get-pr.outputs.pr-number &&
          steps.check-status.outputs.all-passed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.get-pr.outputs.pr-number }};
            
            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'APPROVE',
                body: '✅ **Auto-approved** — all CI checks passed.\n\n*Automated review by github-actions[bot]*'
              });
              
              console.log(`Auto-approved PR #${prNumber}`);
            } catch (error) {
              if (error.message.includes('already reviewed')) {
                console.log(`PR #${prNumber} already has a review from this bot`);
              } else {
                throw error;
              }
            }

      - name: Log approval decision
        if: steps.get-pr.outputs.pr-number
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ steps.get-pr.outputs.pr-number }};
            const allPassed = '${{ steps.check-status.outputs.all-passed }}';
            
            if (allPassed === 'true') {
              console.log(`✅ Auto-approved PR #${prNumber} - all checks passed`);
            } else {
              console.log(`⏸️  Did not approve PR #${prNumber} - some checks failed or missing`);
            }