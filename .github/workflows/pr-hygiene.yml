name: PR Hygiene

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ─── PR Size Check ──────────────────────────────────────
  pr-size:
    name: PR Size
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const lines = pr.additions + pr.deletions;
            const files = pr.changed_files;
            let emoji = '✅';
            let level = '';
            let suggestion = '';

            if (lines > 1500) {
              emoji = '🔴';
              level = 'Very Large';
              suggestion = 'This PR should almost certainly be split into smaller, focused PRs.';
            } else if (lines > 800) {
              emoji = '🟡';
              level = 'Large';
              suggestion = 'Consider splitting this PR — review quality drops significantly above 800 lines.';
            } else if (lines > 400) {
              emoji = 'ℹ️';
              level = 'Medium';
              suggestion = 'This is getting large. Could any changes be a separate PR?';
            }

            if (level) {
              const body = `## ${emoji} PR Size: ${level} (${lines} lines, ${files} files)

            **+${pr.additions}** additions, **-${pr.deletions}** deletions across **${files}** files.

            ${suggestion}

            > Industry standard: Google recommends ≤400 lines. GitHub data shows review quality drops above 500.

            ---
            *📏 Automated PR size check*`;

              // Find/update existing comment
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              const existing = comments.find(c => c.body && c.body.includes('PR Size:'));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  comment_id: existing.id, body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: context.issue.number, body,
                });
              }
            }

  # ─── Commit Message Lint ─────────────────────────────────
  commit-lint:
    name: Commit Messages
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check conventional commits
        run: |
          VALID_PREFIXES="^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?:"
          BAD_COMMITS=""

          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            if ! echo "$msg" | grep -qP "$VALID_PREFIXES"; then
              BAD_COMMITS="${BAD_COMMITS}\n  - ${msg}"
            fi
          done <<< "$(git log origin/main..HEAD --pretty=format:'%s' 2>/dev/null || echo '')"

          if [ -n "$BAD_COMMITS" ]; then
            echo "::warning::Non-conventional commit messages found:${BAD_COMMITS}"
            echo ""
            echo "Expected format: type(scope): description"
            echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
          else
            echo "All commit messages follow Conventional Commits format"
          fi

  # ─── PR Description Check ───────────────────────────────
  pr-description:
    name: PR Description
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Check PR description
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const issues = [];

            if (body.trim().length < 50) {
              issues.push('PR description is too short (< 50 chars)');
            }

            const hasIssueRef = /closes?\s+#\d+|fixes?\s+#\d+|implements?\s+#\d+|refs?\s+#\d+/i.test(body);
            if (!hasIssueRef) {
              issues.push('No issue reference found (use `Closes #N`, `Fixes #N`, or `Refs #N`)');
            }

            if (issues.length > 0) {
              core.warning(`PR description issues:\n${issues.join('\n')}`);
            } else {
              console.log('PR description OK');
            }
