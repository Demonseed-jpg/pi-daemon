name: Architectural Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  arch-review:
    name: Architecture Review
    runs-on: ubuntu-latest
    # Don't run on PRs from bots (e.g., dependabot)
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff

      - name: Get PR diff with intelligent filtering
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get all changed files
          gh pr diff ${{ github.event.pull_request.number }} --name-only > /tmp/all_changed_files.txt 2>/dev/null || \
            git diff origin/${{ github.base_ref }}...HEAD --name-only > /tmp/all_changed_files.txt

          TOTAL_FILES=$(wc -l < /tmp/all_changed_files.txt)
          
          echo "=== File Classification for Architectural Review ==="
          
          # Source code files (architectural decisions) - ONLY these get architectural review
          grep -E '\.(rs|ts|js)$' /tmp/all_changed_files.txt | grep -v -E 'test\.|spec\.|\.test\.|node_modules/|target/' > /tmp/source_files.txt || touch /tmp/source_files.txt
          
          # Generated files (excluded from architectural review)
          grep -E 'package-lock\.json|yarn\.lock|Cargo\.lock|node_modules/|target/|dist/|build/|\.map$' /tmp/all_changed_files.txt > /tmp/excluded_files.txt || touch /tmp/excluded_files.txt
          
          SOURCE_COUNT=$(wc -l < /tmp/source_files.txt)
          EXCLUDED_COUNT=$(wc -l < /tmp/excluded_files.txt)
          
          echo "Source files for architectural review: $SOURCE_COUNT"
          cat /tmp/source_files.txt | sed 's/^/  - /' || echo "  (none)"
          echo "Excluded files (generated): $EXCLUDED_COUNT"
          cat /tmp/excluded_files.txt | sed 's/^/  - /' || echo "  (none)"
          
          # Generate filtered diff for only source code files
          if [ "$SOURCE_COUNT" -gt 0 ]; then
            echo "Generating filtered diff for architectural review..."
            while IFS= read -r file; do
              if [ -n "$file" ]; then
                echo "=== $file ==="
                git diff origin/${{ github.base_ref }}...HEAD -- "$file" 2>/dev/null || echo "(file diff unavailable)"
                echo ""
              fi
            done < /tmp/source_files.txt > /tmp/pr_diff.txt
          else
            echo "No source files to review architecturally - creating auto-pass result"
            echo "Generated or non-source files only - no architectural review needed" > /tmp/pr_diff.txt
          fi
          
          # Check final diff size and truncate if needed (should be much smaller now)
          FINAL_DIFF_SIZE=$(wc -c < /tmp/pr_diff.txt)
          echo "Filtered diff size: ${FINAL_DIFF_SIZE} chars (was potentially >100KB with package-lock.json)"
          
          if [ $FINAL_DIFF_SIZE -gt 75000 ]; then
            echo "Filtered diff still large, truncating..."
            head -c 75000 /tmp/pr_diff.txt > /tmp/pr_diff_truncated.txt
            echo -e "\n\n... [DIFF TRUNCATED — exceeded 75K chars after filtering] ..." >> /tmp/pr_diff_truncated.txt
            mv /tmp/pr_diff_truncated.txt /tmp/pr_diff.txt
          fi

          # Copy source files list as changed files for the review
          cp /tmp/source_files.txt /tmp/changed_files.txt

          echo "diff_size=$(wc -c < /tmp/pr_diff.txt)" >> $GITHUB_OUTPUT
          echo "source_files=$SOURCE_COUNT" >> $GITHUB_OUTPUT
          echo "excluded_files=$EXCLUDED_COUNT" >> $GITHUB_OUTPUT
          echo "file_count=$SOURCE_COUNT" >> $GITHUB_OUTPUT

      - name: Gather architecture docs
        run: |
          # Concatenate all architecture docs into one context file
          echo "=== docs/Architecture.md ===" > /tmp/arch_context.txt
          cat docs/Architecture.md >> /tmp/arch_context.txt 2>/dev/null || echo "(not found)" >> /tmp/arch_context.txt

          echo -e "\n\n=== docs/Contributing.md ===" >> /tmp/arch_context.txt
          cat docs/Contributing.md >> /tmp/arch_context.txt 2>/dev/null || echo "(not found)" >> /tmp/arch_context.txt

          echo -e "\n\n=== docs/Testing.md ===" >> /tmp/arch_context.txt
          cat docs/Testing.md >> /tmp/arch_context.txt 2>/dev/null || echo "(not found)" >> /tmp/arch_context.txt

          echo -e "\n\n=== docs/API-Reference.md ===" >> /tmp/arch_context.txt
          cat docs/API-Reference.md >> /tmp/arch_context.txt 2>/dev/null || echo "(not found)" >> /tmp/arch_context.txt

          echo -e "\n\n=== docs/Configuration.md ===" >> /tmp/arch_context.txt
          cat docs/Configuration.md >> /tmp/arch_context.txt 2>/dev/null || echo "(not found)" >> /tmp/arch_context.txt

          echo -e "\n\n=== Cargo.toml (workspace) ===" >> /tmp/arch_context.txt
          cat Cargo.toml >> /tmp/arch_context.txt 2>/dev/null || echo "(not found)" >> /tmp/arch_context.txt

          echo "context_size=$(wc -c < /tmp/arch_context.txt)" >> $GITHUB_OUTPUT

      - name: Run architectural review
        id: review
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          # Check if there are any source files to review
          SOURCE_COUNT=${{ steps.diff.outputs.source_files }}
          if [ "$SOURCE_COUNT" -eq 0 ]; then
            echo "No source files to review — creating auto-pass result for non-source PR"
            jq -n '{
              "verdict": "PASS",
              "summary": "No source code files to review architecturally", 
              "checks": [
                {
                  "name": "File Classification",
                  "status": "pass", 
                  "detail": "No source files (.rs, .ts, .js) detected for architectural review"
                }
              ],
              "issues": [],
              "notes": "This PR contains only generated files, configuration, or documentation changes. Architectural review focuses on source code containing architectural decisions."
            }' > /tmp/review_result.json
            echo "verdict=PASS" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Build the prompt
          cat > /tmp/review_prompt.txt << 'SYSTEM_PROMPT'
          You are an architectural code reviewer for the pi-daemon project — a Rust-based agent kernel daemon.

          Your job is to review a pull request diff against the project's architecture documentation and report whether the changes conform to the documented architecture, conventions, and best practices.

          **IMPORTANT:** This diff has been intelligently filtered to focus on source code files (.rs, .ts, .js) that contain architectural decisions. Generated files (package-lock.json, node_modules/, dist/) have been excluded to prevent token overflow and maintain review quality focus.

          ## Review Checklist

          1. **Crate Structure**: Do new files/modules live in the correct crate per the architecture doc? Is the dependency graph respected (types → kernel → api → cli, no cycles)?

          2. **Concurrency Patterns**: Does the code use DashMap (not Mutex<HashMap>) for concurrent maps? broadcast channels for pub/sub? Arc for shared state?

          3. **Error Handling**: Does the code use thiserror for typed errors and anyhow at boundaries? No unwrap() in library code (only in tests)?

          4. **Naming Conventions**: snake_case everywhere? Types match their module names? Test naming follows test_<thing>_<behavior>?

          5. **API Conventions**: Do new routes follow the existing pattern (State extractor, Json responses, proper status codes)? Are they documented in API-Reference.md?

          6. **Testing**: Are there unit tests for new public functions? Integration tests for new API endpoints? Do tests use the test-utils helpers (test_kernel, test_server, TestClient)?

          7. **Security**: No unwrap() on user input. API key middleware applied to new routes. Sensitive values not logged.

          8. **Logging**: Uses tracing macros (info!, warn!, debug!), not println!.

          9. **Documentation**: New public items have doc comments. Changes reflected in docs/ if they affect architecture or API.

          10. **General Best Practices**: No TODO/FIXME without an issue reference. No dead code. No unnecessary clones.

          ## AI-Specific Checks (for AI-generated code)

          11. **Hallucination Detection**: Are there imports of non-existent crates or modules? Calls to APIs or methods that don't exist in the referenced libraries? References to fictional Rust features or syntax?

          12. **Copy-Paste / Duplication**: Are there large blocks of duplicated code that should be extracted into shared functions or modules? Repeated boilerplate that violates DRY?

          13. **Naming Consistency**: Are error types consistently named `*Error` (not mixing `*Error` and `*Err`)? Are similar patterns named the same way across different modules? Is there terminology drift?

          14. **Prompt Injection / Leak Detection**: Are there strings that look like LLM system prompts, instructions, or context scaffolding accidentally committed? Patterns like "You are", "As an AI", "<system>", "<instructions>", multi-line strings that read like prompts?

          ## Output Format

          You MUST output EXACTLY this JSON structure (no markdown fences, no extra text before or after):

          {
            "verdict": "PASS" or "FAIL",
            "summary": "One-line summary of the review result",
            "checks": [
              {
                "name": "Check name (from checklist above)",
                "status": "pass" or "fail" or "skip",
                "detail": "Brief explanation"
              }
            ],
            "issues": [
              {
                "severity": "error" or "warning" or "info",
                "file": "path/to/file.rs",
                "description": "What's wrong and how to fix it"
              }
            ],
            "notes": "Any additional observations or suggestions (optional)"
          }

          Rules:
          - Verdict is FAIL if ANY check has status "fail" with severity "error"
          - Verdict is PASS if all checks pass or only have warnings/info
          - "skip" means the check isn't relevant to this PR (e.g., no new API routes → skip API check)
          - Be specific — cite exact file paths and line references from the diff
          - If the PR only changes docs or CI config, most checks should be "skip" and verdict "PASS"
          - Do NOT be nitpicky about style in docs-only or config-only PRs
          SYSTEM_PROMPT

          # Build the user message
          cat > /tmp/review_input.txt << 'INPUT_HEADER'
          ## Architecture Documentation

          INPUT_HEADER
          cat /tmp/arch_context.txt >> /tmp/review_input.txt

          echo -e "\n\n## File Classification (Intelligent Filtering Applied)" >> /tmp/review_input.txt
          SOURCE_COUNT="${{ steps.diff.outputs.source_files }}"
          EXCLUDED_COUNT="${{ steps.diff.outputs.excluded_files }}"
          echo "**Reviewed:** $SOURCE_COUNT source files (.rs, .ts, .js)" >> /tmp/review_input.txt
          cat /tmp/changed_files.txt | sed 's/^/- /' >> /tmp/review_input.txt || echo "- (none)" >> /tmp/review_input.txt
          echo -e "\n**Excluded:** $EXCLUDED_COUNT generated files (package-lock.json, etc.)" >> /tmp/review_input.txt
          echo -e "\n**Note:** This diff has been filtered to focus on source code containing architectural decisions. Generated dependency files have been excluded to prevent token overflow and maintain review quality focus.\n" >> /tmp/review_input.txt

          echo -e "\n## Filtered PR Diff\n\`\`\`diff" >> /tmp/review_input.txt
          cat /tmp/pr_diff.txt >> /tmp/review_input.txt
          echo -e "\n\`\`\`" >> /tmp/review_input.txt

          # Read prompt and input
          SYSTEM=$(cat /tmp/review_prompt.txt)
          USER_MSG=$(cat /tmp/review_input.txt)

          # Call OpenRouter API (Gemini 2.5 Flash)
          RESPONSE=$(curl -s -X POST "https://openrouter.ai/api/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${OPENROUTER_API_KEY}" \
            -H "HTTP-Referer: https://github.com/demonseed-jpg/pi-daemon" \
            -H "X-Title: pi-daemon-arch-review" \
            -d "$(jq -n \
              --arg system "$SYSTEM" \
              --arg user "$USER_MSG" \
              '{
                "model": "google/gemini-2.5-flash",
                "messages": [
                  {"role": "system", "content": $system},
                  {"role": "user", "content": $user}
                ],
                "temperature": 0.1,
                "max_tokens": 4096
              }')")

          # Extract the content from the response
          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          if [ -z "$REVIEW" ]; then
            echo "::error::LLM returned empty response"
            echo "$RESPONSE" | jq . 2>/dev/null || echo "$RESPONSE"
            # Write a fallback review
            REVIEW='{"verdict":"PASS","summary":"Review could not be completed — LLM returned empty response. Defaulting to PASS.","checks":[],"issues":[],"notes":"The OpenRouter API call did not return a valid response. Check the OPENROUTER_API_KEY secret and API availability."}'
          fi

          # Clean the response — strip markdown fences if present
          REVIEW=$(echo "$REVIEW" | sed 's/^```json//; s/^```//; s/```$//' | sed '/^$/d')

          # Save the review
          echo "$REVIEW" > /tmp/review_result.json

          # Extract verdict
          VERDICT=$(echo "$REVIEW" | jq -r '.verdict // "PASS"')
          echo "verdict=$VERDICT" >> $GITHUB_OUTPUT

          echo "Review complete: $VERDICT"

      - name: Create Check Run
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let review;
            try {
              const raw = fs.readFileSync('/tmp/review_result.json', 'utf8');
              review = JSON.parse(raw);
            } catch (e) {
              console.log('Failed to parse review JSON:', e.message);
              review = {
                verdict: 'PASS',
                summary: 'Review JSON parse failed — defaulting to PASS',
                checks: [],
                issues: [],
                notes: 'Raw output could not be parsed as JSON.'
              };
            }

            // Don't trust the LLM's verdict — compute it from structured output.
            // If any check has status "fail", the verdict is FAIL regardless of
            // what the LLM decided. This prevents the model from passing a review
            // that contains ❌ failures (see #52).
            const hasFailedCheck = (review.checks || []).some(c => c.status === 'fail');
            const hasErrorIssue = (review.issues || []).some(i => i.severity === 'error');
            const verdict = (hasFailedCheck || hasErrorIssue) ? 'FAIL' : (review.verdict || 'PASS');
            const conclusion = verdict === 'PASS' ? 'success' : 'failure';

            // Build check run summary
            const checksTable = (review.checks || [])
              .map(c => {
                const icon = c.status === 'pass' ? '✅' : c.status === 'fail' ? '❌' : '⏭️';
                return `| ${icon} | ${c.name} | ${c.detail || ''} |`;
              })
              .join('\n');

            const issuesList = (review.issues || [])
              .map(i => {
                const icon = i.severity === 'error' ? '🔴' : i.severity === 'warning' ? '🟡' : 'ℹ️';
                const file = i.file ? `\`${i.file}\`: ` : '';
                return `- ${icon} ${file}${i.description}`;
              })
              .join('\n');

            const sourceCount = '${{ steps.diff.outputs.source_files }}';
            const excludedCount = '${{ steps.diff.outputs.excluded_files }}';
            const diffSize = '${{ steps.diff.outputs.diff_size }}';

            let summary = `## ${verdict === 'PASS' ? '✅' : '❌'} 🏗️ Architectural Review: ${verdict}\n\n`;
            summary += `**${review.summary || 'No summary'}**\n\n`;
            
            // File filtering summary
            summary += `### 📁 File Classification (Intelligent Filtering)\n`;
            summary += `**Reviewed:** ${sourceCount} source files (.rs, .ts, .js)\n`;
            summary += `**Excluded:** ${excludedCount} generated files (package-lock.json, etc.)\n`;
            summary += `**Context Size:** ${Math.round(diffSize/1000)}KB focused diff\n\n`;

            if (checksTable) {
              summary += `### ✅ Architectural Compliance Checks\n\n| Status | Check | Detail |\n|--------|-------|--------|\n${checksTable}\n\n`;
            }

            if (issuesList) {
              summary += `### Issues\n\n${issuesList}\n\n`;
            }

            if (review.notes) {
              summary += `### Notes\n\n${review.notes}\n`;
            }

            // Create the check run (native GitHub check)
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: '🏗️ Architectural Review',
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion: conclusion,
              output: {
                title: `🏗️ Architecture: ${verdict}`,
                summary: summary,
              },
            });

            // Post PR comment
            const commentBody = summary + `\n---\n*🤖 Enhanced architectural review: Intelligent file filtering + dual-layer analysis*`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes('🏗️ Architectural Review:'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
              });
            }

            // Fail the job if verdict is FAIL
            if (verdict === 'FAIL') {
              core.setFailed(`Architectural review failed: ${review.summary}`);
            }
