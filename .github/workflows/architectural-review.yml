name: Architectural Review

on:
  pull_request:
    branches: [main]

jobs:
  architectural-review:
    name: Architectural Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        run: |
          git diff --name-only origin/main...HEAD > changed_files.txt
          echo "Changed files:"
          cat changed_files.txt

      - name: Extract code context
        id: extract-code
        run: |
          echo "# Code Context for Architectural Review" > review_context.md
          echo "" >> review_context.md
          echo "## Changed Files" >> review_context.md
          echo "" >> review_context.md
          
          # Add each changed file's content
          while IFS= read -r file; do
            if [[ "$file" == *.rs ]] || [[ "$file" == *.toml ]] || [[ "$file" == *.md ]] || [[ "$file" == *.yml ]] || [[ "$file" == *.yaml ]]; then
              echo "### $file" >> review_context.md
              echo "" >> review_context.md
              echo "\`\`\`" >> review_context.md
              if [ -f "$file" ]; then
                head -500 "$file" >> review_context.md  # Limit to first 500 lines
              fi
              echo "\`\`\`" >> review_context.md
              echo "" >> review_context.md
            fi
          done < changed_files.txt

      - name: Run architectural review
        uses: actions/github-script@v7
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        with:
          script: |
            const fs = require('fs');
            
            if (!process.env.OPENROUTER_API_KEY) {
              console.log('⚠️ OPENROUTER_API_KEY not set, skipping architectural review');
              return;
            }

            const reviewContext = fs.readFileSync('review_context.md', 'utf8');
            
            const prompt = `You are an expert Rust code reviewer for the pi-daemon project. Review this PR against the project's architecture and coding standards.

**IMPORTANT: Be more stringent than before. Use these STRICT criteria:**

## Strict Pass/Fail Criteria

❌ **FAIL if:**
- Any placeholder tests like \`assert_eq!(2 + 2, 4)\` or \`it_works()\` 
- Any \`unwrap()\` in library code (except tests)
- Missing error handling with proper \`Result<>\` types
- Missing doc comments on public APIs
- Tests that don't actually test the intended functionality
- TODO comments without GitHub issue references
- Hardcoded values that should be configurable
- Missing \`thiserror\` for error types
- Using \`println!\` instead of \`tracing\` in library code

⚠️ **WARN if:**
- Test coverage below reasonable thresholds
- Complex functions without unit tests  
- Missing integration tests for new features
- Inconsistent naming patterns
- Code duplication that could be extracted

✅ **PASS only if:**
- All tests are meaningful and test actual functionality
- Proper error handling throughout
- All public APIs documented
- Follows documented patterns (DashMap, broadcast channels, etc.)
- No security issues or credential leaks

## Review the following changes:

${reviewContext}

Respond with a markdown table showing each check and its status, followed by specific issues found. Be strict but fair.`;

            try {
              const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Authorization': \`Bearer \${process.env.OPENROUTER_API_KEY}\`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  model: 'anthropic/claude-3.5-sonnet',
                  messages: [{ role: 'user', content: prompt }],
                  max_tokens: 2000
                })
              });

              if (!response.ok) {
                throw new Error(\`HTTP \${response.status}: \${response.statusText}\`);
              }

              const data = await response.json();
              const reviewResult = data.choices[0].message.content;
              
              // Determine if review passes based on content
              const hasFailures = reviewResult.includes('❌') || reviewResult.toLowerCase().includes('fail');
              const reviewStatus = hasFailures ? '❌ FAIL' : '✅ PASS';
              
              const commitSha = context.sha.slice(0, 7);
              const body = \`## 🏗️ Architectural Review: \${reviewStatus} (\${commitSha})

\${reviewResult}

---
*🤖 Enhanced architectural review powered by Claude 3.5 Sonnet*
*Commit: \${commitSha}*\`;

              // Find existing architectural review comment
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });
              
              const existing = comments.find(c => 
                c.user.login === 'github-actions[bot]' && 
                c.body.includes('🏗️ Architectural Review')
              );
              
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }

              // Set check status
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'Architectural Review',
                head_sha: context.sha,
                status: 'completed',
                conclusion: hasFailures ? 'failure' : 'success',
                output: {
                  title: \`Architectural Review: \${reviewStatus}\`,
                  summary: hasFailures ? 'Code review failed - see PR comment for details' : 'All architectural checks passed'
                }
              });

            } catch (error) {
              console.error('Architectural review failed:', error);
              
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'Architectural Review',
                head_sha: context.sha,
                status: 'completed',
                conclusion: 'neutral',
                output: {
                  title: 'Architectural Review: ERROR',
                  summary: \`Review failed: \${error.message}\`
                }
              });
            }