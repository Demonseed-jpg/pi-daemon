name: Security

# Reusable security workflow — called by pr-pipeline.yml.
# Consolidates all security checks: secrets scanning (from standalone
# security.yml), cargo-audit, license compliance, unsafe code detection,
# and npm dependency auditing.
#
# Phase 2 of CI Orchestrator (#126). Security runs in parallel with
# lint-format after scope gate passes (enforced via needs: [scope-gate]
# in the orchestrator).

on:
  workflow_call:
    inputs:
      has_rust:
        description: "PR contains Rust source changes"
        type: boolean
        default: true
      has_deps:
        description: "PR contains Cargo.toml/Cargo.lock changes"
        type: boolean
        default: true
      has_ts:
        description: "PR contains TypeScript/JavaScript changes"
        type: boolean
        default: true
      has_npm:
        description: "PR contains npm/yarn/pnpm lockfile changes"
        type: boolean
        default: true

# Concurrency is primarily managed by the orchestrator (pr-pipeline.yml),
# but we include a group here for the config review check and as a safety net.
concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── TruffleHog Secrets Scan ────────────────────────────
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install trufflehog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan for secrets
        id: scan
        run: |
          trufflehog filesystem . \
            --no-update \
            --fail \
            --only-verified \
            --exclude-paths=<(echo -e "target/\n.git/\nCargo.lock\nnode_modules/") \
            2>&1 | tee /tmp/trufflehog_output.txt
        continue-on-error: true

      - name: Report secrets as annotations
        if: steps.scan.outcome == 'failure'
        run: |
          # Parse trufflehog output for file:line references and emit annotations.
          # TruffleHog JSON output contains "SourceMetadata" with file/line info.
          # Fall back to grep-based parsing for plain-text output.
          TOTAL=0
          ANNOTATED=0
          MAX_ANNOTATIONS=10

          # Try to extract file:line pairs from the output
          while IFS= read -r line; do
            # Match patterns like "File: path/to/file" or "file=path line=N"
            file=$(echo "$line" | grep -oP '(?<=File: )\S+' || true)
            lineno=$(echo "$line" | grep -oP '(?<=Line: )\d+' || true)

            if [ -n "$file" ]; then
              TOTAL=$((TOTAL + 1))
              if [ "$ANNOTATED" -lt "$MAX_ANNOTATIONS" ]; then
                if [ -n "$lineno" ]; then
                  echo "::error file=${file},line=${lineno}::Verified secret detected by TruffleHog"
                else
                  echo "::error file=${file}::Verified secret detected by TruffleHog"
                fi
                ANNOTATED=$((ANNOTATED + 1))
              fi
            fi
          done < /tmp/trufflehog_output.txt

          # If no structured file refs found, count non-empty lines as findings
          if [ "$TOTAL" -eq 0 ]; then
            TOTAL=$(grep -c '\S' /tmp/trufflehog_output.txt || echo "1")
            echo "::error::TruffleHog found verified secrets in this PR"
          fi

          # Overflow: remaining findings go to step summary
          if [ "$TOTAL" -gt "$MAX_ANNOTATIONS" ]; then
            echo "::error::${TOTAL} secrets detected (showing first ${MAX_ANNOTATIONS} inline)"
          fi

          # Always write full detail to step summary
          {
            echo "## 🔴 Secrets Detected"
            echo ""
            echo "TruffleHog found verified secrets in this PR. **These must be removed before merge.**"
            echo ""
            echo '```'
            head -c 3000 /tmp/trufflehog_output.txt
            echo '```'
            echo ""
            echo "### How to fix"
            echo "1. Remove the secret from the code"
            echo "2. Rotate the compromised credential immediately"
            echo '3. Use environment variables or `~/.pi-daemon/config.toml` for secrets'
          } >> "$GITHUB_STEP_SUMMARY"

          exit 1

  # ─── Hardcoded Credential Patterns ──────────────────────
  credential-patterns:
    name: Credential Patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan diff for credential patterns
        id: scan
        run: |
          PATTERNS='(sk-ant-[a-zA-Z0-9]{20,}|sk-proj-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36}|github_pat_[a-zA-Z0-9]{22}_[a-zA-Z0-9]{59}|glpat-[a-zA-Z0-9\-]{20,}|xoxb-[0-9]{10,}|xoxp-[0-9]{10,}|AKIA[0-9A-Z]{16})'

          # Scan changed files (not the entire repo) with file:line context
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD -- ':!*.lock' ':!.github/workflows/_security.yml' 2>/dev/null \
            || git diff --name-only HEAD~1 -- ':!*.lock' ':!.github/workflows/_security.yml' 2>/dev/null \
            || echo "")

          : > /tmp/credential_findings.txt
          TOTAL=0

          for f in $CHANGED_FILES; do
            [ -f "$f" ] || continue
            while IFS=: read -r lineno content; do
              [ -n "$lineno" ] || continue
              echo "${f}:${lineno}:${content}" >> /tmp/credential_findings.txt
              TOTAL=$((TOTAL + 1))
            done < <(grep -Pn "$PATTERNS" "$f" 2>/dev/null || true)
          done

          if [ "$TOTAL" -gt 0 ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

            # Emit up to 10 inline annotations
            MAX_ANNOTATIONS=10
            ANNOTATED=0
            while IFS=: read -r file line content; do
              if [ "$ANNOTATED" -lt "$MAX_ANNOTATIONS" ]; then
                echo "::error file=${file},line=${line}::Potential hardcoded credential detected: ${content:0:80}"
                ANNOTATED=$((ANNOTATED + 1))
              fi
            done < /tmp/credential_findings.txt

            if [ "$TOTAL" -gt "$MAX_ANNOTATIONS" ]; then
              echo "::error::${TOTAL} credential patterns found (showing first ${MAX_ANNOTATIONS} inline)"
            fi

            # Full detail in step summary
            {
              echo "## 🟡 Potential Credentials Detected"
              echo ""
              echo "Hardcoded credential patterns found in this PR's changed files:"
              echo ""
              echo '```'
              head -c 2000 /tmp/credential_findings.txt
              echo '```'
              echo ""
              echo "If these are intentional (e.g., regex patterns in a scanner), this warning can be ignored."
              echo "Otherwise, move secrets to environment variables or config files."
            } >> "$GITHUB_STEP_SUMMARY"

            exit 1
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No credential patterns found in changed files"
          fi

  # ─── License & Supply Chain ─────────────────────────────
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    if: inputs.has_rust || inputs.has_deps
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          log-level: warn
          command: check

  # ─── Unsafe Code Detection ─────────────────────────────
  unsafe-check:
    name: Unsafe Code Detection
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && inputs.has_rust
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for new unsafe code
        run: |
          NEW_UNSAFE=$(git diff origin/main...HEAD -- '*.rs' | grep -n '^\+.*unsafe ' | grep -v '^\+.*//.*unsafe' || true)
          
          if [ -n "$NEW_UNSAFE" ]; then
            echo "::error::New unsafe code detected. pi-daemon must be 100% safe Rust."
            echo "If this is intentional, add a comment explaining why:"
            echo "$NEW_UNSAFE"
            exit 1
          else
            echo "✅ No unsafe code detected"
          fi

  # ─── Security Audit (cargo-audit) ──────────────────────
  cargo-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    if: inputs.has_rust || inputs.has_deps
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: cargo audit
        continue-on-error: true

      - name: Check for known vulnerabilities
        run: cargo audit --deny warnings || true

  # ─── npm/Yarn Dependency Security ───────────────────────
  npm-security:
    name: npm Security Audit
    runs-on: ubuntu-latest
    if: inputs.has_npm || inputs.has_ts
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for npm/yarn projects
        id: detect
        run: |
          PACKAGE_DIRS=$(find . -name 'package.json' -o -name 'package-lock.json' -o -name 'yarn.lock' -o -name 'pnpm-lock.yaml' | xargs -I {} dirname {} | sort -u | grep -v node_modules || true)
          
          if [ -n "$PACKAGE_DIRS" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "$PACKAGE_DIRS" > /tmp/npm_dirs.txt
            echo "Found npm/yarn projects:"
            echo "$PACKAGE_DIRS"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "No npm/yarn projects found"
          fi

      - name: Setup Node.js
        if: steps.detect.outputs.found == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm security audits
        if: steps.detect.outputs.found == 'true'
        id: audit
        run: |
          OVERALL_STATUS=0
          AUDIT_RESULTS=""
          
          while IFS= read -r dir; do
            if [ -n "$dir" ] && [ -d "$dir" ]; then
              echo "=== Auditing $dir ==="
              cd "$GITHUB_WORKSPACE/$dir"
              
              if [ -f "pnpm-lock.yaml" ]; then
                echo "Using pnpm for $dir"
                npx pnpm audit --audit-level moderate || STATUS=$?
              elif [ -f "yarn.lock" ]; then
                echo "Using Yarn for $dir"
                npx yarn audit --level moderate || STATUS=$?
              else
                echo "Using npm for $dir"
                if [ ! -d "node_modules" ] && [ -f "package.json" ]; then
                  npm ci --only=prod --ignore-scripts 2>/dev/null || npm install --only=prod --ignore-scripts 2>/dev/null || true
                fi
                npm audit --audit-level moderate || STATUS=$?
              fi
              
              if [ "${STATUS:-0}" -ne 0 ]; then
                OVERALL_STATUS=1
                AUDIT_RESULTS="${AUDIT_RESULTS}❌ $dir: vulnerabilities found\n"
              else
                AUDIT_RESULTS="${AUDIT_RESULTS}✅ $dir: no vulnerabilities\n"
              fi
              
              cd "$GITHUB_WORKSPACE"
            fi
          done < /tmp/npm_dirs.txt
          
          echo -e "$AUDIT_RESULTS" > /tmp/npm_audit_results.txt
          
          if [ "$OVERALL_STATUS" -ne 0 ]; then
            echo "vulnerabilities=true" >> $GITHUB_OUTPUT
            echo "::error::npm security vulnerabilities found"
            exit 1
          else
            echo "vulnerabilities=false" >> $GITHUB_OUTPUT
            echo "No npm security vulnerabilities found"
          fi
        continue-on-error: true

      - name: Report npm vulnerabilities as annotations
        if: steps.detect.outputs.found == 'true' && steps.audit.outcome == 'failure'
        run: |
          # npm audit findings don't map to specific source lines — use
          # a generic ::warning annotation plus $GITHUB_STEP_SUMMARY.
          RESULTS=""
          if [ -f /tmp/npm_audit_results.txt ]; then
            RESULTS=$(cat /tmp/npm_audit_results.txt)
          else
            RESULTS="npm audit results not available"
          fi

          VULN_COUNT=$(echo "$RESULTS" | grep -c '❌' || echo "0")
          echo "::warning::npm audit found ${VULN_COUNT} project(s) with vulnerabilities"

          {
            echo "## 🔴 npm Security Vulnerabilities"
            echo ""
            echo "npm security audit found vulnerabilities in JavaScript/TypeScript dependencies."
            echo ""
            echo "### Results Summary"
            echo "$RESULTS"
            echo ""
            echo "### How to fix"
            echo "1. **Run locally:** \`npm audit\` or \`yarn audit\` in affected directories"
            echo "2. **Auto-fix:** \`npm audit fix\` for automated updates"
            echo "3. **Manual review:** Check \`npm audit --audit-level moderate\` output"
            echo "4. **Update deps:** Update vulnerable packages to patched versions"
            echo ""
            echo "### Package Manager Commands"
            echo "- **npm:** \`npm audit\` → \`npm audit fix\`"
            echo "- **Yarn:** \`yarn audit\` → \`yarn upgrade\`"
            echo "- **pnpm:** \`pnpm audit\` → \`pnpm update\`"
          } >> "$GITHUB_STEP_SUMMARY"

          exit 1
