name: Security

# Reusable security workflow — called by pr-pipeline.yml.
# Consolidates all security checks: secrets scanning (from standalone
# security.yml), cargo-audit, license compliance, unsafe code detection,
# and npm dependency auditing.
#
# Phase 2 of CI Orchestrator (#126). Security runs in parallel with
# lint-format after scope gate passes (enforced via needs: [scope-gate]
# in the orchestrator).

on:
  workflow_call:

# Concurrency is primarily managed by the orchestrator (pr-pipeline.yml),
# but we include a group here for the config review check and as a safety net.
concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── TruffleHog Secrets Scan ────────────────────────────
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install trufflehog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan for secrets
        id: scan
        run: |
          trufflehog filesystem . \
            --no-update \
            --fail \
            --only-verified \
            --exclude-paths=<(echo -e "target/\n.git/\nCargo.lock\nnode_modules/") \
            2>&1 | tee /tmp/trufflehog_output.txt
        continue-on-error: true

      - name: Report secrets
        if: steps.scan.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/trufflehog_output.txt', 'utf8');

            const body = `## 🔴 Secrets Detected

            TruffleHog found verified secrets in this PR. **These must be removed before merge.**

            \`\`\`
            ${output.slice(0, 3000)}
            \`\`\`

            ### How to fix
            1. Remove the secret from the code
            2. Rotate the compromised credential immediately
            3. Use environment variables or \`~/.pi-daemon/config.toml\` for secrets

            ---
            *🔒 Automated secrets scan via TruffleHog*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes('Secrets Detected'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

            core.setFailed('Verified secrets detected in PR');

  # ─── Hardcoded Credential Patterns ──────────────────────
  credential-patterns:
    name: Credential Patterns
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan diff for credential patterns
        id: scan
        run: |
          PATTERNS='(sk-ant-[a-zA-Z0-9]{20,}|sk-proj-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36}|github_pat_[a-zA-Z0-9]{22}_[a-zA-Z0-9]{59}|glpat-[a-zA-Z0-9\-]{20,}|xoxb-[0-9]{10,}|xoxp-[0-9]{10,}|AKIA[0-9A-Z]{16})'

          # Only scan the diff, not the entire repo
          DIFF=$(git diff origin/main...HEAD -- ':!*.lock' ':!.github/workflows/_security.yml' 2>/dev/null || git diff HEAD~1 -- ':!*.lock' ':!.github/workflows/_security.yml' 2>/dev/null || echo "")

          FOUND=$(echo "$DIFF" | grep -Pn "^\+" | grep -P "$PATTERNS" || true)

          if [ -n "$FOUND" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "$FOUND" > /tmp/credential_matches.txt
            echo "::error::Potential API keys/tokens found in diff"
            exit 1
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "No credential patterns found in diff"
          fi
        continue-on-error: true

      - name: Report credentials
        if: steps.scan.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let matches = '';
            try { matches = fs.readFileSync('/tmp/credential_matches.txt', 'utf8'); } catch {}

            const body = `## 🟡 Potential Credentials Detected

            Hardcoded credential patterns found in this PR's diff:

            \`\`\`
            ${matches.slice(0, 2000)}
            \`\`\`

            If these are intentional (e.g., regex patterns in a scanner), this warning can be ignored.
            Otherwise, move secrets to environment variables or config files.

            ---
            *🔒 Automated credential pattern scan*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes('Potential Credentials Detected'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

            core.setFailed('Potential credential patterns found');

  # ─── License & Supply Chain ─────────────────────────────
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          log-level: warn
          command: check

  # ─── Unsafe Code Detection ─────────────────────────────
  unsafe-check:
    name: Unsafe Code Detection
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for new unsafe code
        run: |
          NEW_UNSAFE=$(git diff origin/main...HEAD -- '*.rs' | grep -n '^\+.*unsafe ' | grep -v '^\+.*//.*unsafe' || true)
          
          if [ -n "$NEW_UNSAFE" ]; then
            echo "::error::New unsafe code detected. pi-daemon must be 100% safe Rust."
            echo "If this is intentional, add a comment explaining why:"
            echo "$NEW_UNSAFE"
            exit 1
          else
            echo "✅ No unsafe code detected"
          fi

  # ─── Security Audit (cargo-audit) ──────────────────────
  cargo-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run security audit
        run: cargo audit
        continue-on-error: true

      - name: Check for known vulnerabilities
        run: cargo audit --deny warnings || true

  # ─── npm/Yarn Dependency Security ───────────────────────
  npm-security:
    name: npm Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for npm/yarn projects
        id: detect
        run: |
          PACKAGE_DIRS=$(find . -name 'package.json' -o -name 'package-lock.json' -o -name 'yarn.lock' -o -name 'pnpm-lock.yaml' | xargs -I {} dirname {} | sort -u | grep -v node_modules || true)
          
          if [ -n "$PACKAGE_DIRS" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "$PACKAGE_DIRS" > /tmp/npm_dirs.txt
            echo "Found npm/yarn projects:"
            echo "$PACKAGE_DIRS"
          else
            echo "found=false" >> $GITHUB_OUTPUT
            echo "No npm/yarn projects found"
          fi

      - name: Setup Node.js
        if: steps.detect.outputs.found == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm security audits
        if: steps.detect.outputs.found == 'true'
        id: audit
        run: |
          OVERALL_STATUS=0
          AUDIT_RESULTS=""
          
          while IFS= read -r dir; do
            if [ -n "$dir" ] && [ -d "$dir" ]; then
              echo "=== Auditing $dir ==="
              cd "$GITHUB_WORKSPACE/$dir"
              
              if [ -f "pnpm-lock.yaml" ]; then
                echo "Using pnpm for $dir"
                npx pnpm audit --audit-level moderate || STATUS=$?
              elif [ -f "yarn.lock" ]; then
                echo "Using Yarn for $dir"
                npx yarn audit --level moderate || STATUS=$?
              else
                echo "Using npm for $dir"
                if [ ! -d "node_modules" ] && [ -f "package.json" ]; then
                  npm ci --only=prod --ignore-scripts 2>/dev/null || npm install --only=prod --ignore-scripts 2>/dev/null || true
                fi
                npm audit --audit-level moderate || STATUS=$?
              fi
              
              if [ "${STATUS:-0}" -ne 0 ]; then
                OVERALL_STATUS=1
                AUDIT_RESULTS="${AUDIT_RESULTS}❌ $dir: vulnerabilities found\n"
              else
                AUDIT_RESULTS="${AUDIT_RESULTS}✅ $dir: no vulnerabilities\n"
              fi
              
              cd "$GITHUB_WORKSPACE"
            fi
          done < /tmp/npm_dirs.txt
          
          echo -e "$AUDIT_RESULTS" > /tmp/npm_audit_results.txt
          
          if [ "$OVERALL_STATUS" -ne 0 ]; then
            echo "vulnerabilities=true" >> $GITHUB_OUTPUT
            echo "::error::npm security vulnerabilities found"
            exit 1
          else
            echo "vulnerabilities=false" >> $GITHUB_OUTPUT
            echo "No npm security vulnerabilities found"
          fi
        continue-on-error: true

      - name: Report npm vulnerabilities
        if: steps.detect.outputs.found == 'true' && steps.audit.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let results = '';
            try { 
              results = fs.readFileSync('/tmp/npm_audit_results.txt', 'utf8'); 
            } catch { 
              results = 'npm audit results not available'; 
            }

            const body = `## 🔴 npm Security Vulnerabilities

            npm security audit found vulnerabilities in JavaScript/TypeScript dependencies.

            ### Results Summary
            ${results}

            ### How to fix
            1. **Run locally:** \`npm audit\` or \`yarn audit\` in affected directories
            2. **Auto-fix:** \`npm audit fix\` for automated updates
            3. **Manual review:** Check \`npm audit --audit-level moderate\` output
            4. **Update deps:** Update vulnerable packages to patched versions

            ### Package Manager Commands
            - **npm:** \`npm audit\` → \`npm audit fix\`
            - **Yarn:** \`yarn audit\` → \`yarn upgrade\`  
            - **pnpm:** \`pnpm audit\` → \`pnpm update\`

            ---
            *🔒 Automated npm security audit*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes('npm Security Vulnerabilities'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

            core.setFailed('npm security vulnerabilities found');
