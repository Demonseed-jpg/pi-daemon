name: Documentation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  # ─── Sidebar ↔ Files Sync ───────────────────────────────
  sidebar-sync:
    name: Sidebar Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check sidebar matches files
        id: check
        run: |
          # Files in docs/ (excluding _ prefixed)
          find docs/ -maxdepth 1 -name "*.md" ! -name "_*" -printf "%f\n" | sed 's/\.md$//' | sort > /tmp/doc_files.txt

          # Entries in sidebar
          grep -oP '\[\[([^\]]+)\]\]' docs/_Sidebar.md | sed 's/\[\[//;s/\]\]//' | sort > /tmp/sidebar.txt

          ORPHANED=$(comm -23 /tmp/doc_files.txt /tmp/sidebar.txt || true)
          DANGLING=$(comm -13 /tmp/doc_files.txt /tmp/sidebar.txt || true)

          echo "doc_files=$(cat /tmp/doc_files.txt | tr '\n' ',' )"
          echo "sidebar=$(cat /tmp/sidebar.txt | tr '\n' ',')"

          if [ -n "$ORPHANED" ] || [ -n "$DANGLING" ]; then
            echo "mismatch=true" >> $GITHUB_OUTPUT
            echo "orphaned=$ORPHANED" >> $GITHUB_OUTPUT
            echo "dangling=$DANGLING" >> $GITHUB_OUTPUT
          else
            echo "mismatch=false" >> $GITHUB_OUTPUT
            echo "✅ Sidebar and files in sync"
          fi

      - name: Report mismatch
        if: steps.check.outputs.mismatch == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const orphaned = `${{ steps.check.outputs.orphaned }}`.trim();
            const dangling = `${{ steps.check.outputs.dangling }}`.trim();

            let body = '## 📖 Sidebar / Files Mismatch\n\n';

            if (orphaned) {
              body += `**Pages not in sidebar** (add to \`docs/_Sidebar.md\`):\n`;
              orphaned.split('\n').filter(Boolean).forEach(f => { body += `- \`${f}.md\`\n`; });
              body += '\n';
            }

            if (dangling) {
              body += `**Sidebar entries without files** (create the page or remove from sidebar):\n`;
              dangling.split('\n').filter(Boolean).forEach(f => { body += `- \`[[${f}]]\`\n`; });
              body += '\n';
            }

            body += '---\n*📖 Automated sidebar sync check*';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes('Sidebar / Files Mismatch'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

            core.setFailed('Sidebar and docs/ files are out of sync');

  # ─── Markdown Lint ──────────────────────────────────────
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "docs/**/*.md"
        continue-on-error: true

  # ─── Link Validation ────────────────────────────────────
  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: "docs/**/*.md README.md --no-progress --exclude-path target --exclude 'localhost' --exclude '127.0.0.1'"
          fail: false
