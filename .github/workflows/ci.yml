name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

# Cancel in-progress runs for the same PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Minimum supported Rust version
  MSRV: "1.94"

jobs:
  # ─── NOTE: Lint moved to _lint-format.yml (called by pr-pipeline.yml) ───
  # ─── NOTE: Tests (unit, integration, coverage) moved to _test.yml (#126) ───
  # ─── NOTE: Security (audit, license, unsafe, secrets, npm) moved to _security.yml (#126) ───

  unused-deps:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: unused-deps

      - name: Install cargo-machete
        run: cargo install cargo-machete --locked

      - name: Check unused dependencies
        run: cargo machete
        continue-on-error: true  # Warning only

      - name: Post machete results to PR
        if: github.event_name == 'pull_request'
        run: |
          OUTPUT=$(cargo machete 2>&1 || true)
          if echo "$OUTPUT" | grep -q "unused dependencies"; then
            echo "::warning::Unused dependencies detected: $OUTPUT"
          fi

  crate-doc-sync:
    name: Crate Docs Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check crates documented in Architecture.md
        run: |
          # Parse workspace members from Cargo.toml
          grep -A 100 '^\[workspace\]' Cargo.toml | grep -oP '"crates/([^"]+)"' | sed 's/"crates\///;s/"//' | sort > /tmp/crates.txt
          
          # Check each appears in Architecture.md
          MISSING=""
          while IFS= read -r crate; do
            if ! grep -q "$crate" docs/Architecture.md; then
              MISSING="${MISSING}\n- ${crate}"
            fi
          done < /tmp/crates.txt
          
          if [ -n "$MISSING" ]; then
            echo "::warning::Crates not documented in Architecture.md:${MISSING}"
            exit 1  # Make this blocking for now
          else
            echo "✅ All crates documented in Architecture.md"
          fi

  # ─── NOTE: unsafe-check moved to _security.yml (#126) ───

  todo-tracker:
    name: TODO Tracker
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for orphaned TODOs
        run: |
          # Find new TODOs in the diff that don't reference an issue
          NEW_TODOS=$(git diff origin/main...HEAD -- '*.rs' '*.md' | grep -n '^\+.*\(TODO\|FIXME\|HACK\|XXX\)' | grep -v '#[0-9]' || true)
          
          if [ -n "$NEW_TODOS" ]; then
            echo "::warning::New TODOs without issue references:"
            echo "$NEW_TODOS"
            echo ""
            echo "Please add an issue reference: TODO(#42): description"
          else
            echo "✅ All TODOs have issue references"
          fi

  docs-drift:
    name: Docs Drift
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for docs drift
        run: |
          CHANGED=$(git diff origin/main...HEAD --name-only)
          ERRORS=""
          WARNINGS=""
          
          # routes changed → API-Reference.md should too
          if echo "$CHANGED" | grep -q 'routes'; then
            if ! echo "$CHANGED" | grep -q 'API-Reference.md'; then
              ERRORS="${ERRORS}\n❌ Route files changed but docs/API-Reference.md was not updated"
            fi
          fi
          
          # Cargo.toml members changed → Architecture.md should too
          if echo "$CHANGED" | grep -q 'Cargo.toml'; then
            if git diff origin/main...HEAD -- Cargo.toml | grep -q 'members'; then
              if ! echo "$CHANGED" | grep -q 'Architecture.md'; then
                ERRORS="${ERRORS}\n❌ Cargo.toml workspace members changed but docs/Architecture.md was not updated"
              fi
            fi
          fi
          
          # Config types changed → Configuration.md should too
          if echo "$CHANGED" | grep -q 'config\.rs'; then
            if ! echo "$CHANGED" | grep -q 'Configuration.md'; then
              ERRORS="${ERRORS}\n❌ Config code changed but docs/Configuration.md was not updated"
            fi
          fi

          # Workflow files changed → PR-Reviews.md should too
          if echo "$CHANGED" | grep -q '\.github/workflows/'; then
            if ! echo "$CHANGED" | grep -q 'PR-Reviews.md'; then
              ERRORS="${ERRORS}\n❌ Workflow files changed but docs/PR-Reviews.md was not updated"
            fi
          fi

          # deny.toml changed → PR-Reviews.md supply chain section should too
          if echo "$CHANGED" | grep -q 'deny\.toml'; then
            if ! echo "$CHANGED" | grep -qE 'PR-Reviews.md|Architecture.md'; then
              WARNINGS="${WARNINGS}\n⚠️ deny.toml changed but related docs were not updated"
            fi
          fi
          
          if [ -n "$ERRORS" ]; then
            echo -e "Documentation drift detected:${ERRORS}"
            if [ -n "$WARNINGS" ]; then
              echo -e "\nAdditional warnings:${WARNINGS}"
            fi
            echo "::error::Documentation drift detected — update the relevant docs/ files"
            exit 1
          elif [ -n "$WARNINGS" ]; then
            echo -e "Documentation drift warnings:${WARNINGS}"
            echo "::warning::Potential documentation drift (advisory)"
          else
            echo "✅ No documentation drift detected"
          fi

  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check changelog updated
        run: |
          CHANGED=$(git diff origin/main...HEAD --name-only)
          HAS_CHANGELOG=$(echo "$CHANGED" | grep 'CHANGELOG.md' || true)
          
          # Meaningful changes that warrant a changelog entry
          HAS_RS=$(echo "$CHANGED" | grep '\.rs$' || true)
          HAS_WORKFLOWS=$(echo "$CHANGED" | grep '\.github/workflows/' || true)
          HAS_CARGO=$(echo "$CHANGED" | grep 'Cargo\.toml' || true)
          
          HAS_MEANINGFUL=""
          [ -n "$HAS_RS" ] && HAS_MEANINGFUL="Rust source files"
          [ -n "$HAS_WORKFLOWS" ] && HAS_MEANINGFUL="${HAS_MEANINGFUL:+$HAS_MEANINGFUL, }workflow files"
          [ -n "$HAS_CARGO" ] && HAS_MEANINGFUL="${HAS_MEANINGFUL:+$HAS_MEANINGFUL, }Cargo.toml"
          
          if [ -n "$HAS_MEANINGFUL" ] && [ -z "$HAS_CHANGELOG" ]; then
            echo "Changed: $HAS_MEANINGFUL"
            echo "::error::$HAS_MEANINGFUL changed but CHANGELOG.md was not updated"
            exit 1
          else
            echo "✅ Changelog check passed"
          fi

  binary-size:
    name: Binary Size
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: binary-size
      - name: Build release
        run: cargo build --release
      - name: Report size
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const binary = 'target/release/pi-daemon';
            
            if (!fs.existsSync(binary)) {
              console.log('Binary not found, skipping size check');
              return;
            }
            
            const size = fs.statSync(binary).size;
            const sizeMB = (size / 1024 / 1024).toFixed(1);
            
            let msg = `## 📏 Binary Size: ${sizeMB} MB (${size.toLocaleString()} bytes)`;
            if (size > 50 * 1024 * 1024) {
              msg += `\n\n🔴 **Warning:** Binary exceeds 50MB target.`;
            } else {
              msg += `\n\n✅ Binary size is within acceptable range.`;
            }
            
            // Find existing size comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('📏 Binary Size'));
            
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: msg + '\n\n---\n*Updated on each commit*',
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: msg + '\n\n---\n*Updated on each commit*',
              });
            }

  # ─── Build ──────────────────────────────────────────────
  build-release:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          # Future: add windows, more Linux arches
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Check binary size
        run: |
          BINARY="target/${{ matrix.target }}/release/pi-daemon"
          if [ -f "$BINARY" ]; then
            SIZE=$(stat -c%s "$BINARY" 2>/dev/null || stat -f%z "$BINARY" 2>/dev/null)
            SIZE_MB=$((SIZE / 1024 / 1024))
            echo "Binary size: ${SIZE_MB}MB ($SIZE bytes)"
            if [ "$SIZE_MB" -gt 50 ]; then
              echo "::warning::Binary size exceeds 50MB: ${SIZE_MB}MB"
            fi
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: pi-daemon-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/pi-daemon

  # ─── Build Gate ─────────────────────────────────────────
  # Required status check for branch protection (must be named "build")
  build:
    name: build
    runs-on: ubuntu-latest
    # NOTE: lint moved to _lint-format.yml, tests to _test.yml,
    # security/license/unsafe to _security.yml — all via pr-pipeline.yml
    needs: [unused-deps, crate-doc-sync, build-release, msrv]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.build-release.result }}" != "success" ] || \
             [ "${{ needs.msrv.result }}" != "success" ] || \
             [ "${{ needs.unused-deps.result }}" != "success" ] || \
             [ "${{ needs.crate-doc-sync.result }}" != "success" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All required jobs passed"

  # ─── Pi Bridge Extension ────────────────────────────────
  test-bridge:
    name: Pi Bridge Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/pi-daemon-bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx tsc --noEmit  # Type-check only

  # ─── MSRV Check ─────────────────────────────────────────
  msrv:
    name: Minimum Supported Rust Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MSRV }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv

      - name: Check MSRV
        run: cargo check --all-features

  # ─── PR Report ──────────────────────────────────────────
  # This job waits for ALL other jobs before running
  report:
    name: PR Report
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    # NOTE: lint → _lint-format.yml, tests → _test.yml,
    # security/license/unsafe → _security.yml — all via pr-pipeline.yml
    needs: [unused-deps, crate-doc-sync, todo-tracker, docs-drift, changelog, binary-size, build-release, test-bridge, msrv]
    steps:
      - name: Collect results
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              // NOTE: lint → _lint-format.yml, tests → _test.yml,
              // security/license/unsafe → _security.yml (all in pr-pipeline.yml)
              build: '${{ needs.build-release.result }}',
              msrv: '${{ needs.msrv.result }}',
              'unused-deps': '${{ needs.unused-deps.result }}',
              'crate-doc-sync': '${{ needs.crate-doc-sync.result }}',
              'todo-tracker': '${{ needs.todo-tracker.result }}',
              'docs-drift': '${{ needs.docs-drift.result }}',
              changelog: '${{ needs.changelog.result }}',
              'binary-size': '${{ needs.binary-size.result }}',
              'test-bridge': '${{ needs.test-bridge.result }}',
            };
            
            const icon = (s) => s === 'success' ? '✅' : s === 'skipped' ? '⏭️' : '❌';
            const rows = Object.entries(jobs)
              .map(([name, result]) => `| ${icon(result)} | ${name} | ${result} |`)
              .join('\n');
            
            const allPassed = Object.values(jobs).every(r => r === 'success' || r === 'skipped');
            const header = allPassed ? '## ✅ All CI checks passed' : '## ❌ CI checks failed';
            
            const commitSha = (context.payload.pull_request?.head?.sha || context.sha).slice(0, 7);
            const body = header + " (" + commitSha + ")\n\n" +
              "| Status | Job | Result |\n" +
              "|--------|-----|---------|\n" +
              rows + "\n\n---\n" +
              "*Run: [" + context.runId + "](" + context.serverUrl + "/" + context.repo.owner + "/" + context.repo.repo + "/actions/runs/" + context.runId + ")*\n" +
              "*Commit: " + commitSha + "*";
            
            // Find existing PR report comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const existing = comments.find(c => 
              c.user.login === 'github-actions[bot]' && 
              c.body.includes('CI checks')
            );
            
            if (existing) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

            // Set outputs for auto-approve
            core.setOutput('all-passed', allPassed);
