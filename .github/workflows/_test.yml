name: Tests

# Reusable test workflow — called by pr-pipeline.yml.
# Contains unit tests (per-crate matrix), integration tests, and coverage.
# Coverage depends on test-unit internally.
#
# Phase 2 of CI Orchestrator (#126). Tests run after lint passes
# (enforced via needs: [lint-format] in the orchestrator).

on:
  workflow_call:
    inputs:
      has_rust:
        description: "PR contains Rust source changes"
        type: boolean
        default: true

# Concurrency is primarily managed by the orchestrator (pr-pipeline.yml),
# but we include a group here for the config review check and as a safety net.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Unit Tests ─────────────────────────────────────────
  test-unit:
    name: Unit Tests (${{ matrix.crate }})
    runs-on: ubuntu-latest
    if: inputs.has_rust
    strategy:
      fail-fast: false
      matrix:
        crate:
          - pi-daemon-types
          - pi-daemon-kernel
          - pi-daemon-api
          - pi-daemon-cli
          # Future crates added here as they're created:
          # - pi-daemon-memory
          # - pi-daemon-hands
          # - pi-daemon-wire
          # - pi-daemon-channels
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.crate }}

      - name: Run unit tests
        run: cargo test -p ${{ matrix.crate }} -- --nocapture
        env:
          RUST_LOG: debug

  # ─── Integration Tests ──────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: inputs.has_rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: integration

      - name: Run integration tests
        run: cargo test --tests -- --nocapture
        env:
          RUST_LOG: debug
          PI_DAEMON_TEST: "1"
          PI_DAEMON_LISTEN_ADDR: "127.0.0.1:0"

  # ─── Coverage ───────────────────────────────────────────
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    if: inputs.has_rust
    needs: [test-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info

      - name: Coverage summary
        run: cargo llvm-cov --all-features --workspace --text | tee coverage-summary.txt

      - name: Write coverage step summary
        if: github.event_name == 'pull_request'
        run: |
          echo "## 📊 Code Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat coverage-summary.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Post coverage commit status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('coverage-summary.txt', 'utf8');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.payload.pull_request?.head?.sha || context.sha;

            // Extract total coverage percentage from TOTAL line
            const lines = summary.split('\n');
            const totalLine = lines.find(l => l.includes('TOTAL'));
            let totalCoverage = '?';
            if (totalLine) {
              // cargo-llvm-cov text output: columns are Region/Function/Line/Branch percentages
              // The line percentage is the most relevant — typically the last percentage before the TOTAL label area
              const pcts = totalLine.match(/(\d+\.\d+)%/g);
              if (pcts && pcts.length > 0) {
                // Use the last percentage (line coverage) as the headline number
                totalCoverage = pcts[pcts.length - 1].replace('%', '');
              }
            }

            // Build per-crate summary from lines containing crate names
            const crateLines = lines.filter(l =>
              l.match(/^\s*(pi[-_]daemon[-_]\w+|pi[-_]daemon)\s/) && !l.includes('TOTAL')
            );
            const crateSummaries = crateLines.map(l => {
              const name = l.trim().split(/\s+/)[0];
              const pcts = l.match(/(\d+\.\d+)%/g);
              const pct = pcts && pcts.length > 0 ? pcts[pcts.length - 1].replace('%', '') : '?';
              // Shorten crate names: pi-daemon-kernel → kernel
              const short = name.replace(/^pi[-_]daemon[-_]?/, '') || 'root';
              return `${short}: ${pct}%`;
            }).join(', ');

            // Build description — must be ≤140 chars
            let description = `${totalCoverage}% overall`;
            if (crateSummaries) {
              const withCrates = `${totalCoverage}% overall (${crateSummaries})`;
              if (withCrates.length <= 140) {
                description = withCrates;
              } else {
                // Truncate gracefully
                description = withCrates.slice(0, 137) + '...';
              }
            }

            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            // Post commit status
            await github.rest.repos.createCommitStatus({
              owner, repo, sha,
              state: 'success',
              context: 'coverage',
              description,
              target_url: runUrl,
            });
            core.info(`Posted coverage status: ${description}`);

            // One-time cleanup: delete legacy coverage PR comment if present
            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner, repo,
                issue_number: context.issue.number,
              });
              const existing = comments.find(c =>
                c.user.login === 'github-actions[bot]' &&
                c.body.includes('📊 Code Coverage')
              );
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner, repo,
                  comment_id: existing.id,
                });
                core.info(`Deleted legacy coverage comment #${existing.id}`);
              }
            } catch (e) {
              core.warning(`Failed to clean up legacy coverage comment: ${e.message}`);
            }
