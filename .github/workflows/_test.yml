name: Tests

# Reusable test workflow — called by pr-pipeline.yml.
# Contains unit tests (per-crate matrix), integration tests, and coverage.
# Coverage depends on test-unit internally.
#
# Phase 2 of CI Orchestrator (#126). Tests run after lint passes
# (enforced via needs: [lint-format] in the orchestrator).

on:
  workflow_call:

# Concurrency is primarily managed by the orchestrator (pr-pipeline.yml),
# but we include a group here for the config review check and as a safety net.
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Unit Tests ─────────────────────────────────────────
  test-unit:
    name: Unit Tests (${{ matrix.crate }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - pi-daemon-types
          - pi-daemon-kernel
          - pi-daemon-api
          - pi-daemon-cli
          # Future crates added here as they're created:
          # - pi-daemon-memory
          # - pi-daemon-hands
          # - pi-daemon-wire
          # - pi-daemon-channels
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.crate }}

      - name: Run unit tests
        run: cargo test -p ${{ matrix.crate }} -- --nocapture
        env:
          RUST_LOG: debug

  # ─── Integration Tests ──────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: integration

      - name: Run integration tests
        run: cargo test --tests -- --nocapture
        env:
          RUST_LOG: debug
          PI_DAEMON_TEST: "1"
          PI_DAEMON_LISTEN_ADDR: "127.0.0.1:0"

  # ─── Coverage ───────────────────────────────────────────
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [test-unit]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info

      - name: Coverage summary
        run: cargo llvm-cov --all-features --workspace --text | tee coverage-summary.txt

      - name: Post coverage to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('coverage-summary.txt', 'utf8');
            
            // Extract total line from coverage output
            const lines = summary.split('\n');
            const totalLine = lines.find(l => l.includes('TOTAL'));
            
            const commitSha = (context.payload.pull_request?.head?.sha || context.sha).slice(0, 7);
            const body = "## 📊 Code Coverage (" + commitSha + ")\n\n" +
              "```\n" + lines.slice(-10).join('\n') + "\n```\n\n" +
              "<details>\n<summary>Full coverage report</summary>\n\n" +
              "```\n" + summary + "\n```\n</details>\n\n" +
              "*Coverage for commit: " + commitSha + "*";
            
            // Find existing coverage comment for this commit
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            // Look for existing coverage comment
            const existing = comments.find(c => 
              c.user.login === 'github-actions[bot]' && 
              c.body.includes('📊 Code Coverage')
            );
            
            if (existing) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
