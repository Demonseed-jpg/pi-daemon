name: Sandbox Test

on:
  pull_request:
    branches: [main]
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'

permissions:
  contents: read
  checks: write

jobs:
  sandbox:
    name: Sandbox Integration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
      
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: sandbox

      - name: Install dependencies
        run: |
          # Install jq for JSON parsing
          sudo apt-get update && sudo apt-get install -y jq
          
          # Install websocat for WebSocket testing
          curl -L https://github.com/vi/websocat/releases/download/v1.13.0/websocat.x86_64-unknown-linux-musl \
            -o websocat && chmod +x websocat && sudo mv websocat /usr/local/bin/

      - name: Build release binary
        run: |
          echo "Building pi-daemon in release mode..."
          cargo build --release
          ls -la target/release/pi-daemon

      # ─── Phase 1: Smoke Test ─────────────────────────────

      - name: "Smoke: Start daemon in foreground"
        run: |
          echo "Starting pi-daemon in foreground..."
          timeout 300 ./target/release/pi-daemon start --foreground &
          DAEMON_PID=$!
          echo "DAEMON_PID=$DAEMON_PID" >> $GITHUB_ENV
          echo "Daemon PID: $DAEMON_PID"

          # Wait for daemon to be ready (poll health endpoint)
          echo "Waiting for daemon to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4200/api/health >/dev/null 2>&1; then
              echo "✅ Daemon ready after ${i}s"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Daemon failed to start within 30s"
              exit 1
            fi
            sleep 1
          done

      - name: "Smoke: Health check"
        run: |
          echo "Testing health check endpoint..."
          RESP=$(curl -sf http://127.0.0.1:4200/api/health)
          echo "Health response: $RESP"
          echo "$RESP" | jq -e '.status == "ok"' || { 
            echo "❌ Health check failed: $RESP"; exit 1; 
          }
          echo "✅ Health check passed"

      - name: "Smoke: Status endpoint"
        run: |
          echo "Testing status endpoint..."
          RESP=$(curl -sf http://127.0.0.1:4200/api/status)
          echo "Status response: $RESP"
          
          echo "$RESP" | jq -e '.version' || { 
            echo "❌ Status missing version: $RESP"; exit 1; 
          }
          echo "$RESP" | jq -e '.uptime_secs >= 0' || { 
            echo "❌ Status missing uptime: $RESP"; exit 1; 
          }
          echo "$RESP" | jq -e '.agent_count >= 0' || { 
            echo "❌ Status missing agent_count: $RESP"; exit 1; 
          }
          echo "✅ Status endpoint passed"

      - name: "Smoke: Agent CRUD lifecycle"
        run: |
          echo "Testing agent CRUD operations..."
          
          # Register agent
          echo "Registering test agent..."
          RESP=$(curl -sf -X POST http://127.0.0.1:4200/api/agents \
            -H "Content-Type: application/json" \
            -d '{"name":"sandbox-test-agent","kind":"api_client"}')
          echo "Register response: $RESP"
          AGENT_ID=$(echo "$RESP" | jq -r '.agent_id')
          echo "Agent ID: $AGENT_ID"
          [ "$AGENT_ID" != "null" ] || { 
            echo "❌ Agent registration failed"; exit 1; 
          }

          # List agents
          echo "Listing agents..."
          AGENTS=$(curl -sf http://127.0.0.1:4200/api/agents)
          echo "$AGENTS" | jq -e 'length > 0' || { 
            echo "❌ Agent list empty"; exit 1; 
          }
          AGENT_COUNT=$(echo "$AGENTS" | jq 'length')
          echo "Found $AGENT_COUNT agents"

          # Get specific agent
          echo "Getting agent details..."
          AGENT_DETAIL=$(curl -sf "http://127.0.0.1:4200/api/agents/$AGENT_ID")
          echo "$AGENT_DETAIL" | jq -e '.name == "sandbox-test-agent"' || { 
            echo "❌ Agent get failed"; exit 1; 
          }

          # Heartbeat
          echo "Sending heartbeat..."
          curl -sf -X POST "http://127.0.0.1:4200/api/agents/$AGENT_ID/heartbeat" >/dev/null

          # Delete agent
          echo "Deleting agent..."
          curl -sf -X DELETE "http://127.0.0.1:4200/api/agents/$AGENT_ID"

          # Verify deletion
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:4200/api/agents/$AGENT_ID")
          [ "$HTTP_CODE" = "404" ] || { 
            echo "❌ Agent not deleted (got $HTTP_CODE)"; exit 1; 
          }
          echo "✅ Agent CRUD lifecycle passed"

      - name: "Smoke: Webchat page loads"
        run: |
          echo "Testing webchat page..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4200/)
          [ "$HTTP_CODE" = "200" ] || { 
            echo "❌ Webchat returned $HTTP_CODE"; exit 1; 
          }

          # Verify HTML content
          CONTENT=$(curl -sf http://127.0.0.1:4200/)
          echo "$CONTENT" | grep -q "PI-DAEMON\|pi-daemon" || { 
            echo "❌ Webchat missing expected content"; exit 1; 
          }
          
          # Check it's substantial (not just placeholder)
          CONTENT_SIZE=$(echo "$CONTENT" | wc -c)
          echo "Webchat content size: ${CONTENT_SIZE} bytes"
          [ "$CONTENT_SIZE" -gt 50000 ] || { 
            echo "❌ Webchat content too small (${CONTENT_SIZE} bytes)"; exit 1; 
          }
          echo "✅ Webchat page passed"

      - name: "Smoke: OpenAI-compatible endpoint"
        run: |
          echo "Testing OpenAI-compatible endpoint..."
          
          # Non-streaming request
          RESP=$(curl -sf -X POST http://127.0.0.1:4200/v1/chat/completions \
            -H "Content-Type: application/json" \
            -d '{"model":"sandbox-test","messages":[{"role":"user","content":"hello world"}],"stream":false}')
          echo "OpenAI response: $RESP"
          
          # Validate response structure
          echo "$RESP" | jq -e '.id' || { echo "❌ Missing completion ID"; exit 1; }
          echo "$RESP" | jq -e '.object == "chat.completion"' || { echo "❌ Wrong object type"; exit 1; }
          echo "$RESP" | jq -e '.choices[0].message.content' || { echo "❌ Missing content"; exit 1; }
          echo "$RESP" | jq -e '.usage.total_tokens > 0' || { echo "❌ Missing usage"; exit 1; }
          
          # Streaming request
          echo "Testing streaming mode..."
          STREAM_RESP=$(curl -sf -X POST http://127.0.0.1:4200/v1/chat/completions \
            -H "Content-Type: application/json" \
            -d '{"model":"sandbox-test","messages":[{"role":"user","content":"test"}],"stream":true}')
          
          echo "$STREAM_RESP" | grep -q "data: {" || { echo "❌ Streaming format invalid"; exit 1; }
          echo "$STREAM_RESP" | grep -q "data: \[DONE\]" || { echo "❌ Missing [DONE]"; exit 1; }
          echo "✅ OpenAI-compatible endpoint passed"

      - name: "Smoke: PID file management"
        run: |
          echo "Testing PID file management..."
          [ -f ~/.pi-daemon/daemon.json ] || { 
            echo "❌ daemon.json not found"; exit 1; 
          }
          
          DAEMON_JSON=$(cat ~/.pi-daemon/daemon.json)
          echo "Daemon JSON: $DAEMON_JSON"
          
          echo "$DAEMON_JSON" | jq -e '.pid' || { 
            echo "❌ PID not in daemon.json"; exit 1; 
          }
          echo "$DAEMON_JSON" | jq -e '.listen_addr' || { 
            echo "❌ Address not in daemon.json"; exit 1; 
          }
          echo "$DAEMON_JSON" | jq -e '.version' || { 
            echo "❌ Version not in daemon.json"; exit 1; 
          }
          echo "✅ PID file management passed"

      # ─── Phase 2: Concurrency & Load Testing ─────────────

      - name: "Load: Concurrent HTTP requests"
        run: |
          echo "Testing concurrent HTTP load..."
          
          # 50 parallel requests to /api/status  
          echo "Sending 50 concurrent HTTP requests..."
          for i in $(seq 1 50); do
            curl -sf http://127.0.0.1:4200/api/status -o /dev/null &
          done
          wait
          echo "✅ 50 concurrent HTTP requests completed"

      - name: "Load: Concurrent agent registrations"
        run: |
          echo "Testing concurrent agent registrations..."
          
          # Get baseline agent count
          BASELINE_COUNT=$(curl -sf http://127.0.0.1:4200/api/agents | jq 'length')
          echo "Baseline agent count: $BASELINE_COUNT"
          
          # Register 20 agents concurrently
          echo "Registering 20 agents concurrently..."
          for i in $(seq 1 20); do
            curl -sf -X POST http://127.0.0.1:4200/api/agents \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"load-test-agent-$i\",\"kind\":\"api_client\"}" -o /dev/null &
          done
          wait

          # Verify registrations succeeded
          FINAL_COUNT=$(curl -sf http://127.0.0.1:4200/api/agents | jq 'length')
          EXPECTED_COUNT=$((BASELINE_COUNT + 20))
          echo "Final agent count: $FINAL_COUNT (expected: $EXPECTED_COUNT)"
          
          [ "$FINAL_COUNT" -ge "$EXPECTED_COUNT" ] || { 
            echo "❌ Expected >=$EXPECTED_COUNT agents, got $FINAL_COUNT"; exit 1; 
          }
          echo "✅ Concurrent agent registrations passed"

      - name: "Load: WebSocket connections"
        run: |
          echo "Testing WebSocket connection load..."
          
          # Test 5 concurrent WebSocket connections (within per-IP limit)
          echo "Opening 5 concurrent WebSocket connections..."
          for i in $(seq 1 5); do
            (
              echo '{"type":"ping"}' | timeout 10 websocat -1 ws://127.0.0.1:4200/ws/sandbox-test-$i >/dev/null 2>&1
              echo "WebSocket $i completed"
            ) &
          done
          wait
          echo "✅ 5 concurrent WebSocket connections passed"

      - name: "Load: Memory usage check"
        run: |
          echo "Checking memory usage..."
          RSS_KB=$(ps -o rss= -p $DAEMON_PID 2>/dev/null || echo "0")
          RSS_MB=$((RSS_KB / 1024))
          echo "Daemon memory usage: ${RSS_MB}MB (${RSS_KB}KB)"
          
          if [ "$RSS_MB" -gt 200 ]; then
            echo "⚠️ Daemon using ${RSS_MB}MB — exceeds 200MB threshold"
            echo "::warning::High memory usage: ${RSS_MB}MB"
          else
            echo "✅ Memory usage within acceptable limits"
          fi

      # ─── Phase 3: Stress & Recovery Testing ─────────────

      - name: "Stress: Sustained load test"
        run: |
          echo "Running sustained load test (30 seconds)..."
          
          # Record baseline memory
          RSS_BEFORE=$(ps -o rss= -p $DAEMON_PID 2>/dev/null || echo "0")
          echo "Memory before load: $((RSS_BEFORE / 1024))MB"
          
          # Send requests continuously for 30 seconds
          timeout 30 bash -c '
            while true; do
              for endpoint in health status agents; do
                curl -sf http://127.0.0.1:4200/api/$endpoint >/dev/null 2>&1 &
              done
              sleep 0.1
            done
          ' || true
          
          # Wait for background requests to complete
          sleep 2
          
          # Check memory after load
          RSS_AFTER=$(ps -o rss= -p $DAEMON_PID 2>/dev/null || echo "0")
          GROWTH_KB=$((RSS_AFTER - RSS_BEFORE))
          GROWTH_MB=$((GROWTH_KB / 1024))
          
          echo "Memory after load: $((RSS_AFTER / 1024))MB"
          echo "Memory growth: ${GROWTH_MB}MB (${GROWTH_KB}KB)"
          
          if [ "$GROWTH_MB" -gt 50 ]; then
            echo "⚠️ Memory grew by ${GROWTH_MB}MB during load test"
            echo "::warning::Potential memory leak: ${GROWTH_MB}MB growth"
          else
            echo "✅ Memory growth acceptable (${GROWTH_MB}MB)"
          fi

      - name: "Recovery: Kill -9 and restart test"
        run: |
          echo "Testing crash recovery..."
          
          # Verify daemon is responding
          curl -sf http://127.0.0.1:4200/api/health >/dev/null || { 
            echo "❌ Daemon not responding before kill test"; exit 1; 
          }
          
          echo "Killing daemon (PID $DAEMON_PID) with SIGKILL..."
          kill -9 $DAEMON_PID 2>/dev/null || true
          sleep 3

          # Verify port is free
          ! curl -sf http://127.0.0.1:4200/api/health >/dev/null 2>&1 || { 
            echo "❌ Port still in use after kill"; exit 1; 
          }
          echo "✅ Port freed after kill"

          # Restart daemon
          echo "Restarting daemon..."
          timeout 300 ./target/release/pi-daemon start --foreground &
          NEW_PID=$!
          echo "DAEMON_PID=$NEW_PID" >> $GITHUB_ENV
          echo "New daemon PID: $NEW_PID"

          # Wait for daemon to be ready again
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:4200/api/health >/dev/null 2>&1; then
              echo "✅ Daemon restarted after ${i}s"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Daemon failed to restart within 30s"
              exit 1
            fi
            sleep 1
          done

          # Health check after recovery
          curl -sf http://127.0.0.1:4200/api/health | jq -e '.status == "ok"' || { 
            echo "❌ Health check failed after recovery"; exit 1; 
          }
          echo "✅ Crash recovery test passed"

      # ─── Phase 4: Graceful Shutdown Testing ─────────────

      - name: "Shutdown: API shutdown endpoint"
        run: |
          echo "Testing API shutdown endpoint..."
          
          # Test shutdown via API
          RESP=$(curl -sf -X POST http://127.0.0.1:4200/api/shutdown)
          echo "Shutdown response: $RESP"
          echo "$RESP" | jq -e '.message' || { 
            echo "❌ Shutdown response invalid"; exit 1; 
          }

          # Wait for process to exit gracefully
          echo "Waiting for graceful shutdown..."
          for i in $(seq 1 15); do
            if ! kill -0 $DAEMON_PID 2>/dev/null; then
              echo "✅ Daemon stopped gracefully after ${i}s"
              break
            fi
            if [ $i -eq 15 ]; then
              echo "⚠️ Daemon didn't stop gracefully within 15s, force killing"
              kill -9 $DAEMON_PID 2>/dev/null || true
            fi
            sleep 1
          done

          # Verify PID file cleanup
          sleep 1
          if [ -f ~/.pi-daemon/daemon.json ]; then
            echo "⚠️ daemon.json not cleaned up after API shutdown"
            echo "::warning::PID file not cleaned up"
          else
            echo "✅ PID file cleaned up properly"
          fi

          # Verify port is free
          sleep 2
          if curl -sf http://127.0.0.1:4200/api/health >/dev/null 2>&1; then
            echo "❌ Port still in use after shutdown"
            exit 1
          fi
          echo "✅ Port freed after shutdown"

      - name: "Test: CLI commands (if daemon stopped)"
        run: |
          echo "Testing CLI commands when daemon is not running..."
          
          # These should all report daemon not running
          ./target/release/pi-daemon status | grep -q "not running" || {
            echo "❌ Status should report not running"
            exit 1
          }
          echo "✅ Status command reports not running"
          
          # Stop should fail gracefully  
          if ./target/release/pi-daemon stop 2>/dev/null; then
            echo "❌ Stop should fail when daemon not running"
            exit 1
          fi
          echo "✅ Stop command fails appropriately"

          # Version should always work
          VERSION_OUT=$(./target/release/pi-daemon version)
          echo "Version output: $VERSION_OUT"
          echo "$VERSION_OUT" | grep -q "pi-daemon v" || {
            echo "❌ Version output invalid"
            exit 1
          }
          echo "✅ Version command works"

          # Config should always work
          CONFIG_OUT=$(./target/release/pi-daemon config)
          echo "$CONFIG_OUT" | grep -q "pi-daemon configuration" || {
            echo "❌ Config output invalid" 
            exit 1
          }
          echo "✅ Config command works"

      # ─── Final Summary ─────────────────────────────────────

      - name: "Summary: Integration test results"
        if: always()
        run: |
          echo "=============================================="
          echo "         Sandbox Integration Summary         "  
          echo "=============================================="
          echo "✅ Binary builds and runs as real daemon"
          echo "✅ Health and status endpoints functional"
          echo "✅ Agent CRUD lifecycle complete"
          echo "✅ Webchat SPA loads with full content"
          echo "✅ OpenAI-compatible API works"
          echo "✅ PID file management functional"
          echo "✅ Concurrent load handling verified"
          echo "✅ Memory usage within acceptable limits"
          echo "✅ Crash recovery works (kill -9 → restart)"
          echo "✅ Graceful shutdown via API functional"
          echo "✅ CLI commands handle daemon state correctly"
          echo "=============================================="
          
          # Ensure daemon is stopped (cleanup)
          pkill -f "pi-daemon start" 2>/dev/null || true
          rm -f ~/.pi-daemon/daemon.json 2>/dev/null || true
          echo "🧹 Cleanup completed"