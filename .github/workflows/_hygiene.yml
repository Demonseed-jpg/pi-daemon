name: Hygiene

# Reusable workflow — consolidates commit-msg-scan.yml, docs-check.yml,
# pr-hygiene.yml, and remaining ci.yml hygiene jobs into a single workflow.
# Called by pr-pipeline.yml with needs: [scope-gate].
#
# Phase 4 (#128) of the CI Orchestrator migration (#124).

on:
  workflow_call:
    inputs:
      has_rust:
        description: "PR contains Rust source changes"
        type: boolean
        default: true
      has_deps:
        description: "PR contains Cargo.toml/Cargo.lock changes"
        type: boolean
        default: true
      has_docs:
        description: "PR contains documentation changes"
        type: boolean
        default: true

# Concurrency is primarily managed by the orchestrator (pr-pipeline.yml),
# but we include a group here for the config review check and as a safety net.
concurrency:
  group: hygiene-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─── From commit-msg-scan.yml ───────────────────────────
  commit-msg-scan:
    name: Commit Message Secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan all PR commit messages
        id: scan
        run: |
          echo "Scanning commit messages in PR..."
          echo ""

          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          # Secret patterns (same as scripts/check-commit-msg.sh)
          PATTERNS='(ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36}|github_pat_[a-zA-Z0-9]{22}_[a-zA-Z0-9]{59}|sk-or-v1-[a-f0-9]{64}|sk-ant-[a-zA-Z0-9]{20,}|sk-proj-[a-zA-Z0-9]{20,}|sk-[a-zA-Z0-9]{48}|AKIA[0-9A-Z]{16}|glpat-[a-zA-Z0-9\-]{20,}|xoxb-[0-9]{10,}|xoxp-[0-9]{10,})'

          # Env dump patterns (searched separately to avoid false positives in diff content)
          ENV_PATTERNS='^(GH_TOKEN|OPENROUTER_API_KEY|NEO4J_PASSWORD|AWS_SECRET_ACCESS_KEY|GITHUB_TOKEN)=.+'

          FOUND=0
          REPORT=""

          for SHA in $(git rev-list "$BASE_SHA".."$HEAD_SHA"); do
            MSG=$(git log --format="%B" -1 "$SHA")
            SHORT=$(git log --format="%h %s" -1 "$SHA")

            # Check for secret tokens
            TOKEN_MATCH=$(echo "$MSG" | grep -E "$PATTERNS" || true)
            # Check for env dump lines
            ENV_MATCH=$(echo "$MSG" | grep -E "$ENV_PATTERNS" || true)

            if [ -n "$TOKEN_MATCH" ] || [ -n "$ENV_MATCH" ]; then
              FOUND=$((FOUND + 1))
              REPORT+="### ❌ \`$SHORT\`\n"
              if [ -n "$TOKEN_MATCH" ]; then
                REPORT+="Secret token pattern detected:\n\`\`\`\n$TOKEN_MATCH\n\`\`\`\n"
              fi
              if [ -n "$ENV_MATCH" ]; then
                REPORT+="Environment variable dump detected:\n\`\`\`\n$ENV_MATCH\n\`\`\`\n"
              fi
              REPORT+="\n"
            else
              echo "✅ $SHORT"
            fi
          done

          if [ "$FOUND" -gt 0 ]; then
            echo "found=$FOUND" >> "$GITHUB_OUTPUT"
            # Write report to file for the comment step
            echo -e "$REPORT" > /tmp/scan-report.md
            echo ""
            echo "🚨 Found secrets in $FOUND commit message(s)"
            exit 1
          else
            echo ""
            echo "✅ All commit messages are clean"
          fi

      - name: Report commit-message secrets as annotations
        if: failure()
        run: |
          # Commit-message secrets have no file/line context — emit ::error
          # annotations without file= so they appear in the Annotations section.
          FOUND=${{ steps.scan.outputs.found || '0' }}

          REPORT=""
          if [ -f /tmp/scan-report.md ]; then
            REPORT=$(cat /tmp/scan-report.md)
          else
            REPORT="Secret patterns detected in commit messages."
          fi

          # Emit one annotation per finding (up to 10)
          MAX_ANNOTATIONS=10
          ANNOTATED=0
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          PATTERNS='(ghp_[a-zA-Z0-9]{36}|gho_[a-zA-Z0-9]{36}|github_pat_[a-zA-Z0-9]{22}_[a-zA-Z0-9]{59}|sk-or-v1-[a-f0-9]{64}|sk-ant-[a-zA-Z0-9]{20,}|sk-proj-[a-zA-Z0-9]{20,}|sk-[a-zA-Z0-9]{48}|AKIA[0-9A-Z]{16}|glpat-[a-zA-Z0-9\-]{20,}|xoxb-[0-9]{10,}|xoxp-[0-9]{10,})'
          ENV_PATTERNS='^(GH_TOKEN|OPENROUTER_API_KEY|NEO4J_PASSWORD|AWS_SECRET_ACCESS_KEY|GITHUB_TOKEN)=.+'

          for SHA in $(git rev-list "$BASE_SHA".."$HEAD_SHA" 2>/dev/null || true); do
            MSG=$(git log --format="%B" -1 "$SHA" 2>/dev/null || true)
            SHORT=$(git log --format="%h" -1 "$SHA" 2>/dev/null || true)
            TOKEN_MATCH=$(echo "$MSG" | grep -E "$PATTERNS" || true)
            ENV_MATCH=$(echo "$MSG" | grep -E "$ENV_PATTERNS" || true)

            if [ -n "$TOKEN_MATCH" ] || [ -n "$ENV_MATCH" ]; then
              if [ "$ANNOTATED" -lt "$MAX_ANNOTATIONS" ]; then
                PATTERN_DESC=""
                [ -n "$TOKEN_MATCH" ] && PATTERN_DESC="secret token"
                [ -n "$ENV_MATCH" ] && PATTERN_DESC="${PATTERN_DESC:+$PATTERN_DESC + }env dump"
                echo "::error::Secret pattern detected in commit message: ${SHORT} — ${PATTERN_DESC}"
                ANNOTATED=$((ANNOTATED + 1))
              fi
            fi
          done

          if [ "$FOUND" -gt "$MAX_ANNOTATIONS" ] 2>/dev/null; then
            echo "::error::${FOUND} commit messages contain secrets (showing first ${MAX_ANNOTATIONS})"
          fi

          # Full detail in step summary
          {
            echo "## 🚨 Secrets Detected in Commit Messages"
            echo ""
            echo "This PR contains commit messages with potential secrets or environment variable dumps."
            echo ""
            echo "$REPORT"
            echo ""
            echo "**This must be fixed before merge.** Rewrite the commit messages:"
            echo ""
            echo '1. `git rebase -i <base-commit>` and edit the offending commits'
            echo "2. Remove the secrets from the commit messages"
            echo "3. Force-push the branch"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── From docs-check.yml ────────────────────────────────
  sidebar-sync:
    name: Sidebar Sync
    runs-on: ubuntu-latest
    if: inputs.has_docs
    steps:
      - uses: actions/checkout@v4

      - name: Check sidebar matches files
        id: check
        run: |
          # Files in docs/ (excluding _ prefixed)
          find docs/ -maxdepth 1 -name "*.md" ! -name "_*" -printf "%f\n" | sed 's/\.md$//' | sort > /tmp/doc_files.txt

          # Entries in sidebar
          grep -oP '\[\[([^\]]+)\]\]' docs/_Sidebar.md | sed 's/\[\[//;s/\]\]//' | sort > /tmp/sidebar.txt

          ORPHANED=$(comm -23 /tmp/doc_files.txt /tmp/sidebar.txt || true)
          DANGLING=$(comm -13 /tmp/doc_files.txt /tmp/sidebar.txt || true)

          echo "doc_files=$(cat /tmp/doc_files.txt | tr '\n' ',' )"
          echo "sidebar=$(cat /tmp/sidebar.txt | tr '\n' ',')"

          if [ -n "$ORPHANED" ] || [ -n "$DANGLING" ]; then
            echo "mismatch=true" >> $GITHUB_OUTPUT
            echo "orphaned=$ORPHANED" >> $GITHUB_OUTPUT
            echo "dangling=$DANGLING" >> $GITHUB_OUTPUT
          else
            echo "mismatch=false" >> $GITHUB_OUTPUT
            echo "✅ Sidebar and files in sync"
          fi

      - name: Report mismatch as annotations
        if: steps.check.outputs.mismatch == 'true'
        run: |
          ORPHANED="${{ steps.check.outputs.orphaned }}"
          DANGLING="${{ steps.check.outputs.dangling }}"
          MAX_ANNOTATIONS=10
          ANNOTATED=0

          # Orphaned pages: files in docs/ not listed in _Sidebar.md
          if [ -n "$ORPHANED" ]; then
            while IFS= read -r page; do
              [ -n "$page" ] || continue
              if [ "$ANNOTATED" -lt "$MAX_ANNOTATIONS" ]; then
                echo "::warning file=docs/${page}.md::Not referenced in docs/_Sidebar.md"
                ANNOTATED=$((ANNOTATED + 1))
              fi
            done <<< "$ORPHANED"
          fi

          # Dangling sidebar entries: listed in sidebar but no file exists
          if [ -n "$DANGLING" ]; then
            while IFS= read -r entry; do
              [ -n "$entry" ] || continue
              if [ "$ANNOTATED" -lt "$MAX_ANNOTATIONS" ]; then
                echo "::warning file=docs/_Sidebar.md::Missing file for sidebar entry [[${entry}]]"
                ANNOTATED=$((ANNOTATED + 1))
              fi
            done <<< "$DANGLING"
          fi

          TOTAL_ORPHANED=$(echo "$ORPHANED" | grep -c '\S' || echo "0")
          TOTAL_DANGLING=$(echo "$DANGLING" | grep -c '\S' || echo "0")
          TOTAL=$((TOTAL_ORPHANED + TOTAL_DANGLING))

          if [ "$TOTAL" -gt "$MAX_ANNOTATIONS" ]; then
            echo "::warning::${TOTAL} sidebar mismatches found (showing first ${MAX_ANNOTATIONS} inline)"
          fi

          # Full detail in step summary
          {
            echo "## 📖 Sidebar / Files Mismatch"
            echo ""
            if [ -n "$ORPHANED" ]; then
              echo "**Pages not in sidebar** (add to \`docs/_Sidebar.md\`):"
              echo "$ORPHANED" | while IFS= read -r f; do
                [ -n "$f" ] && echo "- \`${f}.md\`"
              done
              echo ""
            fi
            if [ -n "$DANGLING" ]; then
              echo "**Sidebar entries without files** (create the page or remove from sidebar):"
              echo "$DANGLING" | while IFS= read -r f; do
                [ -n "$f" ] && echo "- \`[[${f}]]\`"
              done
              echo ""
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          exit 1

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    if: inputs.has_docs
    steps:
      - uses: actions/checkout@v4

      - name: Lint markdown files
        uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "docs/**/*.md"
        continue-on-error: true

  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    if: inputs.has_docs
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: "docs/**/*.md README.md --no-progress --exclude-path target --exclude 'localhost' --exclude '127.0.0.1'"
          fail: false

  # ─── From pr-hygiene.yml ────────────────────────────────
  commit-lint:
    name: Commit Messages
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check conventional commits
        run: |
          VALID_PREFIXES="^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?:"
          BAD_COMMITS=""

          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            if ! echo "$msg" | grep -qP "$VALID_PREFIXES"; then
              BAD_COMMITS="${BAD_COMMITS}\n  - ${msg}"
            fi
          done <<< "$(git log origin/main..HEAD --pretty=format:'%s' 2>/dev/null || echo '')"

          if [ -n "$BAD_COMMITS" ]; then
            echo "::warning::Non-conventional commit messages found:${BAD_COMMITS}"
            echo ""
            echo "Expected format: type(scope): description"
            echo "Types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
          else
            echo "All commit messages follow Conventional Commits format"
          fi

  pr-description:
    name: PR Description
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Check PR description
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const issues = [];

            if (body.trim().length < 50) {
              issues.push('PR description is too short (< 50 chars)');
            }

            const hasIssueRef = /closes?\s+#\d+|fixes?\s+#\d+|implements?\s+#\d+|refs?\s+#\d+/i.test(body);
            if (!hasIssueRef) {
              issues.push('No issue reference found (use `Closes #N`, `Fixes #N`, or `Refs #N`)');
            }

            if (issues.length > 0) {
              core.warning(`PR description issues:\n${issues.join('\n')}`);
            } else {
              console.log('PR description OK');
            }

  # ─── From ci.yml (remaining hygiene jobs) ───────────────
  unused-deps:
    name: Unused Dependencies
    runs-on: ubuntu-latest
    if: inputs.has_rust || inputs.has_deps
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: unused-deps

      - name: Install cargo-machete
        run: cargo install cargo-machete --locked

      - name: Check unused dependencies
        run: cargo machete
        continue-on-error: true  # Warning only

      - name: Post machete results to PR
        if: github.event_name == 'pull_request'
        run: |
          OUTPUT=$(cargo machete 2>&1 || true)
          if echo "$OUTPUT" | grep -q "unused dependencies"; then
            echo "::warning::Unused dependencies detected: $OUTPUT"
          fi

  crate-doc-sync:
    name: Crate Docs Sync
    runs-on: ubuntu-latest
    if: inputs.has_rust || inputs.has_deps || inputs.has_docs
    steps:
      - uses: actions/checkout@v4
      - name: Check crates documented in Architecture.md
        run: |
          # Parse workspace members from Cargo.toml
          grep -A 100 '^\[workspace\]' Cargo.toml | grep -oP '"crates/([^"]+)"' | sed 's/"crates\///;s/"//' | sort > /tmp/crates.txt

          # Check each appears in Architecture.md
          MISSING=""
          while IFS= read -r crate; do
            if ! grep -q "$crate" docs/Architecture.md; then
              MISSING="${MISSING}\n- ${crate}"
            fi
          done < /tmp/crates.txt

          if [ -n "$MISSING" ]; then
            echo "::warning::Crates not documented in Architecture.md:${MISSING}"
            exit 1  # Make this blocking for now
          else
            echo "✅ All crates documented in Architecture.md"
          fi

  todo-tracker:
    name: TODO Tracker
    runs-on: ubuntu-latest
    if: inputs.has_rust || inputs.has_docs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for orphaned TODOs
        run: |
          # Find new TODOs in the diff that don't reference an issue
          NEW_TODOS=$(git diff origin/main...HEAD -- '*.rs' '*.md' | grep -n '^\+.*\(TODO\|FIXME\|HACK\|XXX\)' | grep -v '#[0-9]' || true)

          if [ -n "$NEW_TODOS" ]; then
            echo "::warning::New TODOs without issue references:"
            echo "$NEW_TODOS"
            echo ""
            echo "Please add an issue reference: TODO(#42): description"
          else
            echo "✅ All TODOs have issue references"
          fi

  docs-drift:
    name: Docs Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for docs drift
        run: |
          CHANGED=$(git diff origin/main...HEAD --name-only)
          ERRORS=""
          WARNINGS=""

          # routes changed → API-Reference.md should too
          if echo "$CHANGED" | grep -q 'routes'; then
            if ! echo "$CHANGED" | grep -q 'API-Reference.md'; then
              ERRORS="${ERRORS}\n❌ Route files changed but docs/API-Reference.md was not updated"
            fi
          fi

          # Cargo.toml members changed → Architecture.md should too
          if echo "$CHANGED" | grep -q 'Cargo.toml'; then
            if git diff origin/main...HEAD -- Cargo.toml | grep -q 'members'; then
              if ! echo "$CHANGED" | grep -q 'Architecture.md'; then
                ERRORS="${ERRORS}\n❌ Cargo.toml workspace members changed but docs/Architecture.md was not updated"
              fi
            fi
          fi

          # Config types changed → Configuration.md should too
          if echo "$CHANGED" | grep -q 'config\.rs'; then
            if ! echo "$CHANGED" | grep -q 'Configuration.md'; then
              ERRORS="${ERRORS}\n❌ Config code changed but docs/Configuration.md was not updated"
            fi
          fi

          # Workflow files changed → PR-Reviews.md should too
          if echo "$CHANGED" | grep -q '\.github/workflows/'; then
            if ! echo "$CHANGED" | grep -q 'PR-Reviews.md'; then
              ERRORS="${ERRORS}\n❌ Workflow files changed but docs/PR-Reviews.md was not updated"
            fi
          fi

          # deny.toml changed → PR-Reviews.md supply chain section should too
          if echo "$CHANGED" | grep -q 'deny\.toml'; then
            if ! echo "$CHANGED" | grep -qE 'PR-Reviews.md|Architecture.md'; then
              WARNINGS="${WARNINGS}\n⚠️ deny.toml changed but related docs were not updated"
            fi
          fi

          if [ -n "$ERRORS" ]; then
            echo -e "Documentation drift detected:${ERRORS}"
            if [ -n "$WARNINGS" ]; then
              echo -e "\nAdditional warnings:${WARNINGS}"
            fi
            echo "::error::Documentation drift detected — update the relevant docs/ files"
            exit 1
          elif [ -n "$WARNINGS" ]; then
            echo -e "Documentation drift warnings:${WARNINGS}"
            echo "::warning::Potential documentation drift (advisory)"
          else
            echo "✅ No documentation drift detected"
          fi

  changelog:
    name: Changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check changelog updated
        run: |
          CHANGED=$(git diff origin/main...HEAD --name-only)
          HAS_CHANGELOG=$(echo "$CHANGED" | grep 'CHANGELOG.md' || true)

          # Meaningful changes that warrant a changelog entry
          HAS_RS=$(echo "$CHANGED" | grep '\.rs$' || true)
          HAS_WORKFLOWS=$(echo "$CHANGED" | grep '\.github/workflows/' || true)
          HAS_CARGO=$(echo "$CHANGED" | grep 'Cargo\.toml' || true)

          HAS_MEANINGFUL=""
          [ -n "$HAS_RS" ] && HAS_MEANINGFUL="Rust source files"
          [ -n "$HAS_WORKFLOWS" ] && HAS_MEANINGFUL="${HAS_MEANINGFUL:+$HAS_MEANINGFUL, }workflow files"
          [ -n "$HAS_CARGO" ] && HAS_MEANINGFUL="${HAS_MEANINGFUL:+$HAS_MEANINGFUL, }Cargo.toml"

          if [ -n "$HAS_MEANINGFUL" ] && [ -z "$HAS_CHANGELOG" ]; then
            echo "Changed: $HAS_MEANINGFUL"
            echo "::error::$HAS_MEANINGFUL changed but CHANGELOG.md was not updated"
            exit 1
          else
            echo "✅ Changelog check passed"
          fi
