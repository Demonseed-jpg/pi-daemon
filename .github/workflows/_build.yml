name: Build & Release

# Reusable build workflow — called by pr-pipeline.yml.
# Contains release builds (multi-target matrix), binary size tracking,
# MSRV check, and Pi Bridge Extension type-checking.
#
# Phase 3 of CI Orchestrator (#127). Build runs after lint passes
# (enforced via needs: [lint-format] in the orchestrator).

on:
  workflow_call:
    inputs:
      has_rust:
        description: "PR contains Rust source changes"
        type: boolean
        default: true
      has_deps:
        description: "PR contains Cargo.toml/Cargo.lock changes"
        type: boolean
        default: true
      has_ts:
        description: "PR contains TypeScript/JavaScript changes"
        type: boolean
        default: true
      has_npm:
        description: "PR contains npm/yarn/pnpm lockfile changes"
        type: boolean
        default: true

# Concurrency is primarily managed by the orchestrator (pr-pipeline.yml),
# but we include a group here for the config review check and as a safety net.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  MSRV: "1.94"

jobs:
  # ─── Binary Size Tracking ───────────────────────────────
  binary-size:
    name: Binary Size
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && (inputs.has_rust || inputs.has_deps)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: binary-size
      - name: Build release
        run: cargo build --release
      - name: Report size
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const binary = 'target/release/pi-daemon';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.payload.pull_request?.head?.sha || context.sha;

            if (!fs.existsSync(binary)) {
              console.log('Binary not found, skipping size check');
              return;
            }

            const size = fs.statSync(binary).size;
            const sizeMB = (size / 1024 / 1024).toFixed(1);
            const sizeWarning = size > 50 * 1024 * 1024;

            // Write step summary with full detail
            const summaryLines = [
              '## 📏 Binary Size',
              '',
              `| Metric | Value |`,
              `|--------|-------|`,
              `| **Size** | ${sizeMB} MB (${size.toLocaleString()} bytes) |`,
              `| **Threshold** | 50 MB |`,
              `| **Status** | ${sizeWarning ? '🔴 Exceeds threshold' : '✅ Within range'} |`,
            ];
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summaryLines.join('\n') + '\n');

            // Build description — must be ≤140 chars
            const description = `${sizeMB}MB (${size.toLocaleString()} bytes)`;

            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            // Post commit status — failure if >50MB, success otherwise
            await github.rest.repos.createCommitStatus({
              owner, repo, sha,
              state: sizeWarning ? 'failure' : 'success',
              context: 'binary-size',
              description: description.length <= 140 ? description : description.slice(0, 137) + '...',
              target_url: runUrl,
            });
            core.info(`Posted binary-size status: ${description} (${sizeWarning ? 'failure' : 'success'})`);

            // One-time cleanup: delete legacy binary size PR comment if present
            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner, repo,
                issue_number: context.issue.number,
              });
              const existing = comments.find(c =>
                c.body.includes('📏 Binary Size')
              );
              if (existing) {
                await github.rest.issues.deleteComment({
                  owner, repo,
                  comment_id: existing.id,
                });
                core.info(`Deleted legacy binary size comment #${existing.id}`);
              }
            } catch (e) {
              core.warning(`Failed to clean up legacy binary size comment: ${e.message}`);
            }

  # ─── Release Build (multi-target) ──────────────────────
  build-release:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    if: inputs.has_rust || inputs.has_deps
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          # Future: add windows, more Linux arches
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Check binary size
        run: |
          BINARY="target/${{ matrix.target }}/release/pi-daemon"
          if [ -f "$BINARY" ]; then
            SIZE=$(stat -c%s "$BINARY" 2>/dev/null || stat -f%z "$BINARY" 2>/dev/null)
            SIZE_MB=$((SIZE / 1024 / 1024))
            echo "Binary size: ${SIZE_MB}MB ($SIZE bytes)"
            if [ "$SIZE_MB" -gt 50 ]; then
              echo "::warning::Binary size exceeds 50MB: ${SIZE_MB}MB"
            fi
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: pi-daemon-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/pi-daemon

  # ─── MSRV Check ─────────────────────────────────────────
  msrv:
    name: Minimum Supported Rust Version
    runs-on: ubuntu-latest
    if: inputs.has_rust || inputs.has_deps
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MSRV }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv

      - name: Check MSRV
        run: cargo check --all-features

  # ─── Pi Bridge Extension ────────────────────────────────
  test-bridge:
    name: Pi Bridge Extension
    runs-on: ubuntu-latest
    if: inputs.has_ts || inputs.has_npm
    defaults:
      run:
        working-directory: extensions/pi-daemon-bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx tsc --noEmit  # Type-check only
