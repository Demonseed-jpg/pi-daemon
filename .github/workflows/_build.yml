name: Build & Release

# Reusable build workflow — called by pr-pipeline.yml.
# Contains release builds (multi-target matrix), binary size tracking,
# MSRV check, and Pi Bridge Extension type-checking.
#
# Phase 3 of CI Orchestrator (#127). Build runs after lint passes
# (enforced via needs: [lint-format] in the orchestrator).

on:
  workflow_call:

# Concurrency is primarily managed by the orchestrator (pr-pipeline.yml),
# but we include a group here for the config review check and as a safety net.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  MSRV: "1.94"

jobs:
  # ─── Binary Size Tracking ───────────────────────────────
  binary-size:
    name: Binary Size
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: binary-size
      - name: Build release
        run: cargo build --release
      - name: Report size
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const binary = 'target/release/pi-daemon';
            
            if (!fs.existsSync(binary)) {
              console.log('Binary not found, skipping size check');
              return;
            }
            
            const size = fs.statSync(binary).size;
            const sizeMB = (size / 1024 / 1024).toFixed(1);
            
            let msg = `## 📏 Binary Size: ${sizeMB} MB (${size.toLocaleString()} bytes)`;
            if (size > 50 * 1024 * 1024) {
              msg += `\n\n🔴 **Warning:** Binary exceeds 50MB target.`;
            } else {
              msg += `\n\n✅ Binary size is within acceptable range.`;
            }
            
            // Find existing size comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('📏 Binary Size'));
            
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: msg + '\n\n---\n*Updated on each commit*',
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: msg + '\n\n---\n*Updated on each commit*',
              });
            }

  # ─── Release Build (multi-target) ──────────────────────
  build-release:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          # Future: add windows, more Linux arches
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Check binary size
        run: |
          BINARY="target/${{ matrix.target }}/release/pi-daemon"
          if [ -f "$BINARY" ]; then
            SIZE=$(stat -c%s "$BINARY" 2>/dev/null || stat -f%z "$BINARY" 2>/dev/null)
            SIZE_MB=$((SIZE / 1024 / 1024))
            echo "Binary size: ${SIZE_MB}MB ($SIZE bytes)"
            if [ "$SIZE_MB" -gt 50 ]; then
              echo "::warning::Binary size exceeds 50MB: ${SIZE_MB}MB"
            fi
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: pi-daemon-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/pi-daemon

  # ─── MSRV Check ─────────────────────────────────────────
  msrv:
    name: Minimum Supported Rust Version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MSRV }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: msrv

      - name: Check MSRV
        run: cargo check --all-features

  # ─── Pi Bridge Extension ────────────────────────────────
  test-bridge:
    name: Pi Bridge Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extensions/pi-daemon-bridge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx tsc --noEmit  # Type-check only
