name: Code Review

# Reusable code review workflow — called by pr-pipeline.yml.
# Contains file classification, architectural review (LLM), test quality
# review (LLM), configuration review (LLM), and a summary gate job.
#
# Phase 3 of CI Orchestrator (#127). Code review runs after lint + tests
# pass (enforced via needs: [lint-format, test] in the orchestrator).
# This ensures the LLM reviews code that actually compiles and passes tests.

on:
  workflow_call:
    inputs:
      has_rust:
        description: "PR contains Rust source changes"
        type: boolean
        default: true
      has_ts:
        description: "PR contains TypeScript/JavaScript changes"
        type: boolean
        default: true
      has_workflows:
        description: "PR contains workflow file changes"
        type: boolean
        default: true
      has_docs:
        description: "PR contains documentation changes"
        type: boolean
        default: true
      has_deps:
        description: "PR contains Cargo.toml/Cargo.lock changes"
        type: boolean
        default: true
    secrets:
      OPENROUTER_API_KEY:
        required: true

# Concurrency is primarily managed by the orchestrator (pr-pipeline.yml),
# but we include a group here for the config review check and as a safety net.
concurrency:
  group: code-review-${{ github.ref }}
  cancel-in-progress: true

env:
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

jobs:
  # ─── File Classification ────────────────────────────────
  classify:
    name: File Classification
    runs-on: ubuntu-latest
    # Don't run on PRs from bots (e.g., dependabot)
    if: github.actor != 'dependabot[bot]'
    outputs:
      need_arch_review: ${{ steps.classify.outputs.need_arch_review }}
      need_test_review: ${{ steps.classify.outputs.need_test_review }}
      need_config_review: ${{ steps.classify.outputs.need_config_review }}
      source_count: ${{ steps.classify.outputs.source_count }}
      test_count: ${{ steps.classify.outputs.test_count }}
      config_count: ${{ steps.classify.outputs.config_count }}
      excluded_count: ${{ steps.classify.outputs.excluded_count }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff

      - name: Classify files for code review
        id: classify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Get all changed files
          gh pr diff ${{ github.event.pull_request.number }} --name-only > /tmp/all_changed_files.txt 2>/dev/null || \
            git diff origin/${{ github.base_ref }}...HEAD --name-only > /tmp/all_changed_files.txt

          TOTAL_FILES=$(wc -l < /tmp/all_changed_files.txt)
          
          # Early termination check: empty PR
          if [ $TOTAL_FILES -eq 0 ]; then
            echo "Empty PR detected"
            echo "need_arch_review=false" >> $GITHUB_OUTPUT
            echo "need_test_review=false" >> $GITHUB_OUTPUT
            echo "need_config_review=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "=== File Classification for Code Review ==="
          
          # Source code files (architectural review)
          grep -E '\.(rs|ts|js)$' /tmp/all_changed_files.txt | grep -v -E 'test\.|spec\.|\.test\.|node_modules/|target/' > /tmp/source_files.txt || touch /tmp/source_files.txt
          
          # Test files (test quality review)
          grep -E 'test\.|spec\.|tests/|_test\.|\.test\.|test_.*\.rs' /tmp/all_changed_files.txt > /tmp/test_files.txt || touch /tmp/test_files.txt
          
          # Configuration files (configuration review - future #100)
          grep -E '\.(toml|yml|yaml|md)$' /tmp/all_changed_files.txt | grep -v -E 'package-lock\.|yarn\.lock|Cargo\.lock' > /tmp/config_files.txt || touch /tmp/config_files.txt
          
          # Generated files (excluded from all reviews)
          grep -E 'package-lock\.json|yarn\.lock|Cargo\.lock|node_modules/|target/|dist/|build/|\.map$' /tmp/all_changed_files.txt > /tmp/excluded_files.txt || touch /tmp/excluded_files.txt
          
          SOURCE_COUNT=$(wc -l < /tmp/source_files.txt)
          TEST_COUNT=$(wc -l < /tmp/test_files.txt)
          CONFIG_COUNT=$(wc -l < /tmp/config_files.txt)
          EXCLUDED_COUNT=$(wc -l < /tmp/excluded_files.txt)
          
          echo "Source files (architectural review): $SOURCE_COUNT"
          cat /tmp/source_files.txt | sed 's/^/  - /' || echo "  (none)"
          echo "Test files (test quality review): $TEST_COUNT"
          cat /tmp/test_files.txt | sed 's/^/  - /' || echo "  (none)"
          echo "Config files (configuration review): $CONFIG_COUNT"
          cat /tmp/config_files.txt | sed 's/^/  - /' || echo "  (none)"
          echo "Excluded files (generated): $EXCLUDED_COUNT"
          cat /tmp/excluded_files.txt | sed 's/^/  - /' || echo "  (none)"
          
          # Set outputs for conditional job execution
          echo "need_arch_review=$([ $SOURCE_COUNT -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "need_test_review=$([ $TEST_COUNT -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "need_config_review=$([ $CONFIG_COUNT -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "source_count=$SOURCE_COUNT" >> $GITHUB_OUTPUT
          echo "test_count=$TEST_COUNT" >> $GITHUB_OUTPUT
          echo "config_count=$CONFIG_COUNT" >> $GITHUB_OUTPUT
          echo "excluded_count=$EXCLUDED_COUNT" >> $GITHUB_OUTPUT

          # Store file lists for other jobs
          cp /tmp/source_files.txt /tmp/test_files.txt /tmp/config_files.txt /tmp/excluded_files.txt ./
          
      - name: Upload file classification
        uses: actions/upload-artifact@v4
        with:
          name: file-classification
          path: |
            source_files.txt
            test_files.txt
            config_files.txt
            excluded_files.txt

  # ─── Architectural Review ──────────────────────────────
  architectural-review:
    name: Architectural Review
    runs-on: ubuntu-latest
    needs: [classify]
    if: inputs.has_rust || inputs.has_ts
    steps:
      - name: Determine review action
        id: action
        run: |
          if [ "${{ needs.classify.outputs.need_arch_review }}" = "true" ]; then
            echo "action=review" >> $GITHUB_OUTPUT
            echo "source_count=${{ needs.classify.outputs.source_count }}" >> $GITHUB_OUTPUT
          else
            echo "action=skip" >> $GITHUB_OUTPUT
            echo "skip_reason=No source files (.rs, .ts, .js) detected for architectural review" >> $GITHUB_OUTPUT
          fi

      - name: Report skip to step summary
        if: steps.action.outputs.action == 'skip'
        run: |
          echo "## ⏭️ Architectural Review: Skipped" >> $GITHUB_STEP_SUMMARY
          echo "No source files (.rs, .ts, .js) in this PR — nothing to review architecturally." >> $GITHUB_STEP_SUMMARY

      - name: Checkout repo
        if: steps.action.outputs.action == 'review'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download file classification
        if: steps.action.outputs.action == 'review'
        uses: actions/download-artifact@v4
        with:
          name: file-classification

      - name: Gather architecture context
        if: steps.action.outputs.action == 'review'
        run: |
          # Inject REAL project architecture documentation into review context
          echo "## Project Architecture (authoritative reference — review against this)" > /tmp/arch_context.txt
          cat docs/Architecture.md >> /tmp/arch_context.txt 2>/dev/null || echo "(Architecture.md not found)" >> /tmp/arch_context.txt
          echo "" >> /tmp/arch_context.txt
          echo "## Code Conventions (authoritative reference)" >> /tmp/arch_context.txt
          cat docs/Contributing.md >> /tmp/arch_context.txt 2>/dev/null || echo "(Contributing.md not found)" >> /tmp/arch_context.txt
          echo "" >> /tmp/arch_context.txt
          echo "## Current Crate Dependency Graph (auto-extracted)" >> /tmp/arch_context.txt
          for crate_dir in crates/*/; do
            crate_name=$(basename "$crate_dir")
            deps=$(grep -A 50 '\[dependencies\]' "$crate_dir/Cargo.toml" 2>/dev/null | grep 'pi-daemon' | sed 's/=.*//' | tr -d ' ' | tr '\n' ', ' || true)
            echo "  $crate_name depends on: ${deps:-nothing}" >> /tmp/arch_context.txt
          done
          echo "Context size: $(wc -c < /tmp/arch_context.txt) bytes"

      - name: Run architectural review
        if: steps.action.outputs.action == 'review'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Running architectural review for ${{ needs.classify.outputs.source_count }} source files"
          
          # Generate filtered diff for source files only
          while IFS= read -r file; do
            if [ -n "$file" ]; then
              echo "=== $file ==="
              git diff origin/${{ github.base_ref }}...HEAD -- "$file" 2>/dev/null || echo "(file diff unavailable)"
              echo ""
            fi
          done < source_files.txt > /tmp/arch_diff.txt
          
          # Create the architectural review prompt — tight, no fluff
          cat > /tmp/arch_prompt.txt << 'ARCH_PROMPT'
          You review Rust code for pi-daemon against its architecture docs (provided below). You are strict but fair — you catch real problems and skip cosmetic nitpicks. Write your summary and notes like a senior engineer talking to a peer: direct, specific, no filler. If something is good, say so briefly. If something is wrong, say exactly what and where.

          ## Rules
          - FAIL if dependency graph is violated (types→kernel→api→cli, no reverse deps)
          - FAIL if unwrap() appears in library code (tests are fine)
          - FAIL if Mutex<HashMap> is used instead of DashMap
          - FAIL if println! is used instead of tracing macros
          - FAIL if new public items lack /// doc comments
          - FAIL if tests duplicate start_test_server() instead of using FullTestServer from test-utils
          - WARNING if new API routes lack integration tests
          - WARNING if error paths are untested

          ## Score each dimension 0-3
          0 = Violation (FAIL). 1 = Concern (needs changes). 2 = Acceptable. 3 = Excellent.

          Dimensions:
          - dep_graph: Dependency graph compliance (types→kernel→api→cli, no cycles)
          - concurrency: DashMap, broadcast, Arc patterns
          - errors: thiserror for types, anyhow at boundaries, no unwrap in lib
          - testing: Unit tests for public fns, integration tests for endpoints, uses test-utils
          - naming: snake_case, test_<thing>_<behavior> pattern
          - security: No unwrap on user input, no secrets in code, auth middleware on routes
          - docs: /// on public items, docs/*.md updated if needed

          PASS: no dimension scores 0 AND average >= 2.0
          FAIL: any dimension scores 0 OR average < 2.0

          ## Output format — JSON only, no markdown, no explanation outside the JSON
          {"verdict":"PASS|FAIL","summary":"one sentence","checklist_verdict":"PASS|FAIL","expert_verdict":"PASS|FAIL","scores":{"dep_graph":N,"concurrency":N,"errors":N,"testing":N,"naming":N,"security":N,"docs":N},"checks":[{"name":"string","status":"pass|fail|warning","detail":"string"}],"issues":[{"description":"string","file":"string (optional)","line":"N (optional)"}],"actions":[{"action":"concrete task the author should do, e.g. Add integration test for /api/foo endpoint","file":"string (optional)","line":"N (optional)"}],"notes":"string"}

          ## actions and issues field rules
          - Each action is an object: {"action": "verb phrase", "file": "path/to/file.rs", "line": 42}
          - Each issue is an object: {"description": "what is wrong", "file": "path/to/file.rs", "line": 42}
          - "file" and "line" are optional but strongly preferred — include them when you can identify the exact location
          - The "file" value must match a filename from the diff headers (=== filename ===)
          - The "line" value must be a line number from the NEW side of the diff (+ lines)
          - Start action text with a verb: Add, Move, Remove, Rename, Replace, Update, Fix, Test
          - If verdict is PASS, actions should be empty or contain only minor suggestions
          - If verdict is FAIL, actions must list every required fix — the author should be able to work through them like a checklist
          ARCH_PROMPT

          # Prepare the input (architecture context + diff)
          echo "## Context" > /tmp/arch_input.txt
          echo "Pull Request: Source code changes to pi-daemon" >> /tmp/arch_input.txt
          echo "Files: ${{ needs.classify.outputs.source_count }} source files (.rs, .ts, .js)" >> /tmp/arch_input.txt
          echo "" >> /tmp/arch_input.txt
          # Inject real architecture documentation
          cat /tmp/arch_context.txt >> /tmp/arch_input.txt
          echo "" >> /tmp/arch_input.txt
          echo "## Diff to Review" >> /tmp/arch_input.txt
          cat /tmp/arch_diff.txt >> /tmp/arch_input.txt

          # Size check
          DIFF_SIZE=$(wc -c < /tmp/arch_diff.txt)
          echo "Architectural diff size: $DIFF_SIZE bytes"
          
          if [ "$DIFF_SIZE" -gt 100000 ]; then
            echo "Diff too large for LLM analysis (>100KB), creating size-based fallback"
            jq -n \
              --arg count "${{ needs.classify.outputs.source_count }}" \
              --arg size "$DIFF_SIZE" \
              '{
                "verdict": "PASS",
                "summary": ("Large architectural diff (" + $size + " bytes) — manual review recommended"),
                "checks": [
                  {"name": "File Classification", "status": "pass", "detail": ("Source files: " + $count)},
                  {"name": "Size Check", "status": "warning", "detail": ("Diff size " + $size + " bytes exceeds LLM limit")}
                ],
                "issues": ["Diff too large for automated LLM analysis — manual architectural review recommended"],
                "notes": "Diff too large for the LLM. Passed by default — please eyeball it yourself.",
                "checklist_verdict": "PASS",
                "expert_verdict": "PASS"
              }' > /tmp/arch_review_result.json
          else
            # Call OpenRouter API for architectural analysis
            echo "Running LLM architectural analysis..."
            
            SYSTEM=$(cat /tmp/arch_prompt.txt)
            USER_MSG=$(cat /tmp/arch_input.txt)

            RESPONSE=$(curl -s -X POST "https://openrouter.ai/api/v1/chat/completions" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${OPENROUTER_API_KEY}" \
              -H "HTTP-Referer: https://github.com/AI-Daemon/pi-daemon" \
              -H "X-Title: pi-daemon-arch-review" \
              -d "$(jq -n \
                --arg system "$SYSTEM" \
                --arg user "$USER_MSG" \
                '{
                  "model": "google/gemini-2.5-flash",
                  "messages": [
                    {"role": "system", "content": $system},
                    {"role": "user", "content": $user}
                  ],
                  "temperature": 0.1,
                  "max_tokens": 8192
                }')")

            # Extract and clean the response
            REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
            
            if [ -z "$REVIEW" ]; then
              echo "::warning::LLM returned empty response for architectural review"
              echo "$RESPONSE" | jq . 2>/dev/null || echo "$RESPONSE"
              # Create fallback review
              jq -n \
                --arg count "${{ needs.classify.outputs.source_count }}" \
                '{
                  "verdict": "PASS",
                  "summary": ("Architectural review fallback — LLM unavailable for " + $count + " source files"),
                  "checks": [
                    {"name": "File Classification", "status": "pass", "detail": ("Source files: " + $count)},
                    {"name": "LLM Analysis", "status": "warning", "detail": "OpenRouter API returned empty response"}
                  ],
                  "issues": ["LLM architectural analysis unavailable — manual review recommended"],
                  "notes": "LLM API hiccup. Passed by default — give it a human look.",
                  "checklist_verdict": "PASS",
                  "expert_verdict": "PASS"
                }' > /tmp/arch_review_result.json
            else
              # Clean the response (remove markdown code blocks)
              REVIEW=$(echo "$REVIEW" | sed 's/^```json//; s/^```//; s/```$//' | sed '/^$/d')
              
              # Validate JSON before saving
              if echo "$REVIEW" | jq . >/dev/null 2>&1; then
                echo "$REVIEW" > /tmp/arch_review_result.json
                echo "Valid JSON architectural review saved"
              else
                echo "::warning::LLM returned invalid JSON for architectural review - creating fallback"
                echo "Raw LLM response (first 1000 chars):"
                echo "$REVIEW" | head -c 1000
                echo
                echo "=== END RAW RESPONSE ==="
                
                # Extract summary from partial response if possible
                PARTIAL_SUMMARY=$(echo "$REVIEW" | grep -o '"summary"[[:space:]]*:[[:space:]]*"[^"]*' | sed 's/^"summary"[[:space:]]*:[[:space:]]*"//' | head -1)
                if [ -z "$PARTIAL_SUMMARY" ]; then
                  PARTIAL_SUMMARY="LLM response was truncated - manual review required"
                fi
                
                # Create fallback review with partial information
                jq -n \
                  --arg summary "$PARTIAL_SUMMARY" \
                  --arg count "${{ needs.classify.outputs.source_count }}" \
                  '{
                    "verdict": "PASS",
                    "summary": ($summary + " (response truncated)"),
                    "scores": {},
                    "checks": [
                      {"name": "File Classification", "status": "pass", "detail": ("Source files: " + $count)},
                      {"name": "JSON Validation", "status": "warning", "detail": "LLM response was truncated - fallback applied"}
                    ],
                    "issues": ["LLM response truncated - manual architectural review recommended"],
                    "actions": ["Consider manual review of architectural changes"],
                    "notes": "The LLM response was truncated due to token limits. This PR passed by default but manual review is recommended.",
                    "checklist_verdict": "PASS",
                    "expert_verdict": "PASS"
                  }' > /tmp/arch_review_result.json
              fi
            fi
          fi
          
          echo "Architectural review completed"

      - name: Create Architectural Review
        if: steps.action.outputs.action == 'review'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let review;
            try {
              const raw = fs.readFileSync('/tmp/arch_review_result.json', 'utf8');
              review = JSON.parse(raw);
            } catch (e) {
              review = { verdict: 'PASS', summary: 'Parse error — defaulting to PASS', scores: {}, checks: [], issues: [], actions: [], notes: '' };
            }

            const verdict = review.verdict || 'PASS';
            const icon = verdict === 'PASS' ? '✅' : '❌';
            const sourceCount = '${{ needs.classify.outputs.source_count }}';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.issue.number;
            const REVIEW_MARKER = '<!-- pi-daemon:arch-review -->';

            // Dismiss previous bot review for this type
            const reviews = await github.rest.pulls.listReviews({ owner, repo, pull_number });
            const existing = reviews.data.find(r =>
              r.user.type === 'Bot' &&
              r.body && r.body.includes(REVIEW_MARKER)
            );
            if (existing) {
              try {
                await github.rest.pulls.dismissReview({
                  owner, repo, pull_number,
                  review_id: existing.id,
                  message: 'Superseded by new architectural review'
                });
                core.info(`Dismissed previous arch review #${existing.id}`);
              } catch (e) {
                core.warning(`Could not dismiss previous review: ${e.message}`);
              }
            }

            // Build scores table
            const scores = review.scores || {};
            const scoreRows = Object.entries(scores)
              .map(([dim, score]) => {
                const s = Number(score);
                const si = s === 0 ? '🔴' : s === 1 ? '🟡' : s === 2 ? '✅' : '🟢';
                return `| ${si} ${s}/3 | ${dim} |`;
              }).join('\n');

            // Build checks table
            const checksRows = (review.checks || [])
              .map(c => {
                const ci = c.status === 'pass' ? '✅' : c.status === 'fail' ? '❌' : '⚠️';
                return `| ${ci} | ${c.name} | ${c.detail || ''} |`;
              }).join('\n');

            // Build inline comments from actions + issues (new object format)
            // Handles both old string format and new {action/description, file, line} format
            const rawInlineComments = [];
            const bodyActions = [];
            const bodyIssues = [];

            for (const a of (review.actions || [])) {
              if (typeof a === 'string') {
                bodyActions.push(a);
              } else if (a && a.action) {
                if (a.file && a.line) {
                  rawInlineComments.push({ path: a.file, line: Number(a.line), body: `🔧 **Action:** ${a.action}`, action: a.action });
                } else {
                  bodyActions.push(a.action);
                }
              }
            }

            for (const i of (review.issues || [])) {
              if (typeof i === 'string') {
                bodyIssues.push(i);
              } else if (i && i.description) {
                if (i.file && i.line) {
                  rawInlineComments.push({ path: i.file, line: Number(i.line), body: `⚠️ **Issue:** ${i.description}`, issue: i.description });
                } else {
                  bodyIssues.push(i.description);
                }
              }
            }

            // Filter inline comments to only include lines that exist in the diff
            // This prevents "Line could not be resolved" errors (#172)
            let diffLines = {};
            
            try {
              const diffContent = fs.readFileSync('/tmp/arch_diff.txt', 'utf8');
              
              // Parse diff to extract changed line numbers per file
              const lines = diffContent.split('\n');
              let currentFile = null;
              let newLineNumber = 0;
              
              for (const line of lines) {
                if (line.startsWith('=== ') && line.endsWith(' ===')) {
                  // Extract filename: "=== path/to/file.rs ===" -> "path/to/file.rs"
                  currentFile = line.slice(4, -4);
                  diffLines[currentFile] = new Set();
                  newLineNumber = 0;
                } else if (currentFile && line.match(/^@@.*\+(\d+)/)) {
                  // Extract starting line number from hunk header: "@@ -10,7 +10,8 @@" -> 10
                  const match = line.match(/\+(\d+)/);
                  if (match) {
                    newLineNumber = parseInt(match[1], 10) - 1; // -1 because we increment before adding
                  }
                } else if (currentFile && (line.startsWith('+') || line.startsWith(' '))) {
                  // Track lines that exist in the new version (+ and context lines)
                  newLineNumber++;
                  if (line.startsWith('+') || line.startsWith(' ')) {
                    diffLines[currentFile].add(newLineNumber);
                  }
                }
              }
            } catch (e) {
              core.warning(`Could not parse diff for line filtering: ${e.message}`);
              diffLines = {}; // Fall back to no filtering
            }

            // Split comments into valid (can be inlined) and invalid (move to body)
            const inlineComments = [];
            const invalidComments = [];
            
            for (const comment of rawInlineComments) {
              const fileLines = diffLines[comment.path];
              if (fileLines && fileLines.has(comment.line)) {
                // Line exists in diff - can be inlined
                inlineComments.push({ path: comment.path, line: comment.line, body: comment.body });
              } else {
                // Line not in diff - move to body
                const type = comment.action ? 'Action' : 'Issue';
                const text = comment.action || comment.issue;
                invalidComments.push(`**${type}** (\`${comment.path}:${comment.line}\`): ${text}`);
              }
            }

            // Clean-PASS guard: suppress to step summary when no actionable findings (#148)
            const hasFindings = inlineComments.length > 0 || bodyActions.length > 0 || bodyIssues.length > 0;
            if (verdict === 'PASS' && !hasFindings) {
              // Stale review already dismissed above — write to step summary instead of createReview()
              const summaryLines = [
                `## ${icon} 🏗️ Architectural Review: PASS`,
                '',
                `Looked at ${sourceCount} source file${sourceCount === '1' ? '' : 's'}. ${review.summary || 'No issues found.'}`,
              ];
              if (Object.keys(scores).length > 0) {
                summaryLines.push('', '| Score | Dimension |', '|-------|-----------|');
                for (const [dim, score] of Object.entries(scores)) {
                  const s = Number(score);
                  const si = s === 0 ? '🔴' : s === 1 ? '🟡' : s === 2 ? '✅' : '🟢';
                  summaryLines.push(`| ${si} ${s}/3 | ${dim} |`);
                }
              }
              await core.summary.addRaw(summaryLines.join('\n')).write();
              core.info('Clean PASS with no findings — wrote to step summary instead of PR review');
              return;
            }

            // Build review body
            let body = `${REVIEW_MARKER}\n## ${icon} 🏗️ Architectural Review: ${verdict}\n\n`;
            body += `Looked at ${sourceCount} source file${sourceCount === '1' ? '' : 's'}. `;
            body += `${review.summary || 'No issues found.'}\n\n`;

            if (scoreRows) {
              body += `### How it scored\n| Score | What I checked |\n|-------|---------------|\n${scoreRows}\n\n`;
            }
            if (checksRows) {
              body += `### Details\n| | Check | What I found |\n|--|-------|-------------|\n${checksRows}\n\n`;
            }

            const issuesList = bodyIssues.filter(i => i && i.length > 0).map(i => `- ${i}`).join('\n');
            if (issuesList) {
              body += `### Things to fix\n${issuesList}\n\n`;
            }
            const actionsList = bodyActions.filter(a => a && a.length > 0).map((a, i) => `${i + 1}. ${a}`).join('\n');
            if (actionsList) {
              body += `### Recommended actions\n${actionsList}\n\n`;
            }
            if (review.notes) {
              body += `### Other thoughts\n${review.notes}\n`;
            }
            if (invalidComments.length > 0) {
              body += `### File-level feedback\n`;
              body += `_The following items couldn't be placed as inline comments because they reference lines outside the diff._\n\n`;
              body += invalidComments.map(c => `- ${c}`).join('\n') + '\n\n';
            }
            if (inlineComments.length > 0) {
              body += `\n---\n_${inlineComments.length} inline comment${inlineComments.length === 1 ? '' : 's'} posted on specific files._\n`;
            }

            await github.rest.pulls.createReview({
              owner, repo, pull_number,
              event: verdict === 'PASS' ? 'COMMENT' : 'REQUEST_CHANGES',
              body,
              comments: inlineComments
            });

      - name: Fail job if architectural review failed
        if: steps.action.outputs.action == 'review'
        run: |
          RESULT="/tmp/arch_review_result.json"
          if ! jq . "$RESULT" >/dev/null 2>&1; then
            echo "::warning::Arch review returned invalid JSON — passing by default"
            echo "Raw content (first 1000 chars):"
            head -c 1000 "$RESULT"
            echo
            echo "=== END RAW CONTENT ==="
            echo "File size: $(wc -c < "$RESULT") bytes"
            exit 0
          fi
          VERDICT=$(jq -r '.verdict // "PASS"' "$RESULT")
          if [ "$VERDICT" != "PASS" ]; then
            # If diff was truncated, LLM may be hallucinating — treat as advisory
            DIFF_SIZE=$(wc -c < /tmp/arch_diff.txt 2>/dev/null || echo 0)
            if [ "$DIFF_SIZE" -gt 80000 ]; then
              echo "::warning::LLM arch review returned FAIL but diff was large ($DIFF_SIZE chars) — treating as advisory"
              echo "Summary: $(jq -r '.summary // ""' "$RESULT")"
              exit 0
            fi
            echo "::error::Architectural review failed: $VERDICT"
            echo "Summary: $(jq -r '.summary // ""' "$RESULT")"
            echo "Review has been posted with detailed feedback - check the PR comments"
            exit 1
          fi
          echo "Architectural review passed"

  # ─── Test Quality Review ────────────────────────────────
  test-quality-review:
    name: Test Quality Review
    runs-on: ubuntu-latest
    needs: [classify]
    if: inputs.has_rust
    steps:
      - name: Determine review action
        id: action
        run: |
          if [ "${{ needs.classify.outputs.need_test_review }}" = "true" ]; then
            echo "action=review" >> $GITHUB_OUTPUT
            echo "test_count=${{ needs.classify.outputs.test_count }}" >> $GITHUB_OUTPUT
          else
            echo "action=skip" >> $GITHUB_OUTPUT
            echo "skip_reason=No test files detected for test quality review" >> $GITHUB_OUTPUT
          fi

      - name: Report skip to step summary
        if: steps.action.outputs.action == 'skip'
        run: |
          echo "## ⏭️ Test Quality Review: Skipped" >> $GITHUB_STEP_SUMMARY
          echo "No test files changed in this PR. If you added source code without tests, that is worth a second look." >> $GITHUB_STEP_SUMMARY

      - name: Checkout repo
        if: steps.action.outputs.action == 'review'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download file classification
        if: steps.action.outputs.action == 'review'
        uses: actions/download-artifact@v4
        with:
          name: file-classification

      - name: Gather test context
        if: steps.action.outputs.action == 'review'
        run: |
          # Inject REAL project testing standards and test-utils API
          echo "## Project Testing Standards (authoritative reference)" > /tmp/test_context.txt
          cat docs/Testing.md >> /tmp/test_context.txt 2>/dev/null || echo "(Testing.md not found)" >> /tmp/test_context.txt
          echo "" >> /tmp/test_context.txt
          echo "## Available Test Utilities API (tests MUST use these)" >> /tmp/test_context.txt
          echo "### FullTestServer (use instead of manual TcpListener boilerplate):" >> /tmp/test_context.txt
          head -60 crates/pi-daemon-test-utils/src/server.rs >> /tmp/test_context.txt 2>/dev/null || true
          echo "" >> /tmp/test_context.txt
          echo "### TestClient (use instead of raw reqwest::Client):" >> /tmp/test_context.txt
          head -40 crates/pi-daemon-test-utils/src/client.rs >> /tmp/test_context.txt 2>/dev/null || true
          echo "" >> /tmp/test_context.txt
          echo "### Assertion Macros (use instead of manual assertions):" >> /tmp/test_context.txt
          head -40 crates/pi-daemon-test-utils/src/macros.rs >> /tmp/test_context.txt 2>/dev/null || true
          echo "Test context size: $(wc -c < /tmp/test_context.txt) bytes"

      - name: Run test quality review
        if: steps.action.outputs.action == 'review'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Running test quality review for ${{ needs.classify.outputs.test_count }} test files"
          
          # Generate filtered diff for test files
          while IFS= read -r file; do
            if [ -n "$file" ]; then
              echo "=== $file ==="
              git diff origin/${{ github.base_ref }}...HEAD -- "$file" 2>/dev/null || echo "(file diff unavailable)"
              echo ""
            fi
          done < test_files.txt > /tmp/test_diff.txt
          
          # Create the test quality review prompt — tight, enforces project standards
          cat > /tmp/test_prompt.txt << 'TEST_PROMPT'
          You review test code for pi-daemon against the project testing standards (provided below). You enforce the rules strictly but write like a colleague doing a code review — direct, helpful, specific. Call out what's good in one line. Call out what's wrong with the file and line if possible. No filler sentences.

          ## Hard FAIL rules (any one triggers FAIL)
          - Test file contains a manual start_test_server() function instead of FullTestServer::new()
          - Test uses raw reqwest::Client instead of TestClient from test-utils
          - Test uses #[ignore] attribute
          - Test name does not follow test_<thing>_<behavior> pattern
          - Test only covers the happy path with no error/edge case testing
          - Test uses tokio::time::sleep for timing instead of polling with timeout
          - Test uses println! instead of tracing or --nocapture

          ## Score each dimension 0-3
          0 = Violation (FAIL). 1 = Concern. 2 = Acceptable. 3 = Excellent.

          Dimensions:
          - helpers: Uses FullTestServer, TestClient, assertion macros from test-utils
          - naming: test_<thing>_<behavior> pattern, descriptive names
          - error_coverage: Tests error paths (400, 404, 422), not just happy paths
          - edge_cases: Boundary conditions, unicode, empty input, concurrent access
          - isolation: No shared mutable state, uses TestKernel for temp dirs
          - assertions: Uses expect() not unwrap(), uses project macros, clear messages
          - structure: Tests in correct location, proper async patterns

          PASS: no dimension scores 0 AND average >= 2.0
          FAIL: any dimension scores 0 OR average < 2.0

          ## Output format — JSON only, no markdown, no explanation outside the JSON
          {"verdict":"PASS|FAIL","summary":"one sentence","checklist_verdict":"PASS|FAIL","expert_verdict":"PASS|FAIL","scores":{"helpers":N,"naming":N,"error_coverage":N,"edge_cases":N,"isolation":N,"assertions":N,"structure":N},"checks":[{"name":"string","status":"pass|fail|warning","detail":"string"}],"issues":[{"description":"string","file":"string (optional)","line":"N (optional)"}],"actions":[{"action":"concrete task, e.g. Replace start_test_server() in api_integration.rs with FullTestServer::new()","file":"string (optional)","line":"N (optional)"}],"notes":"string"}

          ## actions and issues field rules
          - Each action is an object: {"action": "verb phrase", "file": "path/to/file.rs", "line": 42}
          - Each issue is an object: {"description": "what is wrong", "file": "path/to/file.rs", "line": 42}
          - "file" and "line" are optional but strongly preferred — include them when you can identify the exact location
          - The "file" value must match a filename from the diff headers (=== filename ===)
          - The "line" value must be a line number from the NEW side of the diff (+ lines)
          - Start action text with a verb: Add, Replace, Remove, Rename, Refactor, Test, Fix
          - If verdict is PASS, actions should be empty or contain only minor suggestions
          - If verdict is FAIL, actions must list every required fix as a workable checklist
          TEST_PROMPT

          # Prepare the input (test context + diff)
          echo "## Context" > /tmp/test_input.txt
          echo "Pull Request: Test file changes to pi-daemon" >> /tmp/test_input.txt
          echo "Files: ${{ needs.classify.outputs.test_count }} test files (test_*.rs, *_test.go, *.test.ts, spec/)" >> /tmp/test_input.txt
          echo "" >> /tmp/test_input.txt
          # Inject real testing standards and test-utils API
          cat /tmp/test_context.txt >> /tmp/test_input.txt
          echo "" >> /tmp/test_input.txt
          echo "## Test Diff to Review" >> /tmp/test_input.txt
          cat /tmp/test_diff.txt >> /tmp/test_input.txt

          # Size check
          DIFF_SIZE=$(wc -c < /tmp/test_diff.txt)
          echo "Test diff size: $DIFF_SIZE bytes"
          
          if [ "$DIFF_SIZE" -gt 100000 ]; then
            echo "Test diff too large for LLM analysis (>100KB), creating size-based fallback"
            jq -n \
              --arg count "${{ needs.classify.outputs.test_count }}" \
              --arg size "$DIFF_SIZE" \
              '{
                "verdict": "PASS",
                "summary": ("Large test diff (" + $size + " bytes) — manual review recommended"),
                "checks": [
                  {"name": "File Classification", "status": "pass", "detail": ("Test files: " + $count)},
                  {"name": "Size Check", "status": "warning", "detail": ("Diff size " + $size + " bytes exceeds LLM limit")}
                ],
                "issues": ["Test diff too large for automated LLM analysis — manual test quality review recommended"],
                "notes": "Test diff too large for the LLM. Passed by default — worth a manual scan.",
                "checklist_verdict": "PASS",
                "expert_verdict": "PASS"
              }' > /tmp/test_review_result.json
          else
            # Call OpenRouter API for test quality analysis
            echo "Running LLM test quality analysis..."
            
            SYSTEM=$(cat /tmp/test_prompt.txt)
            USER_MSG=$(cat /tmp/test_input.txt)

            RESPONSE=$(curl -s -X POST "https://openrouter.ai/api/v1/chat/completions" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${OPENROUTER_API_KEY}" \
              -H "HTTP-Referer: https://github.com/AI-Daemon/pi-daemon" \
              -H "X-Title: pi-daemon-test-review" \
              -d "$(jq -n \
                --arg system "$SYSTEM" \
                --arg user "$USER_MSG" \
                '{
                  "model": "google/gemini-2.5-flash",
                  "messages": [
                    {"role": "system", "content": $system},
                    {"role": "user", "content": $user}
                  ],
                  "temperature": 0.1,
                  "max_tokens": 8192
                }')")

            # Extract and clean the response
            REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
            
            if [ -z "$REVIEW" ]; then
              echo "::warning::LLM returned empty response for test quality review"
              echo "$RESPONSE" | jq . 2>/dev/null || echo "$RESPONSE"
              # Create fallback review
              jq -n \
                --arg count "${{ needs.classify.outputs.test_count }}" \
                '{
                  "verdict": "PASS",
                  "summary": ("Test quality review fallback — LLM unavailable for " + $count + " test files"),
                  "checks": [
                    {"name": "File Classification", "status": "pass", "detail": ("Test files: " + $count)},
                    {"name": "LLM Analysis", "status": "warning", "detail": "OpenRouter API returned empty response"}
                  ],
                  "issues": ["LLM test quality analysis unavailable — manual review recommended"],
                  "notes": "LLM API hiccup. Passed by default — give the tests a human look.",
                  "checklist_verdict": "PASS",
                  "expert_verdict": "PASS"
                }' > /tmp/test_review_result.json
            else
              # Clean the response (remove markdown code blocks)
              REVIEW=$(echo "$REVIEW" | sed 's/^```json//; s/^```//; s/```$//' | sed '/^$/d')
              
              # Validate JSON before saving
              if echo "$REVIEW" | jq . >/dev/null 2>&1; then
                echo "$REVIEW" > /tmp/test_review_result.json
                echo "Valid JSON test quality review saved"
              else
                echo "::warning::LLM returned invalid JSON for test quality review - creating fallback"
                echo "Raw LLM response (first 1000 chars):"
                echo "$REVIEW" | head -c 1000
                echo
                echo "=== END RAW RESPONSE ==="
                
                # Extract summary from partial response if possible
                PARTIAL_SUMMARY=$(echo "$REVIEW" | grep -o '"summary"[[:space:]]*:[[:space:]]*"[^"]*' | sed 's/^"summary"[[:space:]]*:[[:space:]]*"//' | head -1)
                if [ -z "$PARTIAL_SUMMARY" ]; then
                  PARTIAL_SUMMARY="LLM response was truncated - manual review required"
                fi
                
                # Create fallback review with partial information
                jq -n \
                  --arg summary "$PARTIAL_SUMMARY" \
                  --arg count "${{ needs.classify.outputs.test_count }}" \
                  '{
                    "verdict": "PASS",
                    "summary": ($summary + " (response truncated)"),
                    "scores": {},
                    "checks": [
                      {"name": "File Classification", "status": "pass", "detail": ("Test files: " + $count)},
                      {"name": "JSON Validation", "status": "warning", "detail": "LLM response was truncated - fallback applied"}
                    ],
                    "issues": ["LLM response truncated - manual test quality review recommended"],
                    "actions": ["Consider manual review of test changes"],
                    "notes": "The LLM response was truncated due to token limits. This PR passed by default but manual review is recommended.",
                    "checklist_verdict": "PASS",
                    "expert_verdict": "PASS"
                  }' > /tmp/test_review_result.json
              fi
            fi
          fi
          
          echo "Test quality review completed"

      - name: Create Test Quality Review
        if: steps.action.outputs.action == 'review'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let review;
            try {
              const raw = fs.readFileSync('/tmp/test_review_result.json', 'utf8');
              review = JSON.parse(raw);
            } catch (e) {
              review = { verdict: 'PASS', summary: 'Parse error — defaulting to PASS', scores: {}, checks: [], issues: [], actions: [], notes: '' };
            }

            const verdict = review.verdict || 'PASS';
            const icon = verdict === 'PASS' ? '✅' : '❌';
            const testCount = '${{ needs.classify.outputs.test_count }}';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.issue.number;
            const REVIEW_MARKER = '<!-- pi-daemon:test-review -->';

            // Dismiss previous bot review for this type
            const reviews = await github.rest.pulls.listReviews({ owner, repo, pull_number });
            const existing = reviews.data.find(r =>
              r.user.type === 'Bot' &&
              r.body && r.body.includes(REVIEW_MARKER)
            );
            if (existing) {
              try {
                await github.rest.pulls.dismissReview({
                  owner, repo, pull_number,
                  review_id: existing.id,
                  message: 'Superseded by new test quality review'
                });
                core.info(`Dismissed previous test review #${existing.id}`);
              } catch (e) {
                core.warning(`Could not dismiss previous review: ${e.message}`);
              }
            }

            // Build scores table
            const scores = review.scores || {};
            const scoreRows = Object.entries(scores)
              .map(([dim, score]) => {
                const s = Number(score);
                const si = s === 0 ? '🔴' : s === 1 ? '🟡' : s === 2 ? '✅' : '🟢';
                return `| ${si} ${s}/3 | ${dim} |`;
              }).join('\n');

            // Build checks table
            const checksRows = (review.checks || [])
              .map(c => {
                const ci = c.status === 'pass' ? '✅' : c.status === 'fail' ? '❌' : '⚠️';
                return `| ${ci} | ${c.name} | ${c.detail || ''} |`;
              }).join('\n');

            // Build inline comments from actions + issues (new object format)
            const rawInlineComments = [];
            const bodyActions = [];
            const bodyIssues = [];

            for (const a of (review.actions || [])) {
              if (typeof a === 'string') {
                bodyActions.push(a);
              } else if (a && a.action) {
                if (a.file && a.line) {
                  rawInlineComments.push({ path: a.file, line: Number(a.line), body: `🔧 **Action:** ${a.action}`, action: a.action });
                } else {
                  bodyActions.push(a.action);
                }
              }
            }

            for (const i of (review.issues || [])) {
              if (typeof i === 'string') {
                bodyIssues.push(i);
              } else if (i && i.description) {
                if (i.file && i.line) {
                  rawInlineComments.push({ path: i.file, line: Number(i.line), body: `⚠️ **Issue:** ${i.description}`, issue: i.description });
                } else {
                  bodyIssues.push(i.description);
                }
              }
            }

            // Filter inline comments to only include lines that exist in the diff
            // This prevents "Line could not be resolved" errors (#172)
            let diffLines = {};
            
            try {
              const diffContent = fs.readFileSync('/tmp/test_diff.txt', 'utf8');
              
              // Parse diff to extract changed line numbers per file
              const lines = diffContent.split('\n');
              let currentFile = null;
              let newLineNumber = 0;
              
              for (const line of lines) {
                if (line.startsWith('=== ') && line.endsWith(' ===')) {
                  // Extract filename: "=== path/to/file.rs ===" -> "path/to/file.rs"
                  currentFile = line.slice(4, -4);
                  diffLines[currentFile] = new Set();
                  newLineNumber = 0;
                } else if (currentFile && line.match(/^@@.*\+(\d+)/)) {
                  // Extract starting line number from hunk header: "@@ -10,7 +10,8 @@" -> 10
                  const match = line.match(/\+(\d+)/);
                  if (match) {
                    newLineNumber = parseInt(match[1], 10) - 1; // -1 because we increment before adding
                  }
                } else if (currentFile && (line.startsWith('+') || line.startsWith(' '))) {
                  // Track lines that exist in the new version (+ and context lines)
                  newLineNumber++;
                  if (line.startsWith('+') || line.startsWith(' ')) {
                    diffLines[currentFile].add(newLineNumber);
                  }
                }
              }
            } catch (e) {
              core.warning(`Could not parse diff for line filtering: ${e.message}`);
              diffLines = {}; // Fall back to no filtering
            }

            // Split comments into valid (can be inlined) and invalid (move to body)
            const inlineComments = [];
            const invalidComments = [];
            
            for (const comment of rawInlineComments) {
              const fileLines = diffLines[comment.path];
              if (fileLines && fileLines.has(comment.line)) {
                // Line exists in diff - can be inlined
                inlineComments.push({ path: comment.path, line: comment.line, body: comment.body });
              } else {
                // Line not in diff - move to body
                const type = comment.action ? 'Action' : 'Issue';
                const text = comment.action || comment.issue;
                invalidComments.push(`**${type}** (\`${comment.path}:${comment.line}\`): ${text}`);
              }
            }

            // Clean-PASS guard: suppress to step summary when no actionable findings (#148)
            const hasFindings = inlineComments.length > 0 || bodyActions.length > 0 || bodyIssues.length > 0;
            if (verdict === 'PASS' && !hasFindings) {
              // Stale review already dismissed above — write to step summary instead of createReview()
              const summaryLines = [
                `## ${icon} 🧪 Test Quality Review: PASS`,
                '',
                `Reviewed ${testCount} test file${testCount === '1' ? '' : 's'}. ${review.summary || 'No issues found.'}`,
              ];
              if (Object.keys(scores).length > 0) {
                summaryLines.push('', '| Score | Dimension |', '|-------|-----------|');
                for (const [dim, score] of Object.entries(scores)) {
                  const s = Number(score);
                  const si = s === 0 ? '🔴' : s === 1 ? '🟡' : s === 2 ? '✅' : '🟢';
                  summaryLines.push(`| ${si} ${s}/3 | ${dim} |`);
                }
              }
              await core.summary.addRaw(summaryLines.join('\n')).write();
              core.info('Clean PASS with no findings — wrote to step summary instead of PR review');
              return;
            }

            // Build review body
            let body = `${REVIEW_MARKER}\n## ${icon} 🧪 Test Quality Review: ${verdict}\n\n`;
            body += `Reviewed ${testCount} test file${testCount === '1' ? '' : 's'}. `;
            body += `${review.summary || 'No issues found.'}\n\n`;

            if (scoreRows) {
              body += `### How it scored\n| Score | What I checked |\n|-------|---------------|\n${scoreRows}\n\n`;
            }
            if (checksRows) {
              body += `### Details\n| | Check | What I found |\n|--|-------|-------------|\n${checksRows}\n\n`;
            }

            const issuesList = bodyIssues.filter(i => i && i.length > 0).map(i => `- ${i}`).join('\n');
            if (issuesList) {
              body += `### Things to fix\n${issuesList}\n\n`;
            }
            const actionsList = bodyActions.filter(a => a && a.length > 0).map((a, i) => `${i + 1}. ${a}`).join('\n');
            if (actionsList) {
              body += `### Recommended actions\n${actionsList}\n\n`;
            }
            if (review.notes) {
              body += `### Other thoughts\n${review.notes}\n`;
            }
            if (invalidComments.length > 0) {
              body += `### File-level feedback\n`;
              body += `_The following items couldn't be placed as inline comments because they reference lines outside the diff._\n\n`;
              body += invalidComments.map(c => `- ${c}`).join('\n') + '\n\n';
            }
            if (inlineComments.length > 0) {
              body += `\n---\n_${inlineComments.length} inline comment${inlineComments.length === 1 ? '' : 's'} posted on specific files._\n`;
            }

            await github.rest.pulls.createReview({
              owner, repo, pull_number,
              event: verdict === 'PASS' ? 'COMMENT' : 'REQUEST_CHANGES',
              body,
              comments: inlineComments
            });

      - name: Fail job if test quality review failed
        if: steps.action.outputs.action == 'review'
        run: |
          RESULT="/tmp/test_review_result.json"
          if ! jq . "$RESULT" >/dev/null 2>&1; then
            echo "::warning::Test review returned invalid JSON — passing by default"
            echo "Raw content (first 1000 chars):"
            head -c 1000 "$RESULT"
            echo
            echo "=== END RAW CONTENT ==="
            echo "File size: $(wc -c < "$RESULT") bytes"
            exit 0
          fi
          VERDICT=$(jq -r '.verdict // "PASS"' "$RESULT")
          if [ "$VERDICT" != "PASS" ]; then
            DIFF_SIZE=$(wc -c < /tmp/test_diff.txt 2>/dev/null || echo 0)
            if [ "$DIFF_SIZE" -gt 80000 ]; then
              echo "::warning::LLM test review returned FAIL but diff was large ($DIFF_SIZE chars) — treating as advisory"
              echo "Summary: $(jq -r '.summary // ""' "$RESULT")"
              exit 0
            fi
            echo "::error::Test quality review failed: $VERDICT"
            echo "Summary: $(jq -r '.summary // ""' "$RESULT")"
            echo "Review has been posted with detailed feedback - check the PR comments"
            exit 1
          fi
          echo "Test quality review passed"

  # ─── Configuration Review ───────────────────────────────
  configuration-review:
    name: Configuration Review
    runs-on: ubuntu-latest
    needs: [classify]
    if: inputs.has_workflows || inputs.has_docs || inputs.has_deps
    steps:
      - name: Determine review action
        id: action
        run: |
          if [ "${{ needs.classify.outputs.need_config_review }}" = "true" ]; then
            echo "action=review" >> $GITHUB_OUTPUT
            echo "config_count=${{ needs.classify.outputs.config_count }}" >> $GITHUB_OUTPUT
          else
            echo "action=skip" >> $GITHUB_OUTPUT
            echo "skip_reason=No configuration files detected for configuration review" >> $GITHUB_OUTPUT
          fi

      - name: Report skip to step summary
        if: steps.action.outputs.action == 'skip'
        run: |
          echo "## ⏭️ Configuration Review: Skipped" >> $GITHUB_STEP_SUMMARY
          echo "No config/docs files (.yml, .toml, .md) in this PR — pure code change." >> $GITHUB_STEP_SUMMARY

      - name: Checkout repo
        if: steps.action.outputs.action == 'review'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download file classification
        if: steps.action.outputs.action == 'review'
        uses: actions/download-artifact@v4
        with:
          name: file-classification

      - name: Generate filtered diff for configuration review
        if: steps.action.outputs.action == 'review'
        run: |
          echo "Generating filtered diff for configuration review..."
          
          # Create diff with config files only
          while IFS= read -r file; do
            if [ -n "$file" ]; then
              echo "=== $file ==="
              git diff origin/${{ github.base_ref }}...HEAD -- "$file" 2>/dev/null || echo "(file diff unavailable)"
              echo ""
            fi
          done < config_files.txt > /tmp/config_diff.txt
          
          # Size check after filtering  
          DIFF_SIZE=$(wc -c < /tmp/config_diff.txt)
          echo "Filtered config diff size: ${DIFF_SIZE} chars"
          
          if [ $DIFF_SIZE -gt 50000 ]; then
            echo "Large diff detected, truncating..."
            head -c 50000 /tmp/config_diff.txt > /tmp/config_diff_truncated.txt
            echo -e "\n\n... [DIFF TRUNCATED — exceeded 50K chars after filtering] ..." >> /tmp/config_diff_truncated.txt
            mv /tmp/config_diff_truncated.txt /tmp/config_diff.txt
          fi
          
          echo "config_diff_size=$DIFF_SIZE" >> $GITHUB_OUTPUT

      - name: Mechanical config pre-checks
        if: steps.action.outputs.action == 'review'
        id: mechanical
        run: |
          echo "Running mechanical pre-checks (no LLM)..."
          ISSUES=""
          PASS_COUNT=0
          TOTAL_COUNT=0

          # Check 1: New workflow files must be documented in PR-Reviews.md
          TOTAL_COUNT=$((TOTAL_COUNT + 1))
          NEW_WORKFLOWS=$(git diff origin/${{ github.base_ref }}...HEAD --name-only --diff-filter=A -- '.github/workflows/*.yml' || true)
          if [ -n "$NEW_WORKFLOWS" ]; then
            for wf in $NEW_WORKFLOWS; do
              WF_NAME=$(basename "$wf" .yml)
              if ! grep -qi "$WF_NAME" docs/PR-Reviews.md 2>/dev/null; then
                ISSUES="${ISSUES}❌ New workflow $wf not documented in docs/PR-Reviews.md\n"
              else
                PASS_COUNT=$((PASS_COUNT + 1))
              fi
            done
          else
            PASS_COUNT=$((PASS_COUNT + 1))
          fi

          # Check 2: All workflow files have valid YAML
          TOTAL_COUNT=$((TOTAL_COUNT + 1))
          YAML_OK=true
          for wf in .github/workflows/*.yml; do
            if ! python3 -c "import yaml; yaml.safe_load(open('$wf'))" 2>/dev/null; then
              ISSUES="${ISSUES}❌ Invalid YAML: $wf\n"
              YAML_OK=false
            fi
          done
          [ "$YAML_OK" = true ] && PASS_COUNT=$((PASS_COUNT + 1))

          # Check 3: All workflow files have concurrency groups
          TOTAL_COUNT=$((TOTAL_COUNT + 1))
          CONC_OK=true
          for wf in $NEW_WORKFLOWS; do
            if [ -n "$wf" ] && [ -f "$wf" ] && ! grep -q "concurrency:" "$wf" 2>/dev/null; then
              ISSUES="${ISSUES}❌ $wf missing concurrency group\n"
              CONC_OK=false
            fi
          done
          [ "$CONC_OK" = true ] && PASS_COUNT=$((PASS_COUNT + 1))

          # Check 4: CHANGELOG updated if .rs/.yml/Cargo.toml changed
          TOTAL_COUNT=$((TOTAL_COUNT + 1))
          CHANGED=$(git diff origin/${{ github.base_ref }}...HEAD --name-only)
          HAS_MEANINGFUL=$(echo "$CHANGED" | grep -E '\.(rs|yml)$|Cargo\.toml' | head -1)
          HAS_CHANGELOG=$(echo "$CHANGED" | grep 'CHANGELOG.md' | head -1)
          if [ -n "$HAS_MEANINGFUL" ] && [ -z "$HAS_CHANGELOG" ]; then
            ISSUES="${ISSUES}❌ Meaningful files changed but CHANGELOG.md not updated\n"
          else
            PASS_COUNT=$((PASS_COUNT + 1))
          fi

          # Check 5: New docs/ pages in _Sidebar.md
          TOTAL_COUNT=$((TOTAL_COUNT + 1))
          NEW_DOCS=$(git diff origin/${{ github.base_ref }}...HEAD --name-only --diff-filter=A -- 'docs/*.md' | grep -v '^docs/_' || true)
          SIDEBAR_OK=true
          for doc in $NEW_DOCS; do
            PAGE=$(basename "$doc" .md)
            if ! grep -q "$PAGE" docs/_Sidebar.md 2>/dev/null; then
              ISSUES="${ISSUES}❌ New page $doc not in docs/_Sidebar.md\n"
              SIDEBAR_OK=false
            fi
          done
          [ "$SIDEBAR_OK" = true ] && PASS_COUNT=$((PASS_COUNT + 1))

          echo "Mechanical checks: $PASS_COUNT/$TOTAL_COUNT passed"
          if [ -n "$ISSUES" ]; then
            echo -e "Issues found:\n$ISSUES"
            echo "mechanical_issues<<EOF" >> $GITHUB_OUTPUT
            echo -e "$ISSUES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "mechanical_pass=false" >> $GITHUB_OUTPUT
          else
            echo "✅ All mechanical checks passed"
            echo "mechanical_pass=true" >> $GITHUB_OUTPUT
            echo "mechanical_issues=" >> $GITHUB_OUTPUT
          fi

      - name: Gather configuration context
        if: steps.action.outputs.action == 'review'
        run: |
          # Gather configuration, DevOps context, and CI check catalog
          echo "=== CI Check Catalog (from PR-Reviews.md — authoritative reference) ===" > /tmp/config_context.txt
          cat docs/PR-Reviews.md >> /tmp/config_context.txt 2>/dev/null || echo "(PR-Reviews.md not found)" >> /tmp/config_context.txt

          echo -e "\n\n=== Existing CI/CD Patterns ===" >> /tmp/config_context.txt
          ls -la .github/workflows/ >> /tmp/config_context.txt 2>/dev/null || echo "(no workflows)" >> /tmp/config_context.txt
          
          echo -e "\n\n=== Project Configuration Structure ===" >> /tmp/config_context.txt
          find . -maxdepth 2 -name "*.toml" -o -name "*.yml" -o -name "*.yaml" | head -10 >> /tmp/config_context.txt 2>/dev/null || echo "(no config files)" >> /tmp/config_context.txt
          
          echo -e "\n\n=== Documentation Standards ===" >> /tmp/config_context.txt
          ls -la docs/ | head -10 >> /tmp/config_context.txt 2>/dev/null || echo "(no docs)" >> /tmp/config_context.txt
          
          echo -e "\n\n=== Keep-a-Changelog Format Reference ===" >> /tmp/config_context.txt
          head -20 CHANGELOG.md >> /tmp/config_context.txt 2>/dev/null || echo "(no changelog)" >> /tmp/config_context.txt
          
          echo "config_context_size=$(wc -c < /tmp/config_context.txt)" >> $GITHUB_OUTPUT

      - name: Run dual-layer configuration review
        if: steps.action.outputs.action == 'review'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Running Configuration Review (dual-layer) for ${{ needs.classify.outputs.config_count }} config files"
          
          # Check if there are config files to review
          CONFIG_COUNT=${{ needs.classify.outputs.config_count }}
          if [ "$CONFIG_COUNT" -eq 0 ]; then
            echo "No config files to review — creating auto-pass result"
            jq -n '{
              "verdict": "PASS",
              "summary": "No configuration files to review",
              "checks": [{"name": "File Classification", "status": "pass", "detail": "No config files detected"}],
              "issues": [],
              "notes": "No config files here — nothing to review."
            }' > /tmp/config_review_result.json
            echo "verdict=PASS" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Create the configuration review prompt — tight, enforces CI/docs standards
          cat > /tmp/config_prompt.txt << 'CONFIG_PROMPT'
          You review CI/CD, documentation, and config changes for pi-daemon for QUALITY ONLY. Write like a DevOps engineer reviewing a teammate's PR — brief, precise, no filler.

          IMPORTANT: Mechanical correctness checks (YAML validity, concurrency groups, changelog, sidebar sync, workflow documentation) are handled by a separate automated tool. Do NOT check for those — they are already verified. You will get false positives on truncated diffs if you try.

          Your job is subjective quality assessment only:
          - Are workflows well-structured and maintainable?
          - Are job/step names clear and descriptive?
          - Is the permissions block minimal?
          - Are there hardcoded secrets (not ${{ secrets.* }})?
          - Is the documentation clear and well-written?
          - Are there unnecessary duplicate steps or dead code?

          ## Score each dimension 0-3
          0 = Serious quality problem. 1 = Concern. 2 = Acceptable. 3 = Excellent.

          Dimensions:
          - structure: Workflow organization, job ordering, step clarity
          - naming: Job/step names are descriptive and consistent
          - security: Minimal permissions, no hardcoded secrets, proper scoping
          - docs_quality: Documentation is clear, accurate, well-organized
          - maintainability: DRY, no dead code, clear comments where needed

          PASS: no dimension scores 0 AND average >= 1.5
          FAIL: any dimension scores 0 OR average < 1.5

          ## Output format — JSON only, no markdown, no explanation outside the JSON
          {"verdict":"PASS|FAIL","summary":"one sentence","checklist_verdict":"PASS|FAIL","expert_verdict":"PASS|FAIL","scores":{"structure":N,"naming":N,"security":N,"docs_quality":N,"maintainability":N},"checks":[{"name":"string","status":"pass|fail|warning","detail":"string"}],"issues":[{"severity":"error|warning|info","file":"string","line":"N (optional)","description":"string"}],"actions":[{"action":"concrete task, e.g. Rename job X to be more descriptive","file":"string (optional)","line":"N (optional)"}],"notes":"string"}

          ## actions and issues field rules
          - Each action is an object: {"action": "verb phrase", "file": "path/to/file.yml", "line": 42}
          - Each issue is an object: {"severity": "error|warning|info", "file": "path/to/file.yml", "line": 42, "description": "what is wrong"}
          - "file" and "line" are optional but strongly preferred — include them when you can identify the exact location
          - The "file" value must match a filename from the diff headers (=== filename ===)
          - The "line" value must be a line number from the NEW side of the diff (+ lines)
          - Start action text with a verb: Add, Update, Remove, Fix, Rename, Simplify
          - If verdict is PASS, actions should be empty or contain only minor suggestions
          - If verdict is FAIL, actions must list every required fix as a workable checklist
          CONFIG_PROMPT

          # Build the user input  
          echo "## Configuration Context" > /tmp/config_input.txt
          cat /tmp/config_context.txt >> /tmp/config_input.txt

          echo -e "\n\n## File Classification (Configuration Focus)" >> /tmp/config_input.txt
          CONFIG_COUNT=${{ needs.classify.outputs.config_count }}
          echo "**Config Files Reviewed:** $CONFIG_COUNT files" >> /tmp/config_input.txt
          cat config_files.txt | sed 's/^/- /' >> /tmp/config_input.txt
          echo -e "\n**Focus:** This review analyzes configuration quality, DevOps patterns, and documentation standards.\n" >> /tmp/config_input.txt

          echo -e "\n## Configuration Changes Diff\n\`\`\`diff" >> /tmp/config_input.txt
          cat /tmp/config_diff.txt >> /tmp/config_input.txt
          echo -e "\n\`\`\`" >> /tmp/config_input.txt

          # Read prompt and input
          SYSTEM=$(cat /tmp/config_prompt.txt)
          USER_MSG=$(cat /tmp/config_input.txt)

          # Call OpenRouter API
          RESPONSE=$(curl -s -X POST "https://openrouter.ai/api/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${OPENROUTER_API_KEY}" \
            -H "HTTP-Referer: https://github.com/demonseed-jpg/pi-daemon" \
            -H "X-Title: pi-daemon-config-review" \
            -d "$(jq -n \
              --arg system "$SYSTEM" \
              --arg user "$USER_MSG" \
              '{
                "model": "google/gemini-2.5-flash",
                "messages": [
                  {"role": "system", "content": $system},
                  {"role": "user", "content": $user}
                ],
                "temperature": 0.1,
                "max_tokens": 8192
              }')")

          # Extract and clean the response
          REVIEW=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
          
          if [ -z "$REVIEW" ]; then
            echo "::error::LLM returned empty response"
            echo "$RESPONSE" | jq . 2>/dev/null || echo "$RESPONSE"
            # Write a fallback review
            REVIEW='{"verdict":"PASS","summary":"Configuration review could not be completed — LLM returned empty response. Defaulting to PASS.","checklist_verdict":"PASS","expert_verdict":"PASS","checks":[],"issues":[],"notes":"The OpenRouter API call did not return a valid response."}'
          fi

          # Clean the response
          REVIEW=$(echo "$REVIEW" | sed 's/^```json//; s/^```//; s/```$//' | sed '/^$/d')

          # Validate JSON before saving
          if echo "$REVIEW" | jq . >/dev/null 2>&1; then
            echo "$REVIEW" > /tmp/config_review_result.json
            echo "Valid JSON configuration review saved"
            
            # Extract verdict using dual-layer logic
            CHECKLIST_VERDICT=$(echo "$REVIEW" | jq -r '.checklist_verdict // "PASS"')
            EXPERT_VERDICT=$(echo "$REVIEW" | jq -r '.expert_verdict // "PASS"')

            # Both must pass
            if [ "$CHECKLIST_VERDICT" != "PASS" ] || [ "$EXPERT_VERDICT" != "PASS" ]; then
              FINAL_VERDICT="FAIL"
            else
              FINAL_VERDICT="PASS"
            fi
          else
            echo "::warning::LLM returned invalid JSON for configuration review - creating fallback"
            echo "Raw LLM response (first 1000 chars):"
            echo "$REVIEW" | head -c 1000
            echo
            echo "=== END RAW RESPONSE ==="
            
            # Extract summary from partial response if possible
            PARTIAL_SUMMARY=$(echo "$REVIEW" | grep -o '"summary"[[:space:]]*:[[:space:]]*"[^"]*' | sed 's/^"summary"[[:space:]]*:[[:space:]]*"//' | head -1)
            if [ -z "$PARTIAL_SUMMARY" ]; then
              PARTIAL_SUMMARY="LLM response was truncated - manual review required"
            fi
            
            # Create fallback review
            FALLBACK_REVIEW=$(jq -n \
              --arg summary "$PARTIAL_SUMMARY" \
              --arg count "${{ needs.classify.outputs.config_count }}" \
              '{
                "verdict": "PASS",
                "summary": ($summary + " (response truncated)"),
                "checks": [
                  {"name": "File Classification", "status": "pass", "detail": ("Config files: " + $count)},
                  {"name": "JSON Validation", "status": "warning", "detail": "LLM response was truncated - fallback applied"}
                ],
                "issues": ["LLM response truncated - manual configuration review recommended"],
                "notes": "The LLM response was truncated due to token limits. This PR passed by default but manual review is recommended.",
                "checklist_verdict": "PASS",
                "expert_verdict": "PASS"
              }')
            
            echo "$FALLBACK_REVIEW" > /tmp/config_review_result.json
            FINAL_VERDICT="PASS"
          fi

          echo "verdict=$FINAL_VERDICT" >> $GITHUB_OUTPUT
          echo "Configuration review complete: $FINAL_VERDICT (Checklist: ${CHECKLIST_VERDICT:-n/a}, Expert: ${EXPERT_VERDICT:-n/a})"

      - name: Create Configuration Review
        if: steps.action.outputs.action == 'review'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let review;
            try {
              const raw = fs.readFileSync('/tmp/config_review_result.json', 'utf8');
              review = JSON.parse(raw);
            } catch (e) {
              review = { verdict: 'PASS', summary: 'Parse error — defaulting to PASS', scores: {}, checks: [], issues: [], actions: [], notes: '' };
            }

            const verdict = review.verdict || 'PASS';
            const icon = verdict === 'PASS' ? '✅' : '❌';
            const configCount = '${{ needs.classify.outputs.config_count }}';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.issue.number;
            const REVIEW_MARKER = '<!-- pi-daemon:config-review -->';

            // Dismiss previous bot review for this type
            const reviews = await github.rest.pulls.listReviews({ owner, repo, pull_number });
            const existing = reviews.data.find(r =>
              r.user.type === 'Bot' &&
              r.body && r.body.includes(REVIEW_MARKER)
            );
            if (existing) {
              try {
                await github.rest.pulls.dismissReview({
                  owner, repo, pull_number,
                  review_id: existing.id,
                  message: 'Superseded by new configuration review'
                });
                core.info(`Dismissed previous config review #${existing.id}`);
              } catch (e) {
                core.warning(`Could not dismiss previous review: ${e.message}`);
              }
            }

            // Build scores table
            const scores = review.scores || {};
            const scoreRows = Object.entries(scores)
              .map(([dim, score]) => {
                const s = Number(score);
                const si = s === 0 ? '🔴' : s === 1 ? '🟡' : s === 2 ? '✅' : '🟢';
                return `| ${si} ${s}/3 | ${dim} |`;
              }).join('\n');

            // Build checks table
            const checksRows = (review.checks || [])
              .map(c => {
                const ci = c.status === 'pass' ? '✅' : c.status === 'fail' ? '❌' : '⚠️';
                return `| ${ci} | ${c.name} | ${c.detail || ''} |`;
              }).join('\n');

            // Build inline comments from actions + issues (new object format)
            const rawInlineComments = [];
            const bodyActions = [];
            const bodyIssues = [];

            for (const a of (review.actions || [])) {
              if (typeof a === 'string') {
                bodyActions.push(a);
              } else if (a && a.action) {
                if (a.file && a.line) {
                  rawInlineComments.push({ path: a.file, line: Number(a.line), body: `🔧 **Action:** ${a.action}`, action: a.action });
                } else {
                  bodyActions.push(a.action);
                }
              }
            }

            for (const i of (review.issues || [])) {
              if (typeof i === 'string') {
                bodyIssues.push(i);
              } else if (i && i.description) {
                if (i.file && i.line) {
                  const sev = (i.severity === 'error') ? '🔴' : (i.severity === 'warning') ? '🟡' : '⚠️';
                  rawInlineComments.push({ path: i.file, line: Number(i.line), body: `${sev} **Issue:** ${i.description}`, issue: i.description });
                } else {
                  const sev = (i.severity === 'error') ? '🔴' : (i.severity === 'warning') ? '🟡' : 'ℹ️';
                  const file = i.file ? `\`${i.file}\`: ` : '';
                  bodyIssues.push(`${sev} ${file}${i.description || ''}`);
                }
              }
            }

            // Filter inline comments to only include lines that exist in the diff
            // This prevents "Line could not be resolved" errors (#172)
            let diffLines = {};
            
            try {
              const diffContent = fs.readFileSync('/tmp/config_diff.txt', 'utf8');
              
              // Parse diff to extract changed line numbers per file
              const lines = diffContent.split('\n');
              let currentFile = null;
              let newLineNumber = 0;
              
              for (const line of lines) {
                if (line.startsWith('=== ') && line.endsWith(' ===')) {
                  // Extract filename: "=== path/to/file.rs ===" -> "path/to/file.rs"
                  currentFile = line.slice(4, -4);
                  diffLines[currentFile] = new Set();
                  newLineNumber = 0;
                } else if (currentFile && line.match(/^@@.*\+(\d+)/)) {
                  // Extract starting line number from hunk header: "@@ -10,7 +10,8 @@" -> 10
                  const match = line.match(/\+(\d+)/);
                  if (match) {
                    newLineNumber = parseInt(match[1], 10) - 1; // -1 because we increment before adding
                  }
                } else if (currentFile && (line.startsWith('+') || line.startsWith(' '))) {
                  // Track lines that exist in the new version (+ and context lines)
                  newLineNumber++;
                  if (line.startsWith('+') || line.startsWith(' ')) {
                    diffLines[currentFile].add(newLineNumber);
                  }
                }
              }
            } catch (e) {
              core.warning(`Could not parse diff for line filtering: ${e.message}`);
              diffLines = {}; // Fall back to no filtering
            }

            // Split comments into valid (can be inlined) and invalid (move to body)
            const inlineComments = [];
            const invalidComments = [];
            
            for (const comment of rawInlineComments) {
              const fileLines = diffLines[comment.path];
              if (fileLines && fileLines.has(comment.line)) {
                // Line exists in diff - can be inlined
                inlineComments.push({ path: comment.path, line: comment.line, body: comment.body });
              } else {
                // Line not in diff - move to body
                const type = comment.action ? 'Action' : 'Issue';
                const text = comment.action || comment.issue;
                invalidComments.push(`**${type}** (\`${comment.path}:${comment.line}\`): ${text}`);
              }
            }

            // Clean-PASS guard: suppress to step summary when no actionable findings (#148)
            const hasFindings = inlineComments.length > 0 || bodyActions.length > 0 || bodyIssues.length > 0;
            if (verdict === 'PASS' && !hasFindings) {
              // Stale review already dismissed above — write to step summary instead of createReview()
              const summaryLines = [
                `## ${icon} ⚙️ Configuration Review: PASS`,
                '',
                `Checked ${configCount} config/docs file${configCount === '1' ? '' : 's'}. ${review.summary || 'No issues found.'}`,
              ];
              if (Object.keys(scores).length > 0) {
                summaryLines.push('', '| Score | Dimension |', '|-------|-----------|');
                for (const [dim, score] of Object.entries(scores)) {
                  const s = Number(score);
                  const si = s === 0 ? '🔴' : s === 1 ? '🟡' : s === 2 ? '✅' : '🟢';
                  summaryLines.push(`| ${si} ${s}/3 | ${dim} |`);
                }
              }
              await core.summary.addRaw(summaryLines.join('\n')).write();
              core.info('Clean PASS with no findings — wrote to step summary instead of PR review');
              return;
            }

            // Build review body
            let body = `${REVIEW_MARKER}\n## ${icon} ⚙️ Configuration Review: ${verdict}\n\n`;
            body += `Checked ${configCount} config/docs file${configCount === '1' ? '' : 's'}. `;
            body += `${review.summary || 'No issues found.'}\n\n`;

            if (scoreRows) {
              body += `### How it scored\n| Score | What I checked |\n|-------|---------------|\n${scoreRows}\n\n`;
            }
            if (checksRows) {
              body += `### Details\n| | Check | What I found |\n|--|-------|-------------|\n${checksRows}\n\n`;
            }

            const issuesList = bodyIssues.filter(i => i && i.length > 5).map(i => `- ${i}`).join('\n');
            if (issuesList) {
              body += `### Things to fix\n${issuesList}\n\n`;
            }
            const actionsList = bodyActions.filter(a => a && a.length > 0).map((a, i) => `${i + 1}. ${a}`).join('\n');
            if (actionsList) {
              body += `### Recommended actions\n${actionsList}\n\n`;
            }
            if (review.notes) {
              body += `### Other thoughts\n${review.notes}\n`;
            }
            if (invalidComments.length > 0) {
              body += `### File-level feedback\n`;
              body += `_The following items couldn't be placed as inline comments because they reference lines outside the diff._\n\n`;
              body += invalidComments.map(c => `- ${c}`).join('\n') + '\n\n';
            }
            if (inlineComments.length > 0) {
              body += `\n---\n_${inlineComments.length} inline comment${inlineComments.length === 1 ? '' : 's'} posted on specific files._\n`;
            }

            // Post as native PR review (job status provides pass/fail)
            await github.rest.pulls.createReview({
              owner, repo, pull_number,
              event: verdict === 'PASS' ? 'COMMENT' : 'REQUEST_CHANGES',
              body,
              comments: inlineComments
            });

      - name: Fail job if configuration review failed
        if: steps.action.outputs.action == 'review'
        run: |
          # Mechanical checks are authoritative — if they fail, block
          if [ "${{ steps.mechanical.outputs.mechanical_pass }}" = "false" ]; then
            echo "::error::Mechanical config checks failed:"
            echo "${{ steps.mechanical.outputs.mechanical_issues }}"
            exit 1
          fi

          # LLM quality review — advisory on large diffs, blocking on small ones
          RESULT="/tmp/config_review_result.json"
          if ! jq . "$RESULT" >/dev/null 2>&1; then
            echo "::warning::Config review returned invalid JSON — mechanical checks passed, continuing"
            exit 0
          fi
          VERDICT=$(jq -r '.verdict // "PASS"' "$RESULT")
          if [ "$VERDICT" != "PASS" ]; then
            DIFF_SIZE=$(wc -c < /tmp/config_diff.txt 2>/dev/null || echo 0)
            if [ "$DIFF_SIZE" -gt 40000 ]; then
              echo "::warning::LLM config review returned FAIL but diff was truncated ($DIFF_SIZE chars) — treating as advisory"
              echo "Summary: $(jq -r '.summary // ""' "$RESULT")"
              exit 0
            fi
            echo "::error::Configuration review failed: $VERDICT"
            echo "Summary: $(jq -r '.summary // ""' "$RESULT")"
            echo "Issues: $(jq -r '.issues // [] | .[] | if type == "object" then .description else . end' "$RESULT" 2>/dev/null | head -5)"
            echo "Actions: $(jq -r '.actions // [] | .[]' "$RESULT" 2>/dev/null | head -5)"
            echo "Review has been posted with detailed feedback - check the PR comments"
            exit 1
          fi
          echo "Configuration review passed (mechanical ✅ + LLM ✅)"

  # ─── Code Review Gate ───────────────────────────────────
  # Required status check for branch protection (must be named "code-review")
  code-review:
    name: code-review
    runs-on: ubuntu-latest
    needs: [classify, architectural-review, test-quality-review, configuration-review]
    if: always()
    steps:
      - name: Check all code reviews passed
        run: |
          ARCH_RESULT="${{ needs.architectural-review.result }}"
          TEST_RESULT="${{ needs.test-quality-review.result }}"
          CONFIG_RESULT="${{ needs.configuration-review.result }}"
          
          echo "Code Review Gate Results:"
          echo "  🏗️ Architectural: $ARCH_RESULT"
          echo "  🧪 Test Quality: $TEST_RESULT"  
          echo "  ⚙️ Configuration: $CONFIG_RESULT"
          
          # Fail if any actual review failed (skipped is OK)
          if [ "$ARCH_RESULT" = "failure" ] || [ "$TEST_RESULT" = "failure" ] || [ "$CONFIG_RESULT" = "failure" ]; then
            echo "❌ Code review failed - at least one review type failed"
            exit 1
          else
            echo "✅ All code reviews passed (passed or skipped appropriately)"
          fi